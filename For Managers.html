const { useState } = React;

const NAVY = '#041739';
const NAVY2 = '#164375';
const CYAN = '#05b7ed';
const LIME = '#65c12a';
const SLATE = '#3d5070';
const AMBER = '#d97706';
const BRAND_GRADIENT = 'linear-gradient(90deg, #65c12a 0%, #05b7ed 50%, #164375 100%)';
const PAPER = '#ffffff';
const BG = '#f4f6fa';
const MUTE = '#6b7280';
const LINE = '#e5e7eb';
const SOFT = '#f1f5f9';

function Stroke({ children, fontSize = 44, darkBg = false }) {
  const h = Math.round(fontSize * 0.24);
  const ext = Math.round(fontSize / 6);
  return (
    <span style={{ display: 'inline-block', position: 'relative' }}>
      <span style={{ position: 'absolute', left: -ext, right: -ext, bottom: Math.round(fontSize * 0.05), height: h, background: BRAND_GRADIENT, zIndex: 0 }} />
      <span style={{ position: 'relative', zIndex: 1, color: darkBg ? '#fff' : 'inherit' }}>{children}</span>
    </span>
  );
}

const PHASES = [
  {
    id: 'brief',
    n: '01',
    label: 'Brief and prepare',
    when: 'Before forms go out',
    accent: LIME,
    promise: 'Get comfortable with the framework before you open the form.',
    blurb: 'The 4A framework, the difference between performance and potential, and what evidence actually looks like in writing. Worth a single, careful read at the start of the cycle. The Manager Guide takes about ten minutes. Most of the quality of everything you write later is set here.',
    tools: [
      { title: 'Manager Guide', href: 'Manager Guide.html', time: '10 min read', blurb: 'Your full briefing. The 4A framework, the difference between performance and potential, how to write evidence that holds up in calibration.', primary: true },
    ],
  },
  {
    id: 'share',
    n: '02',
    label: 'The input conversation',
    when: 'Late July, before you write the assessment',
    accent: LIME,
    promise: 'Hear your colleague before you write a word about them.',
    blurb: 'Your direct report has completed their career form. Before you write your assessment, they bring their thinking, in their own words, to a structured conversation with you. Your job here is to listen and ask. You leave with a much better starting point than a blank form. Skipping this step is the single biggest reason an assessment ends up reflecting the manager rather than the colleague.',
    tools: [
      { title: 'Manager Career Conversation Kit', href: 'Manager Career Conversation Kit.html', time: '20 min prep', blurb: 'Use the Prepare and Run sections. Openers, prompts to go deeper on what your colleague is bringing, and listening cues. The Follow-up section comes later.', primary: true },
    ],
  },
  {
    id: 'assessment',
    n: '03',
    label: 'Write the assessment',
    when: 'Through July, closing 24 July',
    accent: CYAN,
    promise: 'Evidence-led across all four dimensions.',
    blurb: 'With your colleague\'s own thinking on the table, write a 4A assessment for each direct report in scope. The quality of what you write is what calibration will be working with. A weak assessment cannot be rescued in the room. A strong one earns the room\'s time on cases that need it more, and protects you from being asked to defend a rating without the evidence to back it.',
    tools: [
      { title: 'Potential Workshop', href: 'Holcim Potential Workshop.html', time: '20 min', blurb: 'A facilitated walk through two case studies. Trains you to read evidence the way calibration will read yours. The most useful preparation before you write.', primary: true },
      { title: '4A Assessment', href: '4A Assessment.html', time: '45 min per report', blurb: 'The form itself, with prompts and quality checks per dimension. Use this when you are ready to write.' },
      { title: 'Conversation Cards', href: 'Conversation Cards.html', time: 'Reference', blurb: 'A printable reference. Questions to ask yourself against each of the 4As before you submit, and the patterns calibrators will look for.' },
    ],
  },
  {
    id: 'calibration',
    n: '04',
    label: 'Regional calibration',
    when: '1 to 31 August',
    accent: CYAN,
    promise: 'Take part in the regional calibration session.',
    blurb: 'Regional calibration sessions run across North, Midlands and South. You may be asked to talk through your assessments with other managers and Heads of People. The skill is being clear on the evidence behind every rating you wrote, and being open to seeing what others see. If you have done the work earlier in the cycle, this is where it pays off.',
    tools: [
      { title: 'Evidence Challenge Trainer', href: 'Evidence Challenge Trainer.html', time: '12 min', blurb: 'Pre-work for the regional session. Four short cases drawn from the patterns that come up most. Sharpens how you read evidence, including your own.', primary: true },
      { title: 'Conversation Cards', href: 'Conversation Cards.html', time: 'Reference', blurb: 'Open in the room. Questions against each of the 4As, and the patterns that come up most often. Single double-sided A4 sheet when printed.' },
    ],
  },
  {
    id: 'feedback',
    n: '05',
    label: 'The development conversation',
    when: 'September onwards',
    accent: NAVY2,
    promise: 'A real conversation about development, kept live afterwards.',
    blurb: 'After calibration, every direct report in scope gets a development conversation with you. You do not share ratings. You do not share succession plans. What you do share is honest feedback on their strengths and the areas where they can grow, and an agreed development action you will support. The conversation is then kept live in your ongoing one-to-ones. This is where the cycle pays back, or fails to.',
    tools: [
      { title: 'Manager Career Conversation Kit', href: 'Manager Career Conversation Kit.html', time: '20 min', blurb: 'Use the Run and Follow-up sections. Built so the conversation focuses on development and the action, not the rating behind it.', primary: true },
    ],
  },
];

function App() {
  const onJump = (id) => {
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  };
  return (
    <div style={{ minHeight: '100vh', background: BG }}>
      <Header />
      <div style={{ maxWidth: 1080, margin: '0 auto', padding: '32px 24px 80px' }}>
        <Hero onJump={onJump} />
        <DualRoleCallout />
        <Strip onJump={onJump} />
        {PHASES.map(p => <PhaseSection key={p.id} phase={p} />)}
      </div>
      <Footer />
    </div>
  );
}

    <footer style={{ borderTop: `1px solid ${LINE}`, padding: '24px 32px', textAlign: 'center', fontSize: 12, color: MUTE, fontFamily: 'Reddit Sans' }}>

    </footer>

function Hero({ onJump }) {
  return (
    <div style={{ background: NAVY, color: '#fff', borderRadius: 20, padding: '52px 48px 44px', position: 'relative', overflow: 'hidden', marginBottom: 24 }}>
      <div aria-hidden style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 4, background: BRAND_GRADIENT }} />
      <div aria-hidden style={{ position: 'absolute', right: -120, bottom: -140, width: 360, height: 360, borderRadius: '50%', background: `radial-gradient(circle, ${CYAN}33, transparent 70%)` }} />
      <div style={{ position: 'relative', maxWidth: 720 }}>
        <div style={{ fontSize: 11, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 2, color: CYAN, textTransform: 'uppercase', marginBottom: 18 }}>Your part of the cycle, in five phases</div>
        <h1 style={{ fontFamily: 'Montserrat', fontWeight: 800, fontSize: 48, lineHeight: 1.06, margin: '0 0 22px', letterSpacing: -1.2 }}>
          Your guide to <Stroke fontSize={48} darkBg>talent review.</Stroke>
        </h1>
        <p style={{ fontSize: 17, lineHeight: 1.6, color: 'rgba(255,255,255,0.85)', maxWidth: 660, margin: '0 0 24px' }}>
          As a line manager you sit at the centre of the cycle. You listen to your direct reports, write the assessment, take part in calibration, and run the development conversation that follows. Each phase has its own work and the tools we use for it.
        </p>
        <button onClick={() => onJump('brief')} style={{ padding: '13px 22px', borderRadius: 10, background: '#fff', color: NAVY, fontFamily: 'Montserrat', fontWeight: 700, fontSize: 14.5, letterSpacing: 0.3, display: 'inline-flex', alignItems: 'center', gap: 10 }}>
          Start at the briefing <span>→</span>
        </button>
      </div>
    </div>
  );
}

function DualRoleCallout() {
  return (
    <div style={{ background: '#fef8e8', border: `1px solid #fcd34d`, borderRadius: 12, padding: '16px 20px', marginBottom: 36, display: 'flex', gap: 14, alignItems: 'flex-start' }}>
      <div style={{ flexShrink: 0, width: 26, height: 26, borderRadius: '50%', background: AMBER, color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'Montserrat', fontWeight: 800, fontSize: 13 }}>!</div>
      <div>
        <div style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 13.5, color: '#92400e', letterSpacing: 0.2, marginBottom: 4 }}>If your role is also in scope, you wear two hats this cycle.</div>
        <div style={{ fontSize: 13.5, lineHeight: 1.55, color: '#1f2937' }}>You complete a self-assessment as a colleague before you assess your team as a manager. Start with Career Reflections and your own form. Your manager will run the input conversation with you, the same way you will run it with your team.</div>
      </div>
    </div>
  );
}

function Strip({ onJump }) {
  return (
    <div style={{ marginBottom: 48 }}>
      <div style={{ fontSize: 11, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 1.8, color: NAVY, textTransform: 'uppercase', marginBottom: 14 }}>The five phases</div>
      <div style={{ position: 'relative', padding: '12px 0 4px' }}>
        <div aria-hidden style={{ position: 'absolute', left: 40, right: 40, top: 46, height: 2, background: BRAND_GRADIENT, opacity: 0.35, borderRadius: 999 }} />
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 10, position: 'relative' }}>
          {PHASES.map(p => (
            <button key={p.id} onClick={() => onJump(p.id)} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', textAlign: 'center', padding: '0 4px' }}>
              <div style={{
                width: 56, height: 56, borderRadius: '50%', background: '#fff',
                border: `3px solid ${p.accent}`,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontFamily: 'Montserrat', fontWeight: 800, fontSize: 15, color: NAVY,
                boxShadow: '0 4px 12px rgba(4,23,57,0.06)',
                marginBottom: 12, transition: 'transform .15s',
              }}
              onMouseEnter={(e) => e.currentTarget.style.transform = 'translateY(-2px)'}
              onMouseLeave={(e) => e.currentTarget.style.transform = 'translateY(0)'}
              >{p.n}</div>
              <div style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 12.5, color: NAVY, lineHeight: 1.3, marginBottom: 3, maxWidth: 160 }}>{p.label}</div>
              <div style={{ fontSize: 11, color: MUTE, fontFamily: 'Reddit Sans' }}>{p.when}</div>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

function PhaseSection({ phase }) {
  return (
    <section id={phase.id} style={{ marginBottom: 56, scrollMarginTop: 96 }}>
      <div style={{ display: 'flex', alignItems: 'flex-start', gap: 22, marginBottom: 24 }}>
        <div style={{
          flexShrink: 0,
          width: 72, height: 72, borderRadius: '50%',
          background: '#fff', border: `3px solid ${phase.accent}`,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontFamily: 'Montserrat', fontWeight: 800, fontSize: 22, color: NAVY,
          boxShadow: '0 6px 18px rgba(4,23,57,0.07)',
        }}>{phase.n}</div>
        <div style={{ flex: 1, paddingTop: 6 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 6, flexWrap: 'wrap' }}>
            <div style={{ fontSize: 11, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 1.8, color: phase.accent, textTransform: 'uppercase' }}>Phase {phase.n} · {phase.label}</div>
            <div style={{ fontSize: 11.5, color: MUTE, fontFamily: 'Reddit Sans', padding: '3px 9px', borderRadius: 999, background: SOFT, fontWeight: 500 }}>{phase.when}</div>
          </div>
          <h2 style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 24, color: NAVY, margin: '0 0 10px', letterSpacing: -0.3 }}>{phase.promise}</h2>
          <p style={{ fontSize: 14.5, color: SLATE, lineHeight: 1.65, margin: 0, maxWidth: 760 }}>{phase.blurb}</p>
        </div>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(320px, 1fr))', gap: 14, marginLeft: 94 }}>
        {phase.tools.map((t, i) => <ToolCard key={i} tool={t} accent={phase.accent} />)}
      </div>
    </section>
  );
}

function ToolCard({ tool, accent }) {
  const [hover, setHover] = useState(false);
  return (
    <a href={tool.href} onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{
        display: 'flex', flexDirection: 'column',
        background: '#fff', border: `1px solid ${hover ? accent : LINE}`,
        borderLeft: `3px solid ${accent}`, borderRadius: 12, padding: '20px 22px 18px',
        cursor: 'pointer', textDecoration: 'none',
        transition: 'transform .15s ease, box-shadow .15s ease, border-color .15s ease',
        transform: hover ? 'translateY(-2px)' : 'translateY(0)',
        boxShadow: hover ? '0 12px 28px rgba(4,23,57,0.10)' : '0 1px 0 rgba(4,23,57,0.02)',
        position: 'relative', overflow: 'hidden',
      }}>
      {tool.primary && (
        <div style={{ position: 'absolute', top: 14, right: 14, fontSize: 9.5, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 0.8, color: '#3d7d18', background: '#f0fbf3', border: `1px solid ${LIME}55`, padding: '3px 7px', borderRadius: 4, textTransform: 'uppercase' }}>Start here</div>
      )}
      <div style={{ fontSize: 11.5, color: MUTE, fontFamily: 'Montserrat', fontWeight: 600, marginBottom: 8 }}>{tool.time}</div>
      <h3 style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 17, color: NAVY, margin: '0 0 8px', letterSpacing: -0.3 }}>{tool.title}</h3>
      <p style={{ fontSize: 13.5, lineHeight: 1.6, color: SLATE, margin: '0 0 14px', flex: 1 }}>{tool.blurb}</p>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, color: NAVY, fontFamily: 'Montserrat', fontWeight: 700, fontSize: 13 }}>
        <span>Open</span>
        <span style={{ transition: 'transform .15s ease', transform: hover ? 'translateX(4px)' : 'translateX(0)' }}>→</span>
      </div>
    </a>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
