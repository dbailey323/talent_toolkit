<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const NAVY = '#041739';
const NAVY2 = '#164375';
const CYAN = '#05b7ed';
const LIME = '#65c12a';
const SLATE = '#3d5070';
const AMBER = '#d97706';
const BRAND_GRADIENT = 'linear-gradient(90deg, #65c12a 0%, #05b7ed 50%, #164375 100%)';
const PAPER = '#ffffff';
const BG = '#f4f6fa';
const MUTE = '#6b7280';
const LINE = '#e5e7eb';
const SOFT = '#f1f5f9';

const STORAGE_KEY = 'holcim_profile_draft_v1';

function loadDraft() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; }
}
function saveDraft(d) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
  return d;
}

function wordCount(s) {
  if (!s) return 0;
  return s.trim().split(/\s+/).filter(Boolean).length;
}

function Stroke({ children, fontSize = 44, darkBg = false }) {
  const h = Math.round(fontSize * 0.24);
  const ext = Math.round(fontSize / 6);
  return (
    <span style={{ display: 'inline-block', position: 'relative' }}>
      <span style={{ position: 'absolute', left: -ext, right: -ext, bottom: Math.round(fontSize * 0.05), height: h, background: BRAND_GRADIENT, zIndex: 0 }} />
      <span style={{ position: 'relative', zIndex: 1, color: darkBg ? '#fff' : 'inherit' }}>{children}</span>
    </span>
  );
}

// ── Field guide ────────────────────────────────────────────────────────────
const FIELDS = [
  {
    group: 'About you',
    items: [
      { label: 'Employee ID, name, band, Holcim tenure, current role, time in role, business unit, location, region', body: 'Mostly pre-filled or short answers. Double-check accuracy.' },
    ],
  },
  {
    group: 'Mobility and direction',
    items: [
      { label: 'Current working region', body: 'Which UK regions you could realistically cover from your current location.' },
      { label: 'Regional mobility', body: 'Which UK regions you would be willing to physically relocate to. Be honest about what you would actually do.' },
      { label: 'Global mobility', body: 'Whether you would relocate internationally. Yes, no, or only under certain conditions.' },
      { label: 'Preferred future career direction', body: 'Your preferred direction over the next few years, not your immediate next job. Examples: progress within current business area, broaden across functions, technical or specialist track, leadership track.' },
    ],
  },
  {
    group: 'Experience and contribution',
    items: [
      { label: 'Experience overview to date', body: 'A short table of your roles, the size of teams you have led, the scale you have operated at, and any commercial responsibility (EBIT, revenue).' },
      { label: 'Standout achievements to date', body: 'Up to four. 50 words each. Pick achievements that show what you can do, not what your team did. Lead with the outcome.' },
      { label: 'Key development priorities', body: 'Up to four. 50 words each. The experiences or skills you need to be ready for the role you have in mind.' },
      { label: 'Career aspirations', body: '200 words max. Where you see your career heading and why. Be specific where you can.' },
    ],
  },
  {
    group: 'Qualifications and performance',
    items: [
      { label: 'Professional and academic qualifications', body: 'Qualification, institution, year, grade, status. Keep it to what is current and relevant.' },
      { label: 'Holcim performance trajectory', body: 'Your last three performance ratings. Pre-filled. Double-check the years.' },
    ],
  },
  {
    group: 'Submit',
    items: [
      { label: 'Form status, confirmation and submitted date', body: 'Submit when you are satisfied this reflects your current view. You can revisit before the form closes.' },
    ],
  },
];

const DEFAULT_DRAFT = {
  achievements: ['', '', '', ''],
  priorities: ['', '', '', ''],
  aspirations: '',
};

function App() {
  const [draft, setDraft] = useState(() => ({ ...DEFAULT_DRAFT, ...loadDraft() }));
  const update = (patch) => { const next = saveDraft({ ...draft, ...patch }); setDraft(next); };

  const setAch = (i, v) => update({ achievements: draft.achievements.map((x, j) => j === i ? v : x) });
  const setPri = (i, v) => update({ priorities: draft.priorities.map((x, j) => j === i ? v : x) });

  const onJump = (id) => { const el = document.getElementById(id); if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' }); };

  return (
    <div style={{ minHeight: '100vh', background: BG }}>
      <Header />
      <div style={{ maxWidth: 1040, margin: '0 auto', padding: '32px 24px 80px' }}>
        <Hero onJump={onJump} />
        <ImportantBanner />
        <FormOverview />
        <DraftingSection draft={draft} setAch={setAch} setPri={setPri} setAspirations={(v) => update({ aspirations: v })} />
        <Closer />
      </div>
      <Footer />
    </div>
  );
}

            <div style={{ fontSize: 10, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 1.6, color: CYAN, textTransform: 'uppercase' }}>For colleagues in scope for Talent Review</div>

function Footer() {
  return (
    <footer style={{ borderTop: `1px solid ${LINE}`, padding: '20px 32px', textAlign: 'center', fontSize: 12, color: MUTE, fontFamily: 'Reddit Sans' }}>
      Prepare your Colleague Talent Profile · Holcim UK · Drafts saved only on this device
    </footer>
  );
}

function Hero({ onJump }) {
  return (
    <div style={{ background: NAVY, color: '#fff', borderRadius: 20, padding: '44px 44px 40px', position: 'relative', overflow: 'hidden', marginBottom: 36 }}>
      <div aria-hidden style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 4, background: BRAND_GRADIENT }} />
      <div aria-hidden style={{ position: 'absolute', right: -120, bottom: -140, width: 320, height: 320, borderRadius: '50%', background: `radial-gradient(circle, ${CYAN}33, transparent 70%)` }} />
      <div style={{ position: 'relative', maxWidth: 720 }}>
        <h1 style={{ fontFamily: 'Montserrat', fontWeight: 800, fontSize: 40, lineHeight: 1.08, margin: '0 0 18px', letterSpacing: -1 }}>
          Get your profile ready, in your <Stroke fontSize={40} darkBg>own words.</Stroke>
        </h1>
        <p style={{ fontSize: 16, lineHeight: 1.65, color: 'rgba(255,255,255,0.85)', maxWidth: 660, margin: '0 0 12px' }}>
          You will receive a Colleague Talent Profile form to complete as part of Talent Review. This page walks you through what is in the form, gives you a private place to draft the harder answers, and helps you turn up with something you would put your name to.
        </p>
        <p style={{ fontSize: 14, lineHeight: 1.65, color: 'rgba(255,255,255,0.7)', maxWidth: 660, margin: '0 0 24px' }}>
          Drafts are saved on this device. Nothing reaches Holcim until you fill in the actual form.
        </p>
        <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
          <button onClick={() => onJump('drafting')} style={{ padding: '12px 20px', borderRadius: 10, background: CYAN, color: NAVY, fontFamily: 'Montserrat', fontWeight: 700, fontSize: 13.5, letterSpacing: 0.3, display: 'inline-flex', alignItems: 'center', gap: 10 }}>
            Start drafting <span>→</span>
          </button>
          <button onClick={() => onJump('overview')} style={{ padding: '12px 20px', borderRadius: 10, background: 'transparent', color: '#fff', border: '1px solid rgba(255,255,255,0.3)', fontFamily: 'Montserrat', fontWeight: 600, fontSize: 13.5, letterSpacing: 0.3 }}>
            See what is in the form
          </button>
        </div>
      </div>
    </div>
  );
}

function ImportantBanner() {
  return (
    <div style={{
      background: '#fef8e8', border: `1px solid #fcd34d`, borderLeft: `4px solid ${AMBER}`,
      borderRadius: 12, padding: '18px 22px', marginBottom: 36,
      display: 'flex', gap: 16, alignItems: 'flex-start',
    }}>
      <div style={{ flexShrink: 0, width: 28, height: 28, borderRadius: '50%', background: AMBER, color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'Montserrat', fontWeight: 800, fontSize: 14 }}>!</div>
      <div>
        <div style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 14, color: '#92400e', marginBottom: 8, letterSpacing: 0.2 }}>Two things to know before you start</div>
        <ul style={{ margin: 0, paddingLeft: 18, fontSize: 13.5, lineHeight: 1.7, color: '#1f2937' }}>
          <li style={{ marginBottom: 4 }}><strong style={{ fontFamily: 'Montserrat', fontWeight: 700 }}>Complete the form sent to you.</strong> Your Colleague Talent Profile is sent to you personally. Fill it in there. Do not copy or share the file. Copying it will not save your responses.</li>
          <li><strong style={{ fontFamily: 'Montserrat', fontWeight: 700 }}>Your manager will see it once you submit.</strong> When their input window opens, they will have a read-only view of your profile. This is to help them understand your experience and aspirations before they prepare their part. It is not the assessment.</li>
        </ul>
      </div>
    </div>
  );
}

function FormOverview() {
  return (
    <section id="overview" style={{ marginBottom: 56, scrollMarginTop: 96 }}>
      <div style={{ fontSize: 11, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 1.8, color: NAVY, textTransform: 'uppercase', marginBottom: 8 }}>What is in the form</div>
      <h2 style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 26, color: NAVY, margin: '0 0 22px', letterSpacing: -0.4 }}>A short tour, before you open it.</h2>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
        {FIELDS.map((g, i) => (
          <div key={i} style={{ background: PAPER, border: `1px solid ${LINE}`, borderRadius: 12, padding: '18px 22px' }}>
            <div style={{ fontSize: 11, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 1.2, color: CYAN, textTransform: 'uppercase', marginBottom: 12 }}>{g.group}</div>
            <ul style={{ margin: 0, padding: 0, listStyle: 'none', display: 'flex', flexDirection: 'column', gap: 10 }}>
              {g.items.map((it, j) => (
                <li key={j} style={{ display: 'grid', gridTemplateColumns: '1fr 2fr', gap: 16, alignItems: 'baseline' }}>
                  <div style={{ fontFamily: 'Montserrat', fontWeight: 600, fontSize: 13.5, color: NAVY }}>{it.label}</div>
                  <div style={{ fontSize: 13.5, color: SLATE, lineHeight: 1.6 }}>{it.body}</div>
                </li>
              ))}
            </ul>
          </div>
        ))}
      </div>
    </section>
  );
}

function DraftingSection({ draft, setAch, setPri, setAspirations }) {
  return (
    <section id="drafting" style={{ marginBottom: 48, scrollMarginTop: 96 }}>
      <div style={{ fontSize: 11, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 1.8, color: NAVY, textTransform: 'uppercase', marginBottom: 8 }}>Draft the harder answers</div>
      <h2 style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 26, color: NAVY, margin: '0 0 14px', letterSpacing: -0.4 }}>Three sections, the ones most people get stuck on.</h2>
      <p style={{ fontSize: 14.5, lineHeight: 1.65, color: SLATE, margin: '0 0 24px', maxWidth: 800 }}>
        Use these boxes to draft your achievements, development priorities and career aspirations. You can copy each one across when you fill in the real form. Word counts match the limits in the form itself.
      </p>

      <DraftBlock
        accent={LIME}
        title="Standout achievements to date"
        intro="Up to four. 50 words each. Pick achievements that show what you can do, not what your team did. Lead with the outcome, then how you got there."
        items={draft.achievements}
        setItem={setAch}
        wordLimit={50}
        placeholder={'e.g. "Led the integration of two regional teams into a single commercial function, delivering £1.4M of synergy in the first year while keeping voluntary attrition below 5%."'}
        examples={{
          good: [
            'Leads with the outcome.',
            'Names a specific role you played.',
            'Includes numbers where they help.',
            'Sounds like you, not a job advert.',
          ],
          bad: [
            'Generic strengths like "strong leader".',
            'A list of responsibilities, not results.',
            'Credit that really belongs to your team.',
          ],
        }}
      />

      <DraftBlock
        accent={CYAN}
        title="Key development priorities"
        intro="Up to four. 50 words each. The experiences or skills you need to be ready for the direction you want to go. Be honest. Vague priorities produce vague feedback."
        items={draft.priorities}
        setItem={setPri}
        wordLimit={50}
        placeholder={'e.g. "Direct P&L responsibility. I have led operations and led commercial separately, but never owned the full P&L. A rotation or stretch where the numbers stop at me."'}
        examples={{
          good: [
            'Names a specific experience or skill.',
            'Connects to where you want to go.',
            'Honest about what you have not yet done.',
          ],
          bad: [
            '"Develop my leadership."',
            '"Get better at communication."',
            '"More strategic thinking."',
          ],
        }}
      />

      <SingleDraftBlock
        accent={NAVY2}
        title="Career aspirations"
        intro="One block, up to 200 words. Where you see your career heading and why. Be specific where you can. If your view has changed in the last year, say so."
        value={draft.aspirations}
        setValue={setAspirations}
        wordLimit={200}
        placeholder={'e.g. "Over the next three to five years I want to broaden into a regional commercial role with P&L responsibility, moving from operations into general management..."'}
      />

      <PrepareTips />
    </section>
  );
}

function DraftBlock({ accent, title, intro, items, setItem, wordLimit, placeholder, examples }) {
  return (
    <div style={{ background: PAPER, border: `1px solid ${LINE}`, borderLeft: `4px solid ${accent}`, borderRadius: 12, padding: '20px 22px', marginBottom: 18 }}>
      <h3 style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 17, color: NAVY, margin: '0 0 6px', letterSpacing: -0.2 }}>{title}</h3>
      <p style={{ fontSize: 13.5, color: SLATE, lineHeight: 1.6, margin: '0 0 16px' }}>{intro}</p>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 12, marginBottom: 16 }}>
        {items.map((v, i) => (
          <DraftItem key={i} idx={i} value={v} onChange={(x) => setItem(i, x)} wordLimit={wordLimit} placeholder={i === 0 ? placeholder : ''} />
        ))}
      </div>

      {examples && (
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
          <ExamplePanel kind="good" lines={examples.good} />
          <ExamplePanel kind="bad" lines={examples.bad} />
        </div>
      )}
    </div>
  );
}

function SingleDraftBlock({ accent, title, intro, value, setValue, wordLimit, placeholder }) {
  const wc = wordCount(value);
  const over = wc > wordLimit;
  const [copied, setCopied] = useState(false);
  const copy = async () => {
    if (!value) return;
    try { await navigator.clipboard.writeText(value); setCopied(true); setTimeout(() => setCopied(false), 1400); } catch { /* */ }
  };
  return (
    <div style={{ background: PAPER, border: `1px solid ${LINE}`, borderLeft: `4px solid ${accent}`, borderRadius: 12, padding: '20px 22px', marginBottom: 18 }}>
      <h3 style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 17, color: NAVY, margin: '0 0 6px', letterSpacing: -0.2 }}>{title}</h3>
      <p style={{ fontSize: 13.5, color: SLATE, lineHeight: 1.6, margin: '0 0 14px' }}>{intro}</p>
      <textarea
        value={value}
        onChange={(e) => setValue(e.target.value)}
        placeholder={placeholder}
        rows={6}
        style={{
          width: '100%', resize: 'vertical', border: `1px solid ${over ? '#fca5a5' : LINE}`, borderRadius: 10,
          padding: '12px 14px', fontFamily: 'Reddit Sans', fontSize: 14.5, color: '#1f2937',
          background: '#fff', lineHeight: 1.55,
        }}
        onFocus={e => e.target.style.borderColor = CYAN}
        onBlur={e => e.target.style.borderColor = over ? '#fca5a5' : LINE}
      />
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 8 }}>
        <div style={{ fontSize: 11.5, fontFamily: 'Montserrat', fontWeight: 600, color: over ? '#b91c1c' : MUTE }}>{wc} / {wordLimit} words</div>
        <button onClick={copy} disabled={!value} style={{
          fontSize: 11.5, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 0.3,
          padding: '5px 11px', borderRadius: 6,
          background: copied ? LIME : (value ? NAVY : '#e5e7eb'),
          color: copied ? '#fff' : (value ? '#fff' : MUTE),
          cursor: value ? 'pointer' : 'not-allowed',
        }}>{copied ? 'Copied' : 'Copy'}</button>
      </div>
    </div>
  );
}

function DraftItem({ idx, value, onChange, wordLimit, placeholder }) {
  const wc = wordCount(value);
  const over = wc > wordLimit;
  const [copied, setCopied] = useState(false);
  const copy = async () => {
    if (!value) return;
    try { await navigator.clipboard.writeText(value); setCopied(true); setTimeout(() => setCopied(false), 1400); } catch { /* */ }
  };
  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 5 }}>
        <div style={{ fontSize: 11, fontFamily: 'Montserrat', fontWeight: 700, color: NAVY, letterSpacing: 0.4, textTransform: 'uppercase' }}>Entry {idx + 1}</div>
        <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
          <div style={{ fontSize: 11, fontFamily: 'Montserrat', fontWeight: 600, color: over ? '#b91c1c' : MUTE }}>{wc} / {wordLimit}</div>
          <button onClick={copy} disabled={!value} style={{
            fontSize: 11, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 0.2,
            padding: '3px 8px', borderRadius: 5,
            background: copied ? LIME : (value ? NAVY : '#e5e7eb'),
            color: copied ? '#fff' : (value ? '#fff' : MUTE),
            cursor: value ? 'pointer' : 'not-allowed',
          }}>{copied ? '✓' : 'Copy'}</button>
        </div>
      </div>
      <textarea
        value={value}
        onChange={(e) => onChange(e.target.value)}
        placeholder={placeholder}
        rows={3}
        style={{
          width: '100%', resize: 'vertical', border: `1px solid ${over ? '#fca5a5' : LINE}`, borderRadius: 8,
          padding: '10px 12px', fontFamily: 'Reddit Sans', fontSize: 14, color: '#1f2937',
          background: '#fff', lineHeight: 1.55,
        }}
        onFocus={e => e.target.style.borderColor = CYAN}
        onBlur={e => e.target.style.borderColor = over ? '#fca5a5' : LINE}
      />
    </div>
  );
}

function ExamplePanel({ kind, lines }) {
  const styles = kind === 'good'
    ? { bg: '#f0fbf3', border: `${LIME}55`, label: 'Sounds like good', labelColor: '#3d7d18' }
    : { bg: '#fef3f2', border: '#fca5a555', label: 'Watch out for', labelColor: '#b91c1c' };
  return (
    <div style={{ background: styles.bg, border: `1px solid ${styles.border}`, borderRadius: 8, padding: '10px 12px' }}>
      <div style={{ fontSize: 10.5, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 1, color: styles.labelColor, textTransform: 'uppercase', marginBottom: 6 }}>{styles.label}</div>
      <ul style={{ margin: 0, paddingLeft: 16, fontSize: 12.5, lineHeight: 1.5, color: '#1f2937' }}>
        {lines.map((l, i) => <li key={i} style={{ marginBottom: 2 }}>{l}</li>)}
      </ul>
    </div>
  );
}

function PrepareTips() {
  return (
    <div style={{ background: NAVY, color: '#fff', borderRadius: 14, padding: '24px 26px', marginTop: 10, position: 'relative', overflow: 'hidden' }}>
      <div aria-hidden style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 3, background: BRAND_GRADIENT }} />
      <div style={{ fontSize: 11, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 1.6, color: CYAN, textTransform: 'uppercase', marginBottom: 10 }}>If you are stuck</div>
      <p style={{ fontSize: 14, lineHeight: 1.65, color: 'rgba(255,255,255,0.85)', margin: '0 0 10px' }}>
        Open <a href="Holcim Career Reflections.html" style={{ color: '#fff', textDecoration: 'underline' }}>Career Reflections</a> in another tab and spend ten minutes on the Self and Work lenses. Most of what goes into your achievements and aspirations falls out of that thinking. Come back here and write the form-ready versions.
      </p>
    </div>
  );
}

function Closer() {
  return (
    <section style={{ background: PAPER, border: `1px solid ${LINE}`, borderRadius: 14, padding: '28px 30px', marginTop: 12 }}>
      <div style={{ fontSize: 11, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 1.8, color: NAVY, textTransform: 'uppercase', marginBottom: 8 }}>When you are ready</div>
      <h3 style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 20, color: NAVY, margin: '0 0 12px', letterSpacing: -0.3 }}>Open the form and paste your drafts across.</h3>
      <p style={{ fontSize: 14.5, lineHeight: 1.65, color: SLATE, margin: '0 0 14px', maxWidth: 760 }}>
        Use the Copy buttons next to each draft to lift your text into the right rows of the Colleague Talent Profile. Tick the confirmation, set the status to Submitted, and that part of your Talent Review is done. You can revisit the form before it closes if your view shifts.
      </p>
      <p style={{ fontSize: 13.5, lineHeight: 1.65, color: MUTE, margin: '0 0 16px', maxWidth: 760 }}>
        Once submitted, your manager will get a read-only view of your profile when their input window opens. It is there so they can understand your experience and ambitions before they prepare their part of the review.
      </p>
      <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
        <a href="Colleague Guide.html" style={{ padding: '11px 18px', borderRadius: 10, background: '#fff', color: NAVY, border: `1px solid ${LINE}`, fontFamily: 'Montserrat', fontWeight: 600, fontSize: 13.5 }}>
          Read the Colleague Guide
        </a>
        <a href="For Colleagues.html" style={{ padding: '11px 18px', borderRadius: 10, background: '#fff', color: NAVY, border: `1px solid ${LINE}`, fontFamily: 'Montserrat', fontWeight: 600, fontSize: 13.5 }}>
          Back to career tools
        </a>
      </div>
    </section>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
