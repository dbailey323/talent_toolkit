<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

// ── Holcim brand ──────────────────────────────────────────────────────────────
const NAVY = '#041739';
const NAVY2 = '#164375';
const CYAN = '#05b7ed';
const LIME = '#65c12a';
const SLATE = '#3d5070';
const BRAND_GRADIENT = 'linear-gradient(90deg, #65c12a 0%, #05b7ed 50%, #164375 100%)';
const BG = '#f4f6fa';
const MUTE = '#6b7280';
const LINE = '#e5e7eb';
const PAPER = '#ffffff';

// ── Storage ──────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'holcim_manager_conv_kit_v1';

const blankConv = (name = '') => ({
  id: 'c_' + Math.random().toString(36).slice(2, 9),
  name,
  date: new Date().toISOString().slice(0, 10),
  created: Date.now(),
  prep: { who: '', great: '', worry: '', story: '', counter: '', leave: [] },
  run: { openingPicked: '', deeperPicked: [], closingPicked: '' },
  listen: { aspiration: '', ability: '', awareness: '', agility: '', surprise: '', missing: '' },
  follow: { they: '', me: '', revisit: '', share: '' },
});

function loadAll() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return [];
    return JSON.parse(raw);
  } catch (_) { return []; }
}
function saveAll(convs) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(convs)); } catch (_) {}
}

// ── Content ──────────────────────────────────────────────────────────────────
const PREP_PROMPTS = [
  {
    key: 'who',
    title: 'Forget the job title. Who is this person, in your own words?',
    sub: 'Two or three sentences. The version you’d describe to a peer over coffee, not the version on the org chart.',
    placeholder: 'They are…',
  },
  {
    key: 'great',
    title: 'What are they specifically great at?',
    sub: 'Not "a team player". The thing you would genuinely miss if they were gone tomorrow. Be precise.',
    placeholder: 'They are great at…',
  },
  {
    key: 'worry',
    title: 'What is the honest worry you carry about their career?',
    sub: 'The thing you would raise in a calibration if someone asked. Even if you have never said it out loud to them.',
    placeholder: 'I worry that…',
  },
  {
    key: 'story',
    title: 'What story have you told yourself about what they want - and how confident are you?',
    sub: 'If you wrote down their aspiration here, would they recognise it as theirs?',
    placeholder: 'I think they want… and I am [confident / unsure] because…',
  },
  {
    key: 'counter',
    title: 'If they came in tomorrow with an outside offer, what would you actually do?',
    sub: 'Be honest. Match? Negotiate? Wish them well? The answer tells you what kind of conversation this needs to be.',
    placeholder: 'I would…',
  },
];

const LEAVE_AT_DOOR = [
  'The slot I secretly hope they will fill',
  'My reading of their last performance review',
  'The unresolved frustration from last week',
  'The career path I wish I had had',
  'My need to look like I have a plan',
];

const OPENERS = [
  {
    text: 'I want this to be your conversation, not mine. What kind of conversation do you want it to be?',
    why: 'Hands them control. Tells you whether they came to vent, plan, ask, or test something.',
  },
  {
    text: 'Tell me what is on your mind about your career - not what you think I want to hear.',
    why: 'Names the filter most people apply in 1:1s, and gives them permission to drop it.',
  },
  {
    text: 'If we had this conversation a year ago, what would you have wanted me to ask you?',
    why: 'Brings in regret and what they wish had been different. Often the truest answer of the day.',
  },
  {
    text: 'Where do you feel like you are right now - stuck, building, stretching, drifting, ready to move?',
    why: 'Gives them a vocabulary, makes the abstract concrete fast.',
  },
];

const DEEPER = [
  {
    cue: 'If they are vague…',
    ask: 'Tell me about the last time work felt like the right fit. What were you doing, and who were you with?',
    listen: 'Listen for the conditions, not the role. People are vague about ambition; they are specific about good days.',
  },
  {
    cue: 'If they say "I’m fine"…',
    ask: 'What would have to change for "fine" to become "good"?',
    listen: 'Fine is rarely fine. The answer surfaces the real friction without asking them to complain.',
  },
  {
    cue: 'If they pitch a specific role…',
    ask: 'What about that role specifically - the work, the title, the people, or the trajectory?',
    listen: 'Most people want one or two of those four. Knowing which changes what you do next.',
  },
  {
    cue: 'If they are frustrated…',
    ask: 'What is the version of this where you do not leave?',
    listen: 'Forces the constructive answer. Often surfaces a small number of moves that would actually fix it.',
  },
  {
    cue: 'If they go silent or hesitate…',
    ask: 'Take your time. I would rather have the real answer than a quick one.',
    listen: 'Silence is information. Do not rescue them from it.',
  },
  {
    cue: 'If they ask what you think…',
    ask: 'I will tell you, but later. First - what do you think, and what is making you ask me?',
    listen: 'Holds your view back until theirs is fully out. Then your view lands cleaner.',
  },
];

const CLOSERS = [
  {
    text: 'What is one thing you want me to take away from this and act on?',
    why: 'Forces a single clear ask. Better than ten vague ones.',
  },
  {
    text: 'What is one thing you are going to do differently before we next meet?',
    why: 'Puts ownership on both sides. Stops it being a conversation that "happened" with no follow-through.',
  },
  {
    text: 'What did we not talk about today that we should talk about next time?',
    why: 'Ends on the unfinished. Keeps the loop open instead of pretending you closed it.',
  },
];

const LISTEN_LENSES = [
  {
    key: 'aspiration',
    label: 'Aspiration',
    color: LIME,
    prompt: 'What did you actually hear about what they want? Use their words, not your translation.',
  },
  {
    key: 'ability',
    label: 'Ability',
    color: CYAN,
    prompt: 'What did they own as a strength? What did they avoid naming? Where did they undersell themselves?',
  },
  {
    key: 'awareness',
    label: 'Awareness',
    color: NAVY2,
    prompt: 'How did they describe themselves and the system around them? Self-aware, defensive, surprised by feedback?',
  },
  {
    key: 'agility',
    label: 'Agility',
    color: '#7c3aed',
    prompt: 'How are they moving through change right now? Energised, exhausted, leaning in, holding back?',
  },
];

// ── Hero ─────────────────────────────────────────────────────────────────────
function Hero({ onStart }) {
  return (
    <div style={{ background: NAVY, borderRadius: 20, padding: '56px 56px 52px', position: 'relative', overflow: 'hidden', marginBottom: 36 }}>
      <div aria-hidden style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 4, background: BRAND_GRADIENT }} />
      <div aria-hidden style={{ position: 'absolute', right: -100, bottom: -120, width: 320, height: 320, borderRadius: '50%', background: `radial-gradient(circle, ${LIME}33, transparent 70%)` }} />
      <div style={{ position: 'relative', maxWidth: 760 }}>
        <div style={{ fontSize: 11, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 2, color: LIME, textTransform: 'uppercase', marginBottom: 20 }}>For managers · 20 min</div>
        <h1 style={{ fontFamily: 'Montserrat', fontWeight: 800, fontSize: 52, lineHeight: 1.04, margin: '0 0 22px', color: '#fff', letterSpacing: -1.4, textTransform: 'uppercase' }}>
          Run a career conversation that <Stroke fontSize={52} darkBg>actually moves</Stroke> something.
        </h1>
        <p style={{ fontSize: 18, lineHeight: 1.55, color: 'rgba(255,255,255,0.84)', maxWidth: 700, margin: '0 0 28px' }}>
          The colleague reflection asks them to do their thinking. This kit asks you to do yours. Four short stages - prepare, run, listen, follow up. Use it once before the conversation, keep it open during, finish it within a day.
        </p>
        <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap' }}>
          <button onClick={onStart} style={{ padding: '14px 24px', borderRadius: 10, background: '#fff', color: NAVY, fontFamily: 'Montserrat', fontWeight: 700, fontSize: 14.5, letterSpacing: 0.3, display: 'inline-flex', alignItems: 'center', gap: 10 }}>
            Start a new kit <span>→</span>
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Conversation picker ──────────────────────────────────────────────────────
function ConvPicker({ convs, activeId, onPick, onNew, onDelete }) {
  const [creating, setCreating] = useState(false);
  const [name, setName] = useState('');
  return (
    <div style={{ background: '#fff', border: `1px solid ${LINE}`, borderRadius: 14, padding: '18px 22px', marginBottom: 24 }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 16, flexWrap: 'wrap' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 14, flexWrap: 'wrap' }}>
          <div style={{ fontSize: 11, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 1.5, color: MUTE, textTransform: 'uppercase' }}>Your kits</div>
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            {convs.length === 0 && <div style={{ fontSize: 13.5, color: SLATE, fontStyle: 'italic' }}>No kits yet - create one for the next conversation you have.</div>}
            {convs.map(c => (
              <button key={c.id} onClick={() => onPick(c.id)} style={{
                padding: '7px 14px', borderRadius: 999,
                background: c.id === activeId ? NAVY : '#f1f5f9',
                color: c.id === activeId ? '#fff' : NAVY,
                fontFamily: 'Montserrat', fontWeight: 600, fontSize: 13,
                border: c.id === activeId ? `1px solid ${NAVY}` : `1px solid ${LINE}`,
              }}>
                {c.name || 'Untitled'} · {c.date}
              </button>
            ))}
          </div>
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          {activeId && (
            <button onClick={() => { if (confirm('Delete this kit? This cannot be undone.')) onDelete(activeId); }} style={{ padding: '7px 14px', borderRadius: 8, background: 'transparent', color: MUTE, fontSize: 12.5, fontFamily: 'Montserrat', fontWeight: 600, border: `1px solid ${LINE}` }}>
              Delete
            </button>
          )}
          {!creating ? (
            <button onClick={() => setCreating(true)} style={{ padding: '7px 14px', borderRadius: 8, background: LIME, color: NAVY, fontSize: 12.5, fontFamily: 'Montserrat', fontWeight: 700 }}>
              + New kit
            </button>
          ) : (
            <div style={{ display: 'flex', gap: 6 }}>
              <input autoFocus value={name} onChange={e => setName(e.target.value)} placeholder="Colleague's first name" style={{ padding: '7px 12px', borderRadius: 8, border: `1px solid ${LINE}`, fontSize: 13, width: 200 }} onKeyDown={e => { if (e.key === 'Enter' && name.trim()) { onNew(name.trim()); setName(''); setCreating(false); } if (e.key === 'Escape') { setCreating(false); setName(''); } }} />
              <button onClick={() => { if (name.trim()) { onNew(name.trim()); setName(''); setCreating(false); } }} style={{ padding: '7px 14px', borderRadius: 8, background: NAVY, color: '#fff', fontSize: 12.5, fontFamily: 'Montserrat', fontWeight: 700 }}>Create</button>
              <button onClick={() => { setCreating(false); setName(''); }} style={{ padding: '7px 12px', color: MUTE, fontSize: 12.5 }}>Cancel</button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Stepper ──────────────────────────────────────────────────────────────────
const STEPS = [
  { id: 'prep', label: 'Prepare', sub: 'Before' },
  { id: 'run', label: 'Run', sub: 'During' },
  { id: 'listen', label: 'Listen', sub: 'During / right after' },
  { id: 'follow', label: 'Follow up', sub: 'Within a day' },
];

function Stepper({ active, onPick, conv }) {
  // Compute progress per step
  const progress = useMemo(() => {
    if (!conv) return { prep: 0, run: 0, listen: 0, follow: 0 };
    const prepCount = PREP_PROMPTS.filter(p => (conv.prep[p.key] || '').trim().length > 20).length;
    const runDone = (conv.run.openingPicked ? 1 : 0) + (conv.run.deeperPicked.length ? 1 : 0) + (conv.run.closingPicked ? 1 : 0);
    const listenCount = LISTEN_LENSES.filter(l => (conv.listen[l.key] || '').trim().length > 10).length + ((conv.listen.surprise || '').trim().length > 5 ? 1 : 0) + ((conv.listen.missing || '').trim().length > 5 ? 1 : 0);
    const followCount = ['they','me','revisit'].filter(k => (conv.follow[k] || '').trim()).length;
    return {
      prep: Math.round(prepCount / PREP_PROMPTS.length * 100),
      run: Math.round(runDone / 3 * 100),
      listen: Math.round(listenCount / (LISTEN_LENSES.length + 2) * 100),
      follow: Math.round(followCount / 3 * 100),
    };
  }, [conv]);

  return (
    <div style={{ background: '#fff', border: `1px solid ${LINE}`, borderRadius: 14, padding: 8, marginBottom: 24, display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 4 }}>
      {STEPS.map((s, i) => {
        const isActive = active === s.id;
        const pct = progress[s.id];
        return (
          <button key={s.id} onClick={() => onPick(s.id)} style={{
            padding: '14px 18px', borderRadius: 10, textAlign: 'left',
            background: isActive ? NAVY : 'transparent',
            color: isActive ? '#fff' : NAVY,
            position: 'relative', overflow: 'hidden',
            transition: 'background .15s',
          }}>
            <div style={{ fontSize: 10.5, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 1.2, color: isActive ? 'rgba(255,255,255,0.6)' : MUTE, textTransform: 'uppercase', marginBottom: 4 }}>{`Step ${i+1} · ${s.sub}`}</div>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12 }}>
              <div style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 18, letterSpacing: -0.2 }}>{s.label}</div>
              <div style={{
                fontSize: 11, fontFamily: 'Montserrat', fontWeight: 700,
                padding: '2px 9px', borderRadius: 999,
                background: isActive ? 'rgba(255,255,255,0.15)' : (pct === 100 ? '#e8f7e0' : '#f1f5f9'),
                color: isActive ? '#fff' : (pct === 100 ? '#3d7d18' : MUTE),
              }}>{pct}%</div>
            </div>
          </button>
        );
      })}
    </div>
  );
}

// ── Reusable: titled section ─────────────────────────────────────────────────
function SectionHead({ eyebrow, title, blurb, accent }) {
  return (
    <div style={{ marginBottom: 28 }}>
      <div style={{ fontSize: 11, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 2, color: accent || NAVY, textTransform: 'uppercase', marginBottom: 10 }}>{eyebrow}</div>
      <h2 style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 30, margin: '0 0 12px', color: NAVY, letterSpacing: -0.5 }}>{title}</h2>
      {blurb && <p style={{ fontSize: 15.5, color: SLATE, margin: 0, maxWidth: 760, lineHeight: 1.55 }}>{blurb}</p>}
    </div>
  );
}

function PromptCard({ idx, title, sub, value, onChange, placeholder }) {
  return (
    <div style={{ background: '#fff', border: `1px solid ${LINE}`, borderRadius: 14, padding: '24px 26px', position: 'relative', overflow: 'hidden' }}>
      <div aria-hidden style={{ position: 'absolute', left: 0, top: 0, bottom: 0, width: 3, background: BRAND_GRADIENT }} />
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 12, marginBottom: 8 }}>
        <div style={{ fontFamily: 'Montserrat', fontWeight: 800, fontSize: 13, color: CYAN, letterSpacing: 0.6 }}>{String(idx).padStart(2,'0')}</div>
        <h3 style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 18, margin: 0, color: NAVY, letterSpacing: -0.2, lineHeight: 1.3 }}>{title}</h3>
      </div>
      <p style={{ fontSize: 14, color: SLATE, margin: '0 0 16px', lineHeight: 1.5 }}>{sub}</p>
      <textarea value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} rows={4} style={{ width: '100%', padding: '12px 14px', border: `1px solid ${LINE}`, borderRadius: 10, fontSize: 15, lineHeight: 1.55, background: '#fafbfc', color: NAVY }} />

}

// ── Step 1: Prepare ──────────────────────────────────────────────────────────
function PrepStep({ conv, onUpdate }) {
  const update = (key, val) => onUpdate({ ...conv, prep: { ...conv.prep, [key]: val } });
  const toggleLeave = (item) => {
    const cur = conv.prep.leave || [];
    const next = cur.includes(item) ? cur.filter(x => x !== item) : [...cur, item];
    update('leave', next);
  };
  return (
    <div>
      <SectionHead
        eyebrow="Step 1 · Before the conversation"
        title="Do your thinking first."
        blurb="The conversation is theirs. Your prep is yours. These prompts are private to you - not a record, not a script. The point is to walk into the room knowing what you actually believe and what you are still guessing at."
        accent={LIME}
      />
      <div style={{ display: 'grid', gap: 16, marginBottom: 32 }}>
        {PREP_PROMPTS.map((p, i) => (
          <PromptCard key={p.key} idx={i+1} title={p.title} sub={p.sub} value={conv.prep[p.key] || ''} onChange={v => update(p.key, v)} placeholder={p.placeholder} />
        ))}
      </div>

      <div style={{ background: NAVY, borderRadius: 14, padding: '28px 32px', color: '#fff', position: 'relative', overflow: 'hidden' }}>
        <div aria-hidden style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 3, background: BRAND_GRADIENT }} />
        <div style={{ fontSize: 11, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 2, color: LIME, textTransform: 'uppercase', marginBottom: 8 }}>Leave at the door</div>
        <h3 style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 22, margin: '0 0 8px', letterSpacing: -0.3 }}>What are you bringing in that does not belong?</h3>
        <p style={{ fontSize: 14.5, color: 'rgba(255,255,255,0.78)', margin: '0 0 20px', maxWidth: 700, lineHeight: 1.55 }}>Tick anything you notice yourself carrying. Not to fix it now - just to see it before you sit down.</p>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))', gap: 10 }}>
          {LEAVE_AT_DOOR.map(item => {
            const checked = (conv.prep.leave || []).includes(item);
            return (
              <button key={item} onClick={() => toggleLeave(item)} style={{
                padding: '12px 16px', borderRadius: 10, textAlign: 'left',
                background: checked ? 'rgba(101,193,42,0.18)' : 'rgba(255,255,255,0.06)',
                border: `1px solid ${checked ? LIME : 'rgba(255,255,255,0.15)'}`,
                color: '#fff', fontFamily: 'Reddit Sans', fontSize: 14, lineHeight: 1.4,
                display: 'flex', alignItems: 'center', gap: 12,
              }}>
                <div style={{ width: 18, height: 18, borderRadius: 5, border: `2px solid ${checked ? LIME : 'rgba(255,255,255,0.4)'}`, background: checked ? LIME : 'transparent', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                  {checked && <span style={{ color: NAVY, fontSize: 12, fontWeight: 800 }}>✓</span>}
                </div>
                <span>{item}</span>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── Step 2: Run ──────────────────────────────────────────────────────────────
function RunStep({ conv, onUpdate }) {
  const update = (key, val) => onUpdate({ ...conv, run: { ...conv.run, [key]: val } });
  const toggleDeeper = (idx) => {
    const cur = conv.run.deeperPicked || [];
    const next = cur.includes(idx) ? cur.filter(x => x !== idx) : [...cur, idx];
    update('deeperPicked', next);
  };
  return (
    <div>
      <SectionHead
        eyebrow="Step 2 · During the conversation"
        title="A small kit of prompts you can lean on live."
        blurb="Pick one opener. Star a few 'go deeper' prompts you think you might need. Pick one closer. Keep this open on your laptop during the conversation, adult, not theatrical."
        accent={CYAN}
      />

      {/* Openers */}
      <div style={{ marginBottom: 36 }}>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 12, marginBottom: 16 }}>
          <div style={{ fontFamily: 'Montserrat', fontWeight: 800, fontSize: 13, color: CYAN, letterSpacing: 1.2, textTransform: 'uppercase' }}>How to open</div>

        </div>
        <div style={{ display: 'grid', gap: 12 }}>
          {OPENERS.map((o, i) => {

            return (
              <button key={i} onClick={() => update('openingPicked', picked ? '' : o.text)} style={{
                background: picked ? '#fff' : '#fff', border: `2px solid ${picked ? CYAN : LINE}`,
                borderRadius: 12, padding: '20px 24px', textAlign: 'left', position: 'relative',
                transition: 'border-color .15s, transform .15s',
              }}>
                <div style={{ fontFamily: 'Montserrat', fontWeight: picked ? 700 : 600, fontSize: 18, color: NAVY, lineHeight: 1.4, marginBottom: 8, letterSpacing: -0.2 }}>"{o.text}"</div>
                <div style={{ fontSize: 13, color: SLATE, lineHeight: 1.5 }}>{o.why}</div>
                {picked && <div style={{ position: 'absolute', top: 14, right: 16, fontSize: 11, fontFamily: 'Montserrat', fontWeight: 700, color: CYAN, letterSpacing: 1, textTransform: 'uppercase' }}>★ Picked</div>}
              </button>
            );
          })}
        </div>
      </div>

      {/* Deeper */}
      <div style={{ marginBottom: 36 }}>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 12, marginBottom: 16 }}>
          <div style={{ fontFamily: 'Montserrat', fontWeight: 800, fontSize: 13, color: CYAN, letterSpacing: 1.2, textTransform: 'uppercase' }}>How to go deeper</div>
          <div style={{ fontSize: 13, color: MUTE }}>Star the ones that match what you expect to hear.</div>
        </div>
        <div style={{ display: 'grid', gap: 10 }}>
          {DEEPER.map((d, i) => {
            const picked = (conv.run.deeperPicked || []).includes(i);
            return (
              <div key={i} style={{ background: '#fff', border: `1px solid ${picked ? CYAN : LINE}`, borderRadius: 12, padding: '18px 20px', display: 'grid', gridTemplateColumns: '180px 1fr auto', gap: 18, alignItems: 'flex-start' }}>
                <div style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 13, color: NAVY2, letterSpacing: 0.2 }}>{d.cue}</div>
                <div>
                  <div style={{ fontFamily: 'Montserrat', fontWeight: 600, fontSize: 16, color: NAVY, lineHeight: 1.4, marginBottom: 6, letterSpacing: -0.1 }}>"{d.ask}"</div>
                  <div style={{ fontSize: 13, color: SLATE, lineHeight: 1.5, fontStyle: 'italic' }}>{d.listen}</div>
                </div>
                <button onClick={() => toggleDeeper(i)} style={{ padding: '6px 12px', borderRadius: 999, fontSize: 11, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 0.6, textTransform: 'uppercase', background: picked ? CYAN : '#f1f5f9', color: picked ? '#fff' : MUTE, border: `1px solid ${picked ? CYAN : LINE}`, whiteSpace: 'nowrap' }}>
                  {picked ? '★ Starred' : '☆ Star'}
                </button>
              </div>
            );
          })}
        </div>
      </div>

      {/* Closers */}
      <div style={{ marginBottom: 0 }}>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 12, marginBottom: 16 }}>
          <div style={{ fontFamily: 'Montserrat', fontWeight: 800, fontSize: 13, color: CYAN, letterSpacing: 1.2, textTransform: 'uppercase' }}>How to close</div>
          <div style={{ fontSize: 13, color: MUTE }}>Pick one. Do not skip it - this is what makes the conversation real.</div>
        </div>
        <div style={{ display: 'grid', gap: 10 }}>
          {CLOSERS.map((c, i) => {
            const picked = conv.run.closingPicked === c.text;
            return (
              <button key={i} onClick={() => update('closingPicked', picked ? '' : c.text)} style={{
                background: '#fff', border: `2px solid ${picked ? CYAN : LINE}`,
                borderRadius: 12, padding: '18px 22px', textAlign: 'left', position: 'relative',
              }}>
                <div style={{ fontFamily: 'Montserrat', fontWeight: picked ? 700 : 600, fontSize: 16.5, color: NAVY, lineHeight: 1.4, marginBottom: 6, letterSpacing: -0.1 }}>"{c.text}"</div>
                <div style={{ fontSize: 13, color: SLATE, lineHeight: 1.5 }}>{c.why}</div>
                {picked && <div style={{ position: 'absolute', top: 14, right: 16, fontSize: 11, fontFamily: 'Montserrat', fontWeight: 700, color: CYAN, letterSpacing: 1, textTransform: 'uppercase' }}>★ Picked</div>}
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── Step 3: Listen ───────────────────────────────────────────────────────────

  return (
    <div>
      <SectionHead
        eyebrow="Step 3 · During or right after"
        title="Capture what you actually heard."
        blurb="Use the four lenses managers know from the talent review - Aspiration, Ability, Awareness, Agility. Write what they said, not what you concluded. The two surprise prompts at the bottom are the most useful - do not skip them."

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 14, marginBottom: 18 }}>

          </div>
        ))}
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 14 }}>
        <div style={{ background: '#fff', border: `2px dashed ${LIME}`, borderRadius: 14, padding: '22px 24px' }}>
          <h4 style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 17, margin: '0 0 6px', color: NAVY, letterSpacing: -0.2 }}>What surprised you?</h4>
          <p style={{ fontSize: 13.5, color: SLATE, margin: '0 0 12px', lineHeight: 1.5 }}>The thing you did not expect. The shift in tone, the role they named, the strength they undersold, the worry that came out.</p>
          <textarea value={conv.listen.surprise || ''} onChange={e => update('surprise', e.target.value)} placeholder="I did not expect…" rows={4} style={{ width: '100%', padding: '11px 13px', border: `1px solid ${LINE}`, borderRadius: 10, fontSize: 14.5, lineHeight: 1.55, background: '#fafbfc', color: NAVY }} />
        </div>
        <div style={{ background: '#fff', border: `2px dashed ${LIME}`, borderRadius: 14, padding: '22px 24px' }}>
          <h4 style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 17, margin: '0 0 6px', color: NAVY, letterSpacing: -0.2 }}>What did they NOT say?</h4>
          <p style={{ fontSize: 13.5, color: SLATE, margin: '0 0 12px', lineHeight: 1.5 }}>What did you expect to hear that you did not? An ambition, a frustration, a name, a worry. Often the most useful note in this whole tool.</p>
          <textarea value={conv.listen.missing || ''} onChange={e => update('missing', e.target.value)} placeholder="They did not mention…" rows={4} style={{ width: '100%', padding: '11px 13px', border: `1px solid ${LINE}`, borderRadius: 10, fontSize: 14.5, lineHeight: 1.55, background: '#fafbfc', color: NAVY }} />
        </div>
      </div>
    </div>
  );
}

// ── Step 4: Follow up ────────────────────────────────────────────────────────
function FollowStep({ conv, onUpdate }) {
  const update = (key, val) => onUpdate({ ...conv, follow: { ...conv.follow, [key]: val } });

  // Build follow-up email template
  const summary = useMemo(() => {
    const name = conv.name || '[name]';
    const heard = LISTEN_LENSES.map(l => conv.listen[l.key]).filter(Boolean);
    const lines = [];
    lines.push(`Hi ${name},`);
    lines.push('');
    lines.push(`Thanks for the conversation. A few notes so we both have the same record of what we agreed.`);
    lines.push('');
    if (heard.length) {
      lines.push(`What I heard:`);
      LISTEN_LENSES.forEach(l => {
        const v = (conv.listen[l.key] || '').trim();
        if (v) lines.push(`· ${l.label} - ${v.replace(/\n+/g, ' ')}`);
      });
      lines.push('');
    }
    if (conv.follow.they || conv.follow.me || conv.follow.revisit) {
      lines.push(`What we agreed:`);
      if (conv.follow.they) lines.push(`· You will: ${conv.follow.they}`);
      if (conv.follow.me) lines.push(`· I will: ${conv.follow.me}`);
      if (conv.follow.revisit) lines.push(`· We'll come back to this on: ${conv.follow.revisit}`);
      lines.push('');
    }
    lines.push(`If anything in here does not match what you remember, tell me. The point is that we are working from the same picture.`);
    lines.push('');
    lines.push(`Thanks again.`);
    return lines.join('\n');
  }, [conv]);

  const [copied, setCopied] = useState(false);
  const copyEmail = () => {
    navigator.clipboard?.writeText(summary).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 1800);
    });
  };

  return (
    <div>
      <SectionHead
        eyebrow="Step 4 · Within a day"
        title="Three commitments. One email. Done."
        blurb="The biggest reason career conversations fail is that nothing happens after them. Three lines. Specific. With dates. Send the summary while the conversation is still fresh."
        accent={NAVY2}
      />

      <div style={{ display: 'grid', gap: 14, marginBottom: 24 }}>
        <CommitmentRow label="They will" hint="One thing the colleague is going to do - a piece of work, a conversation, a piece of feedback they'll seek, a decision they'll make." value={conv.follow.they} onChange={v => update('they', v)} dot={LIME} />
        <CommitmentRow label="I will" hint="One thing you, the manager, will do. Make it specific enough that they could check whether you did it." value={conv.follow.me} onChange={v => update('me', v)} dot={CYAN} />
        <CommitmentRow label="We'll revisit on" hint="A date. Not 'next quarter'. A date in the calendar." value={conv.follow.revisit} onChange={v => update('revisit', v)} dot={NAVY2} type="date" />
      </div>

      <div style={{ background: '#fff', border: `1px solid ${LINE}`, borderRadius: 14, padding: '22px 26px', marginBottom: 18 }}>
        <h4 style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 17, margin: '0 0 6px', color: NAVY, letterSpacing: -0.2 }}>Who else needs to know?</h4>
        <p style={{ fontSize: 13.5, color: SLATE, margin: '0 0 12px', lineHeight: 1.5 }}>Your People Team partner, your manager, a peer you'd hand them to for a project. Not many people. The right ones.</p>
        <input value={conv.follow.share || ''} onChange={e => update('share', e.target.value)} placeholder="Names, and what specifically you'll share with each…" style={{ width: '100%', padding: '11px 14px', border: `1px solid ${LINE}`, borderRadius: 10, fontSize: 14.5, background: '#fafbfc', color: NAVY }} />
      </div>

      <div style={{ background: NAVY, borderRadius: 14, padding: '28px 32px', color: '#fff', position: 'relative', overflow: 'hidden' }}>
        <div aria-hidden style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 3, background: BRAND_GRADIENT }} />
        <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 16, marginBottom: 14 }}>
          <div>
            <div style={{ fontSize: 11, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 2, color: LIME, textTransform: 'uppercase', marginBottom: 6 }}>Follow-up summary</div>
            <h3 style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 22, margin: 0, letterSpacing: -0.3 }}>Send this to {conv.name || 'them'} today.</h3>
          </div>
          <button onClick={copyEmail} style={{ padding: '10px 18px', borderRadius: 8, background: copied ? LIME : '#fff', color: NAVY, fontFamily: 'Montserrat', fontWeight: 700, fontSize: 13, whiteSpace: 'nowrap' }}>
            {copied ? '✓ Copied' : 'Copy email'}
          </button>
        </div>
        <pre style={{ background: 'rgba(255,255,255,0.06)', border: '1px solid rgba(255,255,255,0.12)', borderRadius: 10, padding: 18, fontFamily: 'Reddit Sans', fontSize: 14, lineHeight: 1.6, color: 'rgba(255,255,255,0.92)', whiteSpace: 'pre-wrap', margin: 0, overflow: 'auto' }}>{summary}</pre>
      </div>
    </div>
  );
}

function CommitmentRow({ label, hint, value, onChange, dot, type = 'text' }) {
  return (
    <div style={{ background: '#fff', border: `1px solid ${LINE}`, borderRadius: 14, padding: '20px 24px', display: 'grid', gridTemplateColumns: '160px 1fr', gap: 22, alignItems: 'flex-start' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, paddingTop: 4 }}>
        <div style={{ width: 12, height: 12, borderRadius: '50%', background: dot, flexShrink: 0 }} />
        <div style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 16, color: NAVY, letterSpacing: -0.2 }}>{label}</div>
      </div>
      <div>
        <div style={{ fontSize: 13, color: SLATE, marginBottom: 8, lineHeight: 1.5 }}>{hint}</div>
        {type === 'date' ? (
          <input type="date" value={value || ''} onChange={e => onChange(e.target.value)} style={{ padding: '11px 14px', border: `1px solid ${LINE}`, borderRadius: 10, fontSize: 15, background: '#fafbfc', color: NAVY, fontFamily: 'inherit' }} />
        ) : (
          <textarea value={value || ''} onChange={e => onChange(e.target.value)} placeholder="Be specific…" rows={2} style={{ width: '100%', padding: '11px 14px', border: `1px solid ${LINE}`, borderRadius: 10, fontSize: 15, lineHeight: 1.55, background: '#fafbfc', color: NAVY }} />
        )}
      </div>
    </div>
  );
}

// ── Empty state ──────────────────────────────────────────────────────────────
function EmptyState({ onStart }) {
  return (
    <div style={{ background: '#fff', border: `1px solid ${LINE}`, borderRadius: 14, padding: '64px 48px', textAlign: 'center' }}>
      <div style={{ width: 64, height: 64, borderRadius: 16, background: BRAND_GRADIENT, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', marginBottom: 24 }}>
        <div style={{ fontSize: 28, color: '#fff', fontFamily: 'Montserrat', fontWeight: 800 }}>+</div>
      </div>
      <h2 style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 26, margin: '0 0 12px', color: NAVY, letterSpacing: -0.4 }}>Start a kit for your next conversation.</h2>
      <p style={{ fontSize: 15.5, color: SLATE, margin: '0 auto 24px', maxWidth: 520, lineHeight: 1.55 }}>Name it after the colleague you're meeting. Everything you write stays on this device - it's your prep, not theirs.</p>
      <button onClick={onStart} style={{ padding: '13px 24px', borderRadius: 10, background: NAVY, color: '#fff', fontFamily: 'Montserrat', fontWeight: 700, fontSize: 14 }}>+ New kit</button>
    </div>
  );
}

// ── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [convs, setConvs] = useState(() => loadAll());
  const [activeId, setActiveId] = useState(() => {
    const all = loadAll();
    return all.length ? all[all.length - 1].id : null;
  });
  const [step, setStep] = useState('prep');
  const heroRef = useRef(null);

  useEffect(() => { saveAll(convs); }, [convs]);

  const active = useMemo(() => convs.find(c => c.id === activeId) || null, [convs, activeId]);

  const onNew = (name) => {
    const c = blankConv(name);
    setConvs(prev => [...prev, c]);
    setActiveId(c.id);
    setStep('prep');
  };
  const onPick = (id) => { setActiveId(id); setStep('prep'); };
  const onDelete = (id) => {
    setConvs(prev => prev.filter(c => c.id !== id));
    if (activeId === id) setActiveId(null);
  };
  const onUpdate = (next) => setConvs(prev => prev.map(c => c.id === next.id ? next : c));

  const startNew = () => {
    const name = prompt('Colleague\'s first name?');
    if (name && name.trim()) onNew(name.trim());
  };

  return (
    <div>
      <TopHeader />
      <div style={{ maxWidth: 1180, margin: '0 auto', padding: '32px 32px 64px' }}>
        <div ref={heroRef}>
          <Hero onStart={startNew} />
        </div>

        <ConvPicker convs={convs} activeId={activeId} onPick={onPick} onNew={onNew} onDelete={onDelete} />

        {!active && <EmptyState onStart={startNew} />}

        {active && (
          <>
            <Stepper active={step} onPick={setStep} conv={active} />
            <div style={{ background: BG, borderRadius: 16, padding: '8px 0' }}>
              {step === 'prep' && <PrepStep conv={active} onUpdate={onUpdate} />}
              {step === 'run' && <RunStep conv={active} onUpdate={onUpdate} />}
              {step === 'listen' && <ListenStep conv={active} onUpdate={onUpdate} />}
              {step === 'follow' && <FollowStep conv={active} onUpdate={onUpdate} />}
            </div>

            {/* Step nav */}
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 32, padding: '20px 24px', background: '#fff', border: `1px solid ${LINE}`, borderRadius: 12 }}>
              <div style={{ fontSize: 12.5, color: MUTE, fontFamily: 'Reddit Sans' }}>Saved automatically · Stays on this device · {active.name} · {active.date}</div>
              <div style={{ display: 'flex', gap: 10 }}>
                {STEPS.findIndex(s => s.id === step) > 0 && (
                  <button onClick={() => {
                    const i = STEPS.findIndex(s => s.id === step);
                    setStep(STEPS[i-1].id);
                    window.scrollTo({ top: heroRef.current?.offsetTop || 0, behavior: 'smooth' });
                  }} style={{ padding: '10px 16px', borderRadius: 8, background: 'transparent', border: `1px solid ${LINE}`, color: NAVY, fontFamily: 'Montserrat', fontWeight: 600, fontSize: 13 }}>
                    ← Previous
                  </button>
                )}
                {STEPS.findIndex(s => s.id === step) < STEPS.length - 1 && (
                  <button onClick={() => {
                    const i = STEPS.findIndex(s => s.id === step);
                    setStep(STEPS[i+1].id);
                    window.scrollTo({ top: heroRef.current?.offsetTop || 0, behavior: 'smooth' });
                  }} style={{ padding: '10px 18px', borderRadius: 8, background: NAVY, color: '#fff', fontFamily: 'Montserrat', fontWeight: 700, fontSize: 13 }}>
                    Next: {STEPS[STEPS.findIndex(s => s.id === step) + 1].label} →
                  </button>
                )}
              </div>
            </div>
          </>
        )}
      </div>

      <div style={{ borderTop: `1px solid ${LINE}`, padding: '24px 32px', textAlign: 'center', fontSize: 12, color: MUTE, fontFamily: 'Reddit Sans' }}>
        Holcim Career Conversation Kit · Companion to Career Reflections · Notes stay on this device
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
