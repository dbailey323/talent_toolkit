<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

// ── Brand ────────────────────────────────────────────────────────────────────
const NAVY = '#041739';
const NAVY2 = '#164375';
const CYAN = '#05b7ed';
const LIME = '#65c12a';
const SLATE = '#3d5070';
const AMBER = '#d97706';
const RED = '#b91c1c';
const BRAND_GRADIENT = 'linear-gradient(90deg, #65c12a 0%, #05b7ed 50%, #164375 100%)';
const PAPER = '#ffffff';
const BG = '#f4f6fa';
const MUTE = '#6b7280';
const LINE = '#e5e7eb';
const SOFT = '#f1f5f9';

const CASES = window.EVIDENCE_CASES;
const RATING_COLOR = { High: LIME, Medium: AMBER, Low: RED };
const DIMS = [
  { key: 'ability', label: 'Ability' },
  { key: 'aspiration', label: 'Aspiration' },
  { key: 'agility', label: 'Agility' },
  { key: 'alignment', label: 'Alignment' },
];

// Shuffle helper. Stable per case across renders via React state.
function shuffleIndices(n, seed) {
  const arr = Array.from({ length: n }, (_, i) => i);
  let s = seed || 1;
  for (let i = arr.length - 1; i > 0; i--) {
    s = (s * 9301 + 49297) % 233280;
    const j = Math.floor((s / 233280) * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ── Stroke ───────────────────────────────────────────────────────────────────
function Stroke({ children, fontSize = 56, darkBg = false }) {
  const h = Math.round(fontSize * 0.24);
  const ext = Math.round(fontSize / 6);
  return (
    <span style={{ display: 'inline-block', position: 'relative' }}>
      <span style={{
        position: 'absolute', left: -ext, right: -ext,
        bottom: Math.round(fontSize * 0.05), height: h,
        background: BRAND_GRADIENT, zIndex: 0,
      }}/>
      <span style={{ position: 'relative', zIndex: 1, color: darkBg ? '#fff' : 'inherit' }}>{children}</span>
    </span>
  );
}

// ── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [view, setView] = useState('welcome'); // welcome | case | summary
  const [caseIdx, setCaseIdx] = useState(0);
  const [answers, setAnswers] = useState({}); // per-case state

  const start = () => { setView('case'); setCaseIdx(0); window.scrollTo({ top: 0 }); };
  const next = () => {
    if (caseIdx + 1 >= CASES.length) setView('summary');
    else setCaseIdx(caseIdx + 1);
    window.scrollTo({ top: 0 });
  };
  const back = () => {
    if (caseIdx === 0) { setView('welcome'); }
    else { setCaseIdx(caseIdx - 1); }
    window.scrollTo({ top: 0 });
  };
  const restart = () => { setView('welcome'); setCaseIdx(0); setAnswers({}); window.scrollTo({ top: 0 }); };
  const jumpTo = (i) => { setView('case'); setCaseIdx(i); window.scrollTo({ top: 0 }); };
  const setAnswer = (caseId, patch) => setAnswers(a => ({ ...a, [caseId]: { ...(a[caseId] || {}), ...patch } }));

  return (
    <div style={{ minHeight: '100vh', background: BG }}>
      <Header view={view} caseIdx={caseIdx} totalCases={CASES.length} onHome={restart} />
      <div style={{ maxWidth: 1040, margin: '0 auto', padding: '32px 24px 80px' }}>
        {view === 'welcome' && <Welcome onStart={start} />}
        {view === 'case' && (
          <CaseScreen
            key={CASES[caseIdx].id}
            data={CASES[caseIdx]}
            idx={caseIdx}
            total={CASES.length}
            answer={answers[CASES[caseIdx].id] || {}}
            setAnswer={(patch) => setAnswer(CASES[caseIdx].id, patch)}
            onNext={next}
            onBack={back}
          />
        )}
        {view === 'summary' && <Summary onJump={jumpTo} onRestart={restart} answers={answers} />}
      </div>
      <Footer />
    </div>
  );
}

function Welcome({ onStart }) {
  return (

      <div style={{ background: NAVY, color: '#fff', borderRadius: 16, padding: '56px 48px 48px', marginBottom: 28, position: 'relative', overflow: 'hidden' }}>

        <div style={{ position: 'relative', maxWidth: 740 }}>
          <div style={{ fontSize: 12, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 2, color: CYAN, textTransform: 'uppercase', marginBottom: 18 }}>Pre-work for the regional calibration</div>
          <h1 style={{ fontFamily: 'Montserrat', fontWeight: 800, fontSize: 50, lineHeight: 1.05, margin: '0 0 22px', letterSpacing: -1.3 }}>
            Sharper questions for the <Stroke fontSize={50} darkBg>room.</Stroke>
          </h1>
          <p style={{ fontSize: 17.5, lineHeight: 1.55, color: 'rgba(255,255,255,0.82)', margin: '0 0 26px', maxWidth: 660 }}>
            Regional calibration sessions cover cases from across the whole patch, North, Midlands and South. You will know some of the colleagues being discussed; for many others, the form and the manager's words are all you have to go on. Four short cases to sharpen the way you read the evidence and the way you ask about it before the session.
          </p>
          <button onClick={onStart} style={{ padding: '14px 24px', borderRadius: 10, background: CYAN, color: NAVY, fontFamily: 'Montserrat', fontWeight: 700, fontSize: 14.5, letterSpacing: 0.3, display: 'inline-flex', alignItems: 'center', gap: 10 }}>
            Begin <span>→</span>
          </button>
          <div style={{ marginTop: 16, fontSize: 13, color: 'rgba(255,255,255,0.55)', fontFamily: 'Reddit Sans' }}>About 12 minutes. Pre-work for the regional calibration sessions. The in-person training will go further.</div>
        </div>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 16, marginBottom: 28 }}>
        <WelcomeCard n="1" title="Reading the evidence on the form" body="Working out what is missing from an assessment, not just what is on the page. The most common patterns are performance presented as potential, aspiration that has been inferred rather than evidenced, and one strong dimension carrying three weaker ones." />
        <WelcomeCard n="2" title="Choosing the right challenge for the case" body="Different cases call for different kinds of question. In each case you will choose between four options, see what each one would have surfaced, and consider which was the most productive use of the room's time." />
        <WelcomeCard n="3" title="The cases that deserve more time than they typically get" body="A High rating is not always the one to push hardest on. A Medium rating can mask the most important case in the cohort. A manager who has rated every direct report identically is a different problem again." />
      </div>

      <div style={{ background: PAPER, borderRadius: 14, padding: '24px 28px', border: `1px solid ${LINE}`, marginBottom: 28 }}>
        <div style={{ fontSize: 11, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 1.5, color: NAVY, textTransform: 'uppercase', marginBottom: 10 }}>One useful frame before you start</div>
        <p style={{ fontSize: 14.5, lineHeight: 1.65, color: SLATE, margin: '0 0 10px' }}>
          In a regional calibration you cannot lean on personal knowledge of every colleague in the room. For half the cohort, the form and the manager's words are the whole picture. That puts the weight on the evidence, and on the question you ask about it.
        </p>
        <p style={{ fontSize: 14.5, lineHeight: 1.65, color: SLATE, margin: '0 0 10px' }}>
          A High that survives a sharp question is a much stronger High than a High no one asked about. Your job is not to lower ratings. It is to make sure the evidence has done its work, including, and especially, for the people you do not know.
        </p>
        <p style={{ fontSize: 14.5, lineHeight: 1.65, color: SLATE, margin: 0 }}>
          The reverse of all of this is also true. The conversations that flow most easily in the room are the ones where the manager has done the work in advance. A strong rating defended on strong evidence moves quickly. A correct rating with thin evidence costs the room time it cannot get back.
        </p>
      </div>

      <button onClick={onStart} style={{ width: '100%', padding: '16px 24px', borderRadius: 10, background: NAVY, color: '#fff', fontFamily: 'Montserrat', fontWeight: 700, fontSize: 15, letterSpacing: 0.3, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 10 }}>
        Begin
      </button>
    </div>
  );
}

function WelcomeCard({ n, title, body }) {
  return (
    <div style={{ background: PAPER, borderRadius: 12, padding: '24px 22px', border: `1px solid ${LINE}` }}>
      <div style={{ width: 28, height: 28, borderRadius: '50%', background: NAVY, color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'Montserrat', fontWeight: 700, fontSize: 13, marginBottom: 14 }}>{n}</div>
      <div style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 16, color: NAVY, lineHeight: 1.3, marginBottom: 8 }}>{title}</div>
      <div style={{ fontSize: 13.5, lineHeight: 1.55, color: SLATE }}>{body}</div>
    </div>
  );
}

// ── Case dispatcher ──────────────────────────────────────────────────────────
function CaseScreen({ data, idx, total, answer, setAnswer, onNext, onBack }) {
  const isLast = idx + 1 >= total;
  if (data.variant === 'portfolio') {
    return <PortfolioCase data={data} idx={idx} isLast={isLast} answer={answer} setAnswer={setAnswer} onNext={onNext} onBack={onBack} />;
  }
  return <StandardCase data={data} idx={idx} isLast={isLast} answer={answer} setAnswer={setAnswer} onNext={onNext} onBack={onBack} />;
}

// ── Standard case (cases 1, 2, 3) ────────────────────────────────────────────
function StandardCase({ data, idx, isLast, answer, setAnswer, onNext, onBack }) {
  // Stable shuffle of question options for this case
  const order = useMemo(() => shuffleIndices(data.questions.length, (idx + 7) * 13 + data.id.charCodeAt(0)), [data.id]);
  const shuffled = order.map(i => data.questions[i]);
  const pickedIdx = answer.question; // index into shuffled
  const pickedQuestion = pickedIdx !== undefined ? shuffled[pickedIdx] : null;
  const hasPicked = pickedQuestion !== null && pickedQuestion !== undefined;

  return (
    <div>
      <button onClick={onBack} style={{ color: NAVY, fontSize: 13, fontFamily: 'Reddit Sans', marginBottom: 18, display: 'flex', alignItems: 'center', gap: 6 }}>
        ← {idx === 0 ? 'Back to welcome' : `Case ${idx}`}
      </button>

      <SubmissionCard data={data} />

      {/* Framing */}
      <div style={{ background: NAVY, color: '#fff', borderRadius: 12, padding: '20px 24px', marginBottom: 16, position: 'relative', overflow: 'hidden' }}>
        <div aria-hidden style={{ position: 'absolute', top: 0, left: 0, bottom: 0, width: 3, background: BRAND_GRADIENT }} />
        <div style={{ fontSize: 11, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 1.5, color: CYAN, textTransform: 'uppercase', marginBottom: 8 }}>Where you are</div>
        <div style={{ fontSize: 15.5, lineHeight: 1.55, fontFamily: 'Reddit Sans', color: '#fff' }}>{data.framing}</div>
      </div>

      {/* Question step */}
      <QuestionStep
        questions={shuffled}
        pickedIdx={pickedIdx}
        onPick={(i) => setAnswer({ question: i })}
        scratch={answer.scratch || ''}
        onScratch={(s) => setAnswer({ scratch: s })}
      />

      {/* Twist + Takeaway (after question pick) */}
      {hasPicked && (
        <div className="anim-twist">
          <TwistCard twist={data.twist} pickedTrap={pickedQuestion.trap} pickedPivotal={pickedQuestion.pivotal} />
          <TakeawayCard text={data.takeaway} />
          <button onClick={onNext} style={{ width: '100%', padding: '15px 22px', borderRadius: 10, background: NAVY, color: '#fff', fontFamily: 'Montserrat', fontWeight: 700, fontSize: 14.5, letterSpacing: 0.3, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 10 }}>
            {isLast ? 'See your reference card →' : `Case ${idx + 2} of ${CASES.length} →`}
          </button>
        </div>
      )}
    </div>
  );
}

// ── SubmissionCard (shared) ──────────────────────────────────────────────────
function SubmissionCard({ data }) {
  // For portfolio variant, render compactly (no rating row)
  const isPortfolio = data.variant === 'portfolio';
  return (
    <div style={{ background: PAPER, borderRadius: 14, border: `1px solid ${LINE}`, borderTop: `4px solid ${CYAN}`, marginBottom: 16, overflow: 'hidden' }}>

        <div style={{ fontSize: 12.5, color: MUTE, paddingTop: 6, display: 'flex', flexWrap: 'wrap', gap: 12 }}>
          <span><strong style={{ color: NAVY, fontFamily: 'Montserrat', fontWeight: 600 }}>Submitted by</strong> {data.submitter}, {data.submitterRole}</span>
          <span style={{ color: '#cbd5e1' }}>·</span>
          <span style={{ color: SLATE }}>{data.submitterRelationship}</span>
        </div>
      </div>

      {!isPortfolio && (
        <>
          {/* 4A rating row */}
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', borderBottom: `1px solid ${LINE}` }}>
            {DIMS.map((d, i) => (
              <div key={d.key} style={{ padding: '16px 20px', borderRight: i < 3 ? `1px solid ${LINE}` : 'none' }}>
                <div style={{ fontSize: 10.5, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 1.2, color: SLATE, textTransform: 'uppercase', marginBottom: 8 }}>{d.label}</div>
                <div style={{ display: 'inline-flex', alignItems: 'center', gap: 8 }}>
                  <div style={{ width: 10, height: 10, borderRadius: '50%', background: RATING_COLOR[data.rating[d.key]] }} />
                  <div style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 14.5, color: NAVY }}>{data.rating[d.key]}</div>
                </div>
              </div>
            ))}
          </div>

          {/* Overall */}
          <div style={{ background: SOFT, padding: '12px 24px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <div style={{ fontSize: 12, fontFamily: 'Montserrat', fontWeight: 600, color: SLATE, textTransform: 'uppercase', letterSpacing: 1 }}>Manager's overall</div>
            <div style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 15, color: NAVY }}>{data.overall}</div>
          </div>

          {/* Summary */}
          <div style={{ padding: '20px 28px 16px' }}>
            <div style={{ fontSize: 11, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 1.5, color: NAVY, textTransform: 'uppercase', marginBottom: 10 }}>Manager's summary</div>
            <p style={{ fontSize: 15.5, lineHeight: 1.6, color: '#1f2937', margin: 0, fontStyle: 'italic', borderLeft: `3px solid ${CYAN}`, paddingLeft: 14 }}>"{data.summary}"</p>
          </div>

          {/* Evidence per dimension */}
          <div style={{ padding: '4px 28px 24px' }}>
            <div style={{ fontSize: 11, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 1.5, color: NAVY, textTransform: 'uppercase', marginBottom: 12, marginTop: 8 }}>The evidence the manager has put forward</div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
              {DIMS.map(d => (
                <div key={d.key} style={{ background: SOFT, borderRadius: 10, padding: '14px 16px' }}>
                  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
                    <div style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 13, color: NAVY }}>{d.label}</div>
                    <div style={{ fontSize: 10.5, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 0.5, color: RATING_COLOR[data.rating[d.key]], textTransform: 'uppercase' }}>{data.rating[d.key]}</div>
                  </div>
                  <ul style={{ margin: 0, padding: 0, listStyle: 'none', display: 'flex', flexDirection: 'column', gap: 7 }}>
                    {data.evidence[d.key].map((ev, j) => (
                      <li key={j} style={{ fontSize: 13, lineHeight: 1.5, color: '#1f2937', display: 'flex', gap: 8 }}>
                        <span style={{ color: MUTE, flexShrink: 0 }}>·</span>
                        <span>{ev}</span>
                      </li>
                    ))}
                  </ul>
                </div>
              ))}
            </div>
          </div>
        </>
      )}
    </div>
  );
}

// ── Question step ────────────────────────────────────────────────────────────
function QuestionStep({ questions, pickedIdx, onPick, scratch, onScratch }) {
  const picked = pickedIdx !== undefined ? questions[pickedIdx] : null;
  const hasPicked = !!picked;

  return (
    <div style={{ background: PAPER, borderRadius: 14, border: `1px solid ${LINE}`, padding: '24px 28px', marginBottom: 16 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 6 }}>
        <div style={{ width: 32, height: 32, borderRadius: '50%', background: NAVY, color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'Montserrat', fontWeight: 700, fontSize: 14 }}>?</div>
        <div style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 17, color: NAVY }}>The chair invites you in. Which question do you open with?</div>
      </div>
      <div style={{ fontSize: 13.5, color: SLATE, marginBottom: 18, marginLeft: 46, lineHeight: 1.5 }}>
        Each option below would take the discussion in a different direction. Choose the one you would actually use in the room. After you commit, you will see what each option would have surfaced.
      </div>

      {/* Scratch - optional. Encourages thinking first. */}
      {!hasPicked && (
        <div style={{ marginBottom: 18 }}>
          <div style={{ fontSize: 11, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 1.2, color: MUTE, textTransform: 'uppercase', marginBottom: 8 }}>Optional, before you look at the options</div>
          <textarea
            value={scratch}
            onChange={(e) => onScratch(e.target.value)}
            placeholder="Take a moment to write the question you would ask in your own words. You will not be marked on it. It is here to make sure you have thought about it before clicking."
            rows={2}
            style={{
              width: '100%', resize: 'vertical', border: `1px dashed ${LINE}`, borderRadius: 8,
              padding: '10px 12px', fontFamily: 'Reddit Sans', fontSize: 14, color: '#1f2937',
              background: '#fafbfc', lineHeight: 1.5, fontStyle: scratch ? 'normal' : 'italic',
            }}
          />
        </div>
      )}

      {/* Question options. Letters labels (A, B, C, D) on each. */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        {questions.map((q, i) => {
          const isSelected = pickedIdx === i;
          // Visual treatment of the option button.
          // Wrong turns get an amber accent when picked, pivotal gets lime, other gets cyan.
          let bg = '#fff', border = LINE;
          if (hasPicked) {
            if (isSelected) {
              if (q.trap) { bg = '#fef8e8'; border = AMBER; }
              else if (q.pivotal) { bg = '#f3fbe8'; border = LIME; }
              else { bg = '#eff8fe'; border = CYAN; }
            } else {
              bg = '#fafbfc'; border = LINE;
            }
          } else if (isSelected) {
            bg = '#eff8fe'; border = CYAN;
          }

          // Commentary label and accent. Different treatment for picked vs unpicked,
          // and for trap, pivotal, and ordinary options.
          let commentBorder = LINE, labelColor = MUTE, labelText = 'What this option would have surfaced';
          if (isSelected) {
            if (q.trap) {
              commentBorder = AMBER; labelColor = '#92400e';
              labelText = 'Your choice. A common wrong turn, and the consequence below.';
            } else if (q.pivotal) {
              commentBorder = LIME; labelColor = '#3d7d18';
              labelText = 'Your choice. The sharpest of the four questions in this case.';
            } else {
              commentBorder = CYAN; labelColor = CYAN;
              labelText = 'Your choice. What this question would surface in the room.';
            }
          } else if (q.trap) {
            commentBorder = '#fcd34d'; labelColor = '#92400e';
            labelText = 'Another wrong turn the room can take here.';
          } else if (q.pivotal) {
            commentBorder = '#bbf7d0'; labelColor = '#3d7d18';
            labelText = 'The sharpest of the four questions in this case.';
          }

          return (
            <button
              key={i}
              onClick={() => !hasPicked && onPick(i)}
              disabled={hasPicked}
              style={{
                textAlign: 'left', background: bg, border: `1px solid ${border}`,
                borderRadius: 10, padding: '14px 18px',
                cursor: hasPicked ? 'default' : 'pointer',
                transition: 'all .12s ease',
                display: 'flex', flexDirection: 'column', gap: 10,
              }}
              onMouseEnter={e => { if (!hasPicked) e.currentTarget.style.borderColor = CYAN; }}
              onMouseLeave={e => { if (!hasPicked && !isSelected) e.currentTarget.style.borderColor = LINE; }}
            >
              <div style={{ fontSize: 14.5, lineHeight: 1.55, color: '#1f2937', fontFamily: 'Reddit Sans' }}>
                <span style={{ fontFamily: 'Montserrat', fontWeight: 700, color: hasPicked ? NAVY : MUTE, marginRight: 10 }}>{String.fromCharCode(65 + i)}.</span>
                "{q.text}"
              </div>
              {hasPicked && (
                <div className="anim-fade" style={{ marginLeft: 24, paddingLeft: 14, borderLeft: `2px solid ${commentBorder}`, fontSize: 13.5, lineHeight: 1.6, color: SLATE }}>
                  <div style={{ fontSize: 10.5, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 0.6, color: labelColor, textTransform: 'uppercase', marginBottom: 4 }}>
                    {labelText}
                  </div>
                  {q.opens}
                </div>
              )}
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ── Twist card ───────────────────────────────────────────────────────────────
function TwistCard({ twist, pickedTrap, pickedPivotal }) {
  return (
    <div style={{ background: PAPER, borderRadius: 14, border: `1px solid ${LINE}`, padding: '24px 28px', marginBottom: 16, position: 'relative', overflow: 'hidden' }}>
      <div aria-hidden style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 3, background: BRAND_GRADIENT }} />
      <div style={{ fontSize: 10.5, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 1.5, color: CYAN, textTransform: 'uppercase', marginBottom: 8 }}>{twist.kicker}</div>
      <div style={{ fontFamily: 'Montserrat', fontWeight: 800, fontSize: 22, color: NAVY, lineHeight: 1.25, marginBottom: 10 }}>{twist.label}</div>
      <div style={{ fontSize: 13, color: MUTE, marginBottom: 16, lineHeight: 1.55 }}>{twist.sourceNote}</div>

      <blockquote style={{
        margin: 0, padding: '18px 22px', background: '#fdfaf3',
        border: `1px solid #f1e3c1`, borderLeft: `4px solid ${AMBER}`,
        borderRadius: 8, fontFamily: 'Reddit Sans',
        fontSize: 15.5, lineHeight: 1.65, color: '#1f2937',
        fontStyle: 'italic', position: 'relative',
      }}>
        "{twist.quote}"
        <div style={{ fontStyle: 'normal', fontSize: 12, color: MUTE, marginTop: 12, fontFamily: 'Montserrat', fontWeight: 600, letterSpacing: 0.3 }}>{twist.attribution}</div>
      </blockquote>

      <div style={{ marginTop: 18, padding: '14px 16px', background: SOFT, borderRadius: 8, borderLeft: `3px solid ${NAVY}` }}>
        <div style={{ fontSize: 11, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 1.2, color: NAVY, textTransform: 'uppercase', marginBottom: 6 }}>What this means</div>
        <div style={{ fontSize: 14, lineHeight: 1.65, color: '#1f2937' }}>{twist.lesson}</div>
      </div>

      {/* Reflection on the user's choice. Sits below the twist content. */}
      {(pickedTrap || pickedPivotal) && (
        <div style={{ marginTop: 16, padding: '12px 14px', borderRadius: 8, background: pickedPivotal ? '#f0fbf3' : '#fef8e8', border: `1px solid ${pickedPivotal ? `${LIME}55` : '#fcd34d55'}`, fontSize: 13.5, color: SLATE, lineHeight: 1.6 }}>
          {pickedPivotal && (
            <span><strong style={{ color: '#3d7d18', fontFamily: 'Montserrat', fontWeight: 700 }}>You chose the question that opened this up.</strong> In a real session the room reaches this evidence quickly when the right question is asked first. When it is not, the same evidence often does not reach the room at all.</span>
          )}
          {pickedTrap && (
            <span><strong style={{ color: '#92400e', fontFamily: 'Montserrat', fontWeight: 700 }}>You chose a wrong turn.</strong> It is the most common one in regional calibration sessions, which is why it is here. Worth catching in this exercise so you catch it in the room.</span>
          )}
        </div>
      )}
    </div>
  );
}

// ── Takeaway card ────────────────────────────────────────────────────────────
function TakeawayCard({ text }) {
  return (
    <div style={{ background: NAVY, color: '#fff', borderRadius: 12, padding: '22px 26px', marginBottom: 18, position: 'relative', overflow: 'hidden' }}>
      <div aria-hidden style={{ position: 'absolute', top: 0, left: 0, bottom: 0, width: 4, background: BRAND_GRADIENT }} />
      <div style={{ fontSize: 11, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 1.5, color: CYAN, textTransform: 'uppercase', marginBottom: 8 }}>Carry this into the room</div>
      <div style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 17.5, lineHeight: 1.45 }}>{text}</div>
    </div>
  );
}

// ── Portfolio case (case 4) ──────────────────────────────────────────────────
function PortfolioCase({ data, idx, isLast, answer, setAnswer, onNext, onBack }) {
  const picks = answer.picks || {}; // { personId: challengeId }
  const allPicked = data.people.every(p => picks[p.id]);
  const matrixLocked = !!answer.locked;

  const setPick = (personId, challengeId) => {
    if (matrixLocked) return;
    setAnswer({ picks: { ...picks, [personId]: challengeId } });
  };
  const lockIn = () => setAnswer({ locked: true });

  return (
    <div>
      <button onClick={onBack} style={{ color: NAVY, fontSize: 13, fontFamily: 'Reddit Sans', marginBottom: 18, display: 'flex', alignItems: 'center', gap: 6 }}>
        ← Case {idx}
      </button>

      {/* Simplified submission header (no 4A grid for portfolio) */}
      <SubmissionCard data={data} />

      {/* Framing */}
      <div style={{ background: NAVY, color: '#fff', borderRadius: 12, padding: '20px 24px', marginBottom: 18, position: 'relative', overflow: 'hidden' }}>
        <div aria-hidden style={{ position: 'absolute', top: 0, left: 0, bottom: 0, width: 3, background: BRAND_GRADIENT }} />
        <div style={{ fontSize: 11, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 1.5, color: CYAN, textTransform: 'uppercase', marginBottom: 8 }}>Where you are</div>
        <div style={{ fontSize: 15.5, lineHeight: 1.55, fontFamily: 'Reddit Sans', color: '#fff' }}>{data.framing}</div>
      </div>

      {/* Matching grid */}
      <div style={{ background: PAPER, borderRadius: 14, border: `1px solid ${LINE}`, padding: '24px 24px 12px', marginBottom: 16 }}>
        <div style={{ fontSize: 11, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 1.5, color: NAVY, textTransform: 'uppercase', marginBottom: 6 }}>The team. Match a challenge to each.</div>
        <div style={{ fontSize: 13.5, color: SLATE, marginBottom: 18, lineHeight: 1.5 }}>
          Four people, four kinds of challenge. One of them needs no challenge at all. One is a sponsor halo. One is performance-as-potential. One is anchored on a single recent win.
        </div>

        <div style={{ display: 'grid', gap: 14 }}>
          {data.people.map(person => (
            <PersonRow
              key={person.id}
              person={person}
              challenges={data.challenges}
              picked={picks[person.id]}
              correctId={person.correctChallenge}
              onPick={(cid) => setPick(person.id, cid)}
              revealed={matrixLocked}
            />
          ))}
        </div>
      </div>

      {!matrixLocked && (
        <button
          onClick={lockIn}
          disabled={!allPicked}
          style={{
            width: '100%', padding: '15px 22px', borderRadius: 10,
            background: allPicked ? NAVY : '#c5cdda',
            color: '#fff', fontFamily: 'Montserrat', fontWeight: 700, fontSize: 14.5, letterSpacing: 0.3,
            display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 10,
            cursor: allPicked ? 'pointer' : 'not-allowed',
            marginBottom: 16,
          }}
        >
          {allPicked ? 'Lock in your matches →' : `${4 - Object.keys(picks).length} more to pick`}
        </button>
      )}

      {matrixLocked && (
        <div className="anim-twist">
          {/* What an experienced HoP would have matched */}
          <div style={{ background: PAPER, borderRadius: 14, border: `1px solid ${LINE}`, padding: '24px 28px', marginBottom: 16, position: 'relative', overflow: 'hidden' }}>
            <div aria-hidden style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 3, background: BRAND_GRADIENT }} />
            <div style={{ fontSize: 10.5, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 1.5, color: CYAN, textTransform: 'uppercase', marginBottom: 8 }}>What an experienced HoP would have done</div>
            <div style={{ fontFamily: 'Montserrat', fontWeight: 800, fontSize: 22, color: NAVY, lineHeight: 1.25, marginBottom: 16 }}>The four challenges, matched.</div>

            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              {data.people.map(person => {
                const correct = data.challenges.find(c => c.id === person.correctChallenge);
                const yours = data.challenges.find(c => c.id === picks[person.id]);
                const matched = picks[person.id] === person.correctChallenge;
                return (
                  <div key={person.id} style={{
                    background: matched ? '#f0fbf3' : '#fef3f2',
                    border: `1px solid ${matched ? `${LIME}55` : '#fca5a555'}`,
                    borderRadius: 10, padding: '14px 16px',
                  }}>
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 10, marginBottom: 8 }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                        <div style={{ width: 28, height: 28, borderRadius: '50%', background: NAVY, color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'Montserrat', fontWeight: 700, fontSize: 11 }}>{person.initials}</div>
                        <div style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 14.5, color: NAVY }}>{person.name}</div>
                      </div>
                      <div style={{ fontSize: 10.5, fontFamily: 'Montserrat', fontWeight: 700, color: matched ? '#3d7d18' : RED, letterSpacing: 0.5 }}>
                        {matched ? '✓ MATCHED' : 'NOT THIS ONE'}
                      </div>
                    </div>
                    <div style={{ fontSize: 13.5, lineHeight: 1.6, color: '#1f2937', marginBottom: 8 }}>
                      <strong style={{ color: NAVY, fontFamily: 'Montserrat', fontWeight: 700 }}>The right challenge here: {correct.label}.</strong>
                    </div>
                    {!matched && yours && (
                      <div style={{ fontSize: 12.5, color: MUTE, marginBottom: 8 }}>You picked: {yours.label}.</div>
                    )}
                    <div style={{ fontSize: 13.5, lineHeight: 1.6, color: SLATE }}>{person.whyCorrect}</div>
                  </div>
                );
              })}
            </div>
          </div>

          <TakeawayCard text={data.takeaway} />
          <button onClick={onNext} style={{ width: '100%', padding: '15px 22px', borderRadius: 10, background: NAVY, color: '#fff', fontFamily: 'Montserrat', fontWeight: 700, fontSize: 14.5, letterSpacing: 0.3, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 10 }}>
            See your reference card →
          </button>
        </div>
      )}
    </div>
  );
}

function PersonRow({ person, challenges, picked, correctId, onPick, revealed }) {
  return (
    <div style={{ background: SOFT, borderRadius: 12, padding: '16px 18px' }}>
      <div style={{ display: 'flex', gap: 14, marginBottom: 12 }}>
        <div style={{ width: 40, height: 40, borderRadius: '50%', background: NAVY, color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'Montserrat', fontWeight: 700, fontSize: 14, flexShrink: 0 }}>{person.initials}</div>
        <div style={{ flex: 1 }}>
          <div style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 16, color: NAVY, lineHeight: 1.2 }}>{person.name}</div>
          <div style={{ fontSize: 13, color: SLATE, marginTop: 2 }}>{person.role}</div>
          <div style={{ fontSize: 13.5, color: '#1f2937', fontStyle: 'italic', marginTop: 8, borderLeft: `2px solid ${CYAN}`, paddingLeft: 10, lineHeight: 1.5 }}>"{person.managerSummary}"</div>
          <ul style={{ margin: '10px 0 0', padding: 0, listStyle: 'none', display: 'flex', flexDirection: 'column', gap: 4 }}>
            {person.keyEvidence.map((ev, i) => (
              <li key={i} style={{ fontSize: 12.5, lineHeight: 1.55, color: SLATE, display: 'flex', gap: 6 }}>
                <span style={{ color: MUTE, flexShrink: 0 }}>·</span>
                <span>{ev}</span>
              </li>
            ))}
          </ul>
        </div>
      </div>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
        {challenges.map(c => {
          const isPicked = picked === c.id;
          const isCorrect = c.id === correctId;
          let bg = '#fff', border = LINE, color = NAVY;
          if (revealed) {
            if (isCorrect) { bg = '#f0fbf3'; border = LIME; color = '#3d7d18'; }
            else if (isPicked) { bg = '#fef3f2'; border = '#fca5a5'; color = RED; }
            else { bg = '#fafbfc'; border = LINE; color = MUTE; }
          } else if (isPicked) {
            bg = NAVY; border = NAVY; color = '#fff';
          }
          return (
            <button
              key={c.id}
              onClick={() => onPick(c.id)}
              disabled={revealed}
              style={{
                background: bg, border: `1px solid ${border}`, color,
                fontFamily: 'Montserrat', fontWeight: 600, fontSize: 12.5,
                padding: '7px 12px', borderRadius: 999, letterSpacing: 0.2,
                cursor: revealed ? 'default' : 'pointer',
                transition: 'all .12s ease',
              }}
            >
              {c.label}
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ── Summary / Reference Card ─────────────────────────────────────────────────
function Summary({ onJump, onRestart, answers }) {
  return (
    <div>
      <div style={{ background: NAVY, color: '#fff', borderRadius: 16, padding: '44px 40px 36px', marginBottom: 24, position: 'relative', overflow: 'hidden' }}>
        <div aria-hidden style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 4, background: BRAND_GRADIENT }} />
        <div aria-hidden style={{ position: 'absolute', right: -80, top: -80, width: 280, height: 280, borderRadius: '50%', background: `radial-gradient(circle, ${LIME}22, transparent 70%)` }} />
        <div style={{ position: 'relative' }}>
          <div style={{ fontSize: 12, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 2, color: CYAN, textTransform: 'uppercase', marginBottom: 16 }}>Done. Your reference card.</div>
          <h1 style={{ fontFamily: 'Montserrat', fontWeight: 800, fontSize: 40, lineHeight: 1.08, margin: '0 0 16px', letterSpacing: -1 }}>

              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4"><path d="M6 9V2h12v7"/><rect x="4" y="9" width="16" height="9" rx="1"/><rect x="6" y="14" width="12" height="7"/></svg>
              Save as PDF
            </button>
            <button onClick={onRestart} style={{ padding: '9px 14px', borderRadius: 8, background: 'transparent', color: '#fff', border: '1px solid rgba(255,255,255,0.3)', fontFamily: 'Montserrat', fontWeight: 600, fontSize: 12.5, letterSpacing: 0.3 }}>Restart</button>
          </div>
        </div>
      </div>

      <div style={{ display: 'grid', gap: 12, marginBottom: 28 }}>
        {CASES.map((c, i) => {
          const tag = caseTag(c);
          return (
            <div key={c.id} style={{ background: PAPER, borderRadius: 12, border: `1px solid ${LINE}`, padding: '22px 24px' }}>
              <div style={{ display: 'flex', alignItems: 'flex-start', gap: 16 }}>
                <div style={{ flexShrink: 0, width: 36, height: 36, borderRadius: '50%', background: NAVY, color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'Montserrat', fontWeight: 700, fontSize: 13 }}>{String(i + 1).padStart(2, '0')}</div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: 'flex', alignItems: 'baseline', gap: 10, flexWrap: 'wrap', marginBottom: 6 }}>
                    <div style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 15.5, color: NAVY }}>{c.name}</div>
                    <div style={{ fontSize: 10.5, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 0.6, color: tag.color, textTransform: 'uppercase' }}>{tag.label}</div>
                  </div>
                  <div style={{ fontSize: 13, color: MUTE, marginBottom: 12 }}>{c.business}, {c.location}</div>
                  <div style={{ background: SOFT, borderLeft: `3px solid ${CYAN}`, padding: '12px 14px', borderRadius: 6, marginBottom: 10 }}>
                    <div style={{ fontSize: 10.5, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 0.8, color: CYAN, textTransform: 'uppercase', marginBottom: 4 }}>{summaryQuestionLabel(c)}</div>
                    <div style={{ fontSize: 14.5, lineHeight: 1.55, color: '#1f2937', fontStyle: 'italic' }}>"{summaryQuestion(c)}"</div>
                  </div>
                  <div style={{ fontSize: 13.5, lineHeight: 1.6, color: SLATE }}><strong style={{ color: NAVY, fontFamily: 'Montserrat', fontWeight: 600 }}>The instinct:</strong> {c.takeaway}</div>
                </div>
                <button onClick={() => onJump(i)} style={{ fontSize: 12, color: CYAN, fontFamily: 'Montserrat', fontWeight: 600, padding: '6px 10px', borderRadius: 6, border: `1px solid ${LINE}`, background: '#fff', flexShrink: 0 }}>Revisit →</button>
              </div>
            </div>
          );
        })}
      </div>

      <div style={{ background: PAPER, borderRadius: 14, border: `1px solid ${LINE}`, padding: '28px 32px', marginBottom: 24 }}>
        <div style={{ fontSize: 11, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 1.5, color: NAVY, textTransform: 'uppercase', marginBottom: 12 }}>One last thing</div>
        <p style={{ fontSize: 15, lineHeight: 1.7, color: '#1f2937', margin: '0 0 12px' }}>
          The best calibration sessions are not the ones where every rating gets dropped. They are the ones where every rating gets properly defended, including the ones that hold. A High that survives a sharp question is a much stronger High than a High that nobody asked about.
        </p>
        <p style={{ fontSize: 15, lineHeight: 1.7, color: SLATE, margin: 0 }}>
          And the conversations that flow most easily in the room are the ones where the manager has done the work in advance. Time invested in a thoughtful, evidence-led submission pays back many times over when the case reaches calibration. That makes preparing managers well, before the session, one of the most useful things any of us can do for the quality of the day.
        </p>
      </div>

      <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap' }}>
        <a href="Conversation Cards.html" style={{ flex: 1, minWidth: 240, padding: '14px 18px', borderRadius: 10, background: NAVY, color: '#fff', fontFamily: 'Montserrat', fontWeight: 600, fontSize: 14, display: 'inline-flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <span>Open the Conversation Cards reference</span>
          <span>→</span>
        </a>
        <a href="Talent Review Facilitation Guide.html#calibration" style={{ flex: 1, minWidth: 240, padding: '14px 18px', borderRadius: 10, background: '#fff', color: NAVY, border: `1px solid ${LINE}`, fontFamily: 'Montserrat', fontWeight: 600, fontSize: 14, display: 'inline-flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <span>Facilitation Guide, calibration section</span>
          <span>→</span>
        </a>
        <a href="Holcim Potential Workshop.html" style={{ flex: 1, minWidth: 240, padding: '14px 18px', borderRadius: 10, background: '#fff', color: NAVY, border: `1px solid ${LINE}`, fontFamily: 'Montserrat', fontWeight: 600, fontSize: 14, display: 'inline-flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <span>Potential Workshop, practise the 4A assessment</span>
          <span>→</span>
        </a>
      </div>
    </div>
  );
}

function caseTag(c) {
  if (c.variant === 'underclaim') return { label: 'The quiet one', color: AMBER };
  if (c.variant === 'defensible') return { label: 'The rating holds', color: '#3d7d18' };
  if (c.variant === 'portfolio') return { label: 'The whole cohort', color: NAVY2 };
  return { label: 'The over-claim', color: CYAN };
}

function summaryQuestionLabel(c) {
  if (c.variant === 'portfolio') return 'Different questions for different people';
  return 'The question that opened it up';
}

function summaryQuestion(c) {
  if (c.variant === 'portfolio') {
    return "Match the challenge to the person. Back the one whose evidence holds, press performance vs potential on the top deliverer, strip the sponsors out of the visible one, and look beyond the recent win on the comeback story.";
  }
  const pivotal = c.questions.find(q => q.pivotal);
  return pivotal ? pivotal.text : c.questions[0].text;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
