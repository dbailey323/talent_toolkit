<div id="root"></div>

const NAVY = '#041739';
const NAVY2 = '#164375';
const CYAN = '#05b7ed';
const LIME = '#65c12a';
const SLATE = '#3d5070';
const BRAND_GRADIENT = 'linear-gradient(90deg, #65c12a 0%, #05b7ed 50%, #164375 100%)';
const PAPER = '#ffffff';
const BG = '#f4f6fa';
const MUTE = '#6b7280';
const LINE = '#e5e7eb';
const SOFT = '#f1f5f9';

function Stroke({ children, fontSize = 44, darkBg = false }) {
  const h = Math.round(fontSize * 0.24);
  const ext = Math.round(fontSize / 6);
  return (
    <span style={{ display: 'inline-block', position: 'relative' }}>
      <span style={{ position: 'absolute', left: -ext, right: -ext, bottom: Math.round(fontSize * 0.05), height: h, background: BRAND_GRADIENT, zIndex: 0 }} />
      <span style={{ position: 'relative', zIndex: 1, color: darkBg ? '#fff' : 'inherit' }}>{children}</span>
    </span>
  );
}

const TOOLS_FOR_ALL = [
  {
    title: 'Career Reflections',
    label: 'Start here',
    accent: LIME,
    href: 'Holcim Career Reflections.html',
    blurb: 'A private reflection tool to help you think about your experience, strengths, career interests and development needs. Use it for yourself, or download your reflections as a PDF if you choose to share them.',
    cta: 'Open Career Reflections',
    primary: true,
  },
  {
    title: 'Development Goals / IDP',
    label: 'Draft your development plan',
    accent: CYAN,
    href: 'Development Plan.html',
    blurb: 'Use this tool to draft up to three development objectives in your own words. When you are ready, paste them into Development Goals in SuccessFactors. Owned by you, saved on your device.',
    cta: 'Open the IDP tool',
  },
  {
    title: 'SuccessFactors Career Profile',
    label: 'Keep your profile current',
    accent: NAVY2,
    href: 'https://performancemanager.successfactors.eu/sf/home?bplte_company=holcimgrou&_s.crb=PcBI73JPtbn9p7M%2fVJRcM3GeYigB5SjLP6MCJkzRD94%3d',
    external: true,
    blurb: 'Update your experience, career interests and aspirations in SuccessFactors so your profile reflects where you are now and what you may want next.',
    cta: 'Open SuccessFactors',
  },
];

const TOOLS_FOR_TR = [
  {
    title: 'Prepare your colleague profile',
    label: 'Talent Review',
    accent: LIME,
    href: 'Prepare Your Profile.html',
    blurb: 'A walk through every field of the Colleague Talent Profile, with a private drafting space for the harder free-text answers. Word counts match the form.',
    cta: 'Start preparing',
  },
  {
    title: 'Read the Talent Review Colleague Guide',
    label: 'Reference',
    accent: CYAN,
    href: 'Colleague Guide.html',
    blurb: 'What Talent Review is, what it is not, what your manager will be asked to consider, and how to prepare for your career conversation.',
    cta: 'Open guide',
  },
  {
    title: 'Have your career conversation',
    label: 'With your manager',
    accent: NAVY2,
    href: 'Colleague Guide.html#conversation',
    blurb: 'Use your reflections to prepare. Focus on the points you want your manager to understand about your experience, ambitions and development needs.',
    cta: 'View guidance',
  },
];

const STEPS = [
  {
    n: '01',
    label: 'Reflect and update your profile',
    audience: 'For all colleagues',
    accent: LIME,
    body: 'Use Career Reflections and SuccessFactors to capture your experience, strengths, career interests and development goals. Useful whether or not your role is in scope for Talent Review.',
  },
  {
    n: '02',
    label: 'Prepare for your career conversation',
    audience: 'For colleagues in scope for Talent Review',
    accent: CYAN,
    body: 'If your role is in scope, use your reflections to prepare before manager input is completed. You do not need to share everything, but think about what you want your manager to understand.',
  },
  {
    n: '03',
    label: 'Turn feedback into action',
    audience: 'For all colleagues',
    accent: NAVY2,
    body: 'Use feedback from your manager to agree at least one clear development action. Keep it live in your regular one to ones and capture it in your Development Goals.',
  },
];

function App() {
  return (
    <div style={{ minHeight: '100vh', background: BG }}>
      <Header />
      <div style={{ maxWidth: 1120, margin: '0 auto', padding: '32px 24px 80px' }}>
        <Hero />
        <Section
          id="all"
          eyebrow="Section 1"
          title="Tools for all colleagues"
          intro="Use these to reflect on your experience, career interests and development goals. They support regular one to ones, career conversations and development planning at any point in the year."
          tools={TOOLS_FOR_ALL}
        />
        <Section
          id="tr"
          eyebrow="Section 2"
          title="For colleagues in roles in scope for Talent Review"
          intro="If you have been told your role is in scope for Talent Review, use the tools below to prepare before manager input is completed."
          note="Being in scope does not mean an outcome has already been decided. It means your role is part of this year's review population, and your experience, aspirations and development needs should be understood as part of the process."
          tools={TOOLS_FOR_TR}
        />
        <StepsStrip />
      </div>
      <Footer />
    </div>
  );
}

function Footer() {
  return (
    <footer style={{ borderTop: `1px solid ${LINE}`, padding: '24px 32px', textAlign: 'center', fontSize: 12, color: MUTE, fontFamily: 'Reddit Sans' }}>
      Your career tools · Holcim UK
    </footer>
  );
}

function Hero() {
  return (
    <div style={{ background: NAVY, color: '#fff', borderRadius: 20, padding: '48px 48px 40px', position: 'relative', overflow: 'hidden', marginBottom: 36 }}>
      <div aria-hidden style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 4, background: BRAND_GRADIENT }} />
      <div aria-hidden style={{ position: 'absolute', right: -120, bottom: -140, width: 320, height: 320, borderRadius: '50%', background: `radial-gradient(circle, ${CYAN}33, transparent 70%)` }} />
      <div style={{ position: 'relative', maxWidth: 720 }}>
        <h1 style={{ fontFamily: 'Montserrat', fontWeight: 800, fontSize: 44, lineHeight: 1.08, margin: '0 0 22px', letterSpacing: -1.1 }}>
          Your career tools, in <Stroke fontSize={44} darkBg>one place.</Stroke>
        </h1>
        <p style={{ fontSize: 16.5, lineHeight: 1.65, color: 'rgba(255,255,255,0.85)', maxWidth: 660, margin: '0 0 14px' }}>
          A page that brings together the tools to help you reflect on your career, keep your profile current, and agree practical development actions with your manager.
        </p>
        <p style={{ fontSize: 15, lineHeight: 1.65, color: 'rgba(255,255,255,0.7)', maxWidth: 660, margin: '0 0 24px' }}>
          Some tools are useful for all colleagues throughout the year. If your role is in scope for Talent Review, specific guidance further down the page helps you prepare for your colleague profile and career conversation.
        </p>
        <a href="Holcim Career Reflections.html" style={{ padding: '13px 22px', borderRadius: 10, background: '#fff', color: NAVY, fontFamily: 'Montserrat', fontWeight: 700, fontSize: 14.5, letterSpacing: 0.3, display: 'inline-flex', alignItems: 'center', gap: 10 }}>
          Start with Career Reflections <span>→</span>
        </a>
      </div>
    </div>
  );
}

function Section({ id, eyebrow, title, intro, note, tools }) {
  return (
    <section id={id} style={{ marginBottom: 56, scrollMarginTop: 96 }}>
      <div style={{ marginBottom: 22 }}>
        <div style={{ fontSize: 11, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 1.8, color: NAVY, textTransform: 'uppercase', marginBottom: 8 }}>{eyebrow}</div>
        <h2 style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 28, color: NAVY, margin: '0 0 12px', letterSpacing: -0.5 }}>{title}</h2>
        <p style={{ fontSize: 15.5, lineHeight: 1.65, color: SLATE, margin: 0, maxWidth: 800 }}>{intro}</p>
        {note && (
          <div style={{ marginTop: 14, padding: '12px 16px', borderLeft: `3px solid ${CYAN}`, background: SOFT, borderRadius: 6, maxWidth: 800 }}>
            <div style={{ fontSize: 14, lineHeight: 1.6, color: '#1f2937' }}>{note}</div>
          </div>
        )}
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(320px, 1fr))', gap: 16 }}>
        {tools.map((t, i) => <ToolCard key={i} tool={t} />)}
      </div>
    </section>
  );
}

function ToolCard({ tool }) {
  const [hover, setHover] = useState(false);
  return (
    <a
      href={tool.href}
      target={tool.external ? '_blank' : undefined}
      rel={tool.external ? 'noopener' : undefined}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        display: 'flex', flexDirection: 'column',
        background: '#fff', border: `1px solid ${hover ? tool.accent : LINE}`,
        borderLeft: `3px solid ${tool.accent}`,
        borderRadius: 12, padding: '22px 22px 20px',
        cursor: 'pointer', textDecoration: 'none',
        transition: 'transform .15s ease, box-shadow .15s ease, border-color .15s ease',
        transform: hover ? 'translateY(-2px)' : 'translateY(0)',
        boxShadow: hover ? '0 12px 28px rgba(4,23,57,0.10)' : '0 1px 0 rgba(4,23,57,0.02)',
        position: 'relative',
      }}
    >
      {tool.primary && (
        <div style={{ position: 'absolute', top: 14, right: 14, fontSize: 9.5, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 0.8, color: '#3d7d18', background: '#f0fbf3', border: `1px solid ${LIME}55`, padding: '3px 7px', borderRadius: 4, textTransform: 'uppercase' }}>
          Start here
        </div>
      )}
      {!tool.primary && tool.label && (
        <div style={{ fontSize: 10.5, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 0.8, color: tool.accent, marginBottom: 10, textTransform: 'uppercase' }}>{tool.label}</div>
      )}
      {tool.primary && <div style={{ height: 14 }} />}
      <h3 style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 18, color: NAVY, margin: '0 0 10px', letterSpacing: -0.3 }}>{tool.title}</h3>
      <p style={{ fontSize: 14, lineHeight: 1.6, color: SLATE, margin: '0 0 16px', flex: 1 }}>{tool.blurb}</p>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, color: NAVY, fontFamily: 'Montserrat', fontWeight: 700, fontSize: 13 }}>
        <span>{tool.cta}</span>
        <span style={{ transition: 'transform .15s ease', transform: hover ? 'translateX(4px)' : 'translateX(0)' }}>→</span>
      </div>
    </a>
  );
}

function StepsStrip() {
  return (
    <section style={{ background: PAPER, border: `1px solid ${LINE}`, borderRadius: 16, padding: '32px 32px 28px', marginTop: 12 }}>
      <div style={{ fontSize: 11, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 1.8, color: NAVY, textTransform: 'uppercase', marginBottom: 8 }}>How this fits together</div>
      <h2 style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 24, color: NAVY, margin: '0 0 22px', letterSpacing: -0.4 }}>Three steps, across the year.</h2>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(260px, 1fr))', gap: 18 }}>
        {STEPS.map(s => (
          <div key={s.n} style={{ borderTop: `3px solid ${s.accent}`, paddingTop: 14 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 10 }}>
              <div style={{ fontFamily: 'Montserrat', fontWeight: 800, fontSize: 22, color: NAVY, letterSpacing: -0.4 }}>{s.n}</div>
              <div style={{
                fontSize: 10, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 0.6,
                color: s.accent, background: '#fff', border: `1px solid ${s.accent}55`,
                padding: '3px 8px', borderRadius: 999, textTransform: 'uppercase',
              }}>{s.audience}</div>
            </div>
            <div style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 15, color: NAVY, lineHeight: 1.3, marginBottom: 8 }}>{s.label}</div>
            <div style={{ fontSize: 13.5, lineHeight: 1.6, color: SLATE }}>{s.body}</div>
          </div>
        ))}
      </div>
    </section>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
