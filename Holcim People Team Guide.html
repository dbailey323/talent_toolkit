<script type="text/babel">

// Signature stroke - gradient bar at the baseline.
const Stroke = ({ children, fontSize = 28 }) => {
  const h = Math.round(fontSize * 0.22);
  const ext = Math.round(fontSize / 6);
  return (
    <span style={{ display: 'inline-block', position: 'relative' }}>
      <span style={{
        position: 'absolute', left: -ext, right: -ext,
        bottom: Math.round(fontSize * 0.04),
        height: h,
        background: 'linear-gradient(90deg, #65c12a 0%, #05b7ed 50%, #164375 100%)',
        zIndex: 0,
      }}></span>
      <span style={{ position: 'relative', zIndex: 1 }}>{children}</span>
    </span>
  );
};

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#00868a",
  "showDates": true
}/*EDITMODE-END*/;

// ── Timeline dates (edit these) ───────────────────────────────────────────────
const TIMELINE = [
  { stage: 0, label: 'Manager and colleague upskilling: workshops, guides and toolkit go live', date: 'May', owner: 'Talent Team', duration: '1 month' },
  { stage: 1, label: 'Colleague self-assessment window opens', date: 'Start of June', owner: 'Talent Team', duration: '4 weeks' },
  { stage: 1, label: 'Colleague forms close', date: '30 June', owner: 'Colleague', duration: null },
  { stage: 2, label: 'Manager assessment forms released', date: 'July', owner: 'Talent Team', duration: '4 weeks' },
  { stage: 2, label: 'Manager assessments close', date: 'July', owner: 'Line Manager', duration: null },
  { stage: 2, label: 'IDP and career conversation with colleague', date: 'End of July', owner: 'Line Manager', duration: null },
  { stage: 3, label: 'Regional calibration sessions', date: '1–31 August', owner: 'Head of People + Head of Talent', duration: '1 month' },
  { stage: 4, label: 'ExCo Talent Coordinating Committee - first session', date: 'September', owner: 'ExCo + HR Lead', duration: null },
  { stage: 4, label: 'Development actions kept live in ongoing one-to-ones', date: 'September onwards', owner: 'Line Manager + Colleague', duration: 'Ongoing' },
  { stage: 4, label: 'ExCo Talent Coordinating Committee - ongoing cadence', date: 'October onwards', owner: 'ExCo + HR Lead', duration: 'Quarterly' },
];

const STAGE_COLORS = { 1: TEAL, 2: TEAL2, 3: NAVY, 4: SLATE };
const STAGE_LABELS = { 1: 'Colleague Self-Assessment', 2: 'Manager Assessment', 3: 'Calibration', 4: 'ExCo Review' };

// ── Role definitions ──────────────────────────────────────────────────────────
const ROLES = {
  colleague: {
    label: 'Colleague', color: TEAL,
    what: 'The person being assessed. Completes a self-assessment covering their aspirations, development needs and career goals.',
    responsibilities: [
      'Complete the self-assessment form honestly and in full',
      'Reflect on career aspirations - where they want to go, not just what they\'ve done',
      'Identify their own development gaps and priorities',
      'Submit by the deadline so their input feeds into the manager\'s assessment',
    ],
    notResponsible: [
      'They will not see their potential rating - this is an internal calibration tool',
      'They are not required to advocate for a specific outcome',
    ],
    payback: 'Colleagues who engage fully will receive a meaningful feedback conversation and a specific development plan - not a generic one. Their self-assessment shapes what happens next.',
  },
  manager: {
    label: 'Line Manager', color: TEAL2,
    what: 'Responsible for completing the 4A potential assessment for each direct report, supported by the colleague\'s self-assessment.',
    responsibilities: [
      'Review the colleague\'s self-assessment before completing their own',
      'Assess each of the 4As using specific, evidenced examples - not general impressions',
      'Distinguish between how someone performs today and whether they have the capacity to go further',
      'Identify a realistic next role and a specific development action - not a vague plan',
      'Complete and submit the form by the deadline',
    ],
    notResponsible: [
      'Managers do not decide final potential ratings alone - these are calibrated in the review session',
      'Managers should not share potential ratings with colleagues',
    ],
    payback: 'Managers who do this well create the conditions for honest, high-quality development conversations. A well-evidenced assessment is also a defensible one - in the calibration room and beyond.',
  },
  hop: {
    label: 'Head of People', color: SLATE,
    what: 'The Head of People is the named owner of the review in their business area. In practice: hold the timeline, brief every line manager in person, review every assessment before calibration, lead the calibration session itself, present the calibrated cohort to ExCo, and follow up on every development action that comes out of it. The cycle in your area is only as good as your presence in it.',
    responsibilities: [
      'Explain scope clearly: roles are in scope for this cycle, not individuals. Be ready when colleagues ask why their peer\'s role is in and theirs is not, or the other way round.',
      'Ensure leaders in your area brief the colleagues whose roles are in scope before forms go out, naming it as the role being in scope - the "big why" must land before the form arrives',
      'Brief and prepare line managers on the 4A framework and what good evidence looks like - in person, not by email',
      'Monitor completion and address quality issues early - not in the calibration room',
      'Review every submission ahead of calibration and identify thin evidence or performance/potential confusion',
      'Lead calibration sessions yourself - surface disagreements, don\'t smooth them over',
      'Represent your cohort at ExCo with evidence-based summaries',
      'Follow up on every agreed development action and keep it live with managers - not parked until next cycle',
    ],
    notResponsible: [
      'Heads of People do not have direct data access in Stages 1–2 - this is managed centrally by the Talent team',
      'They do not share potential ratings with colleagues or managers',
    ],
    payback: 'A well-run review in your area gives you a credible, defensible view of your talent pipeline - the basis for succession decisions that actually hold up.',
  },
  talent: {
    label: 'Head of Talent', color: '#4a5d8a',
    what: 'Owns the central infrastructure, data management and process quality across all business areas. The Talent team releases forms, holds the data, and provides Heads of People with access at the right stage.',
    responsibilities: [
      'Release colleague and manager forms on schedule',
      'Manage data centrally - Heads of People receive access ahead of calibration, not before',
      'Provide completion tracking to Heads of People throughout',
      'Quality-check assessments across business areas for consistency',
      'Prepare the ExCo pack in partnership with Heads of People',
      'Consolidate outputs post-calibration and manage next steps tracking',
    ],
    notResponsible: [
      'The "big why" lands most effectively through business leaders - the Talent team supports with materials and messaging, but does not lead the colleague communication',

    ],
    payback: 'A well-managed central process gives Heads of People what they need, when they need it. The Talent team\'s credibility depends on the infrastructure being invisible - forms go out on time, data is clean, access is controlled.',

    label: 'ExCo / Senior Leadership', color: '#4a1d96',
    what: 'Reviews calibrated assessments across the business, governs talent moves in the interest of Holcim as a whole, and holds the organisation accountable for agreed development actions through a monthly Talent Coordinating Committee.',
    responsibilities: [
      'Engage genuinely with the assessments - not rubber-stamp them',
      'Challenge where patterns suggest bias, consistency issues or performance/potential confusion',
      'Make succession nominations against specific roles, with readiness indicators',
      'Govern talent moves in Holcim\'s interest - not just the individual business unit\'s',
      'Track progress against agreed development actions at each Committee meeting',
      'Surface disagreements - unanimous consensus is a signal that challenge was absent',
    ],
    notResponsible: [
      'ExCo does not communicate ratings to individuals',
      'They do not override calibrated ratings without a clear rationale',
    ],
    payback: 'A rigorous Committee produces succession plans that are actually usable, development commitments that are tracked and held to account, and talent moves that serve the organisation - not just individual preferences.',
  },
};

// ── FAQ ───────────────────────────────────────────────────────────────────────
const FAQS = [
  {
    q: '"Why is my role in scope but not my peer\'s?"',
    a: 'Scope is defined by role, not by person. This cycle is focused on colleagues in P&L roles and feeder roles that lead into them, so the population is built from the role-set, not from individual choices. Land the point directly: being in scope reflects the role someone is in today, not a judgement on the colleagues who are not. Being out of scope this cycle does not mean being overlooked. Colleagues out of scope can still use Career Reflections, update their SuccessFactors Career Profile and agree development goals with their manager.',
    tag: 'Common',
  },
  {
    q: '"The evidence in this assessment is too thin to calibrate against. What do I do?"',
    a: 'This will happen - particularly in year one, when assessing potential is a new skill for many managers. You have two options. If you have time before calibration, send the assessment back with specific guidance: not "add more detail" but "for Ability, describe a specific moment where this person demonstrated thinking above their current level - name the situation, what they did, and what the outcome was." If you are out of time, bring it to calibration flagged as insufficient evidence. The panel should agree to defer the rating or note it as unrated rather than invent a judgement. A deferred rating is honest. A guessed rating is not.',
    tag: 'Common',
  },
  { q: '"My manager is also being assessed - they\'ll know they have a rating somewhere. How do I handle that?"',
    a: 'Acknowledge it directly. Managers who are also colleagues are in the same position as everyone else - they participate in the process and receive a development conversation, but do not see their potential rating. The reason is consistent across all levels: potential ratings are a calibration tool for the organisation, not an entitlement for the individual. If pressed, you can say: "The process is the same for everyone, including people managers. What you will get is honest feedback and a specific development conversation." ',
    tag: 'Sensitive',
  },
  {
    q: '"Why won\'t we tell people their potential rating?"',
    a: 'Potential ratings are a relative, calibrated judgement - they are only meaningful in the context of the full cohort, and they change over time as people grow and roles evolve. Sharing a raw rating without that context creates more confusion and anxiety than clarity. The commitment to colleagues is not a rating - it\'s a quality feedback conversation and a real development action. That is what the process should produce.',
    tag: 'Common',
  },
  {
    q: '"A manager says they\'re too busy to fill this in properly."',
    a: 'This is the most common objection. The response: "A weak assessment doesn\'t protect your time - it comes back in the calibration room, where you\'ll have to defend it without evidence. A good assessment takes 30 minutes per person if you\'ve been paying attention to your team. If you haven\'t, that\'s worth knowing." If the issue is genuine capacity, work with them on prioritisation - but don\'t accept a low-quality submission.',
    tag: 'Common',
  },
  {

const FEEDBACK_STEPS = [

function FrameworkSection() {
  const [activeA, setActiveA] = useState('ability');
  const a = FOUR_AS.find(x => x.key === activeA);
  return (
    <div>
      <div style={{ background: `${NAVY}08`, borderRadius: 12, padding: '18px 22px', marginBottom: 28, borderLeft: `4px solid ${TEAL}` }}>
        <div style={{ fontSize: 14.5, lineHeight: 1.75, color: '#374151' }}>
          <strong style={{ color: NAVY }}>The central principle:</strong> potential is not the same as performance. Performance measures how well someone delivers in their current role, today. Potential measures whether they have the capacity to perform effectively one level up - in more complex, unfamiliar and higher-stakes situations. The 4As are designed to assess potential, not reward performance.
        </div>
      </div>
      <div style={{ display: 'flex', gap: 8, marginBottom: 28, flexWrap: 'wrap' }}>
        {FOUR_AS.map(a => (
          <button key={a.key} onClick={() => setActiveA(a.key)} style={{
            padding: '10px 22px', borderRadius: 8, border: 'none', cursor: 'pointer',
            background: activeA === a.key ? a.color : '#f0f2f5',
            color: activeA === a.key ? '#fff' : SLATE,
            fontFamily: 'DM Sans, sans-serif', fontWeight: 700, fontSize: 15,
            letterSpacing: '0.04em', textTransform: 'uppercase', transition: 'all 0.15s',
          }}>{a.label}</button>
        ))}
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 20 }}>
        <div style={{ background: LIGHT, borderRadius: 10, padding: '20px', borderLeft: `3px solid ${a.color}` }}>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.07em', textTransform: 'uppercase', color: a.color, marginBottom: 8 }}>Definition</div>
          <div style={{ fontSize: 15, lineHeight: 1.7, color: '#1f2937', fontWeight: 500, marginBottom: 12 }}>{a.definition}</div>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.07em', textTransform: 'uppercase', color: '#9ca3af', marginBottom: 6 }}>Key question to ask</div>

        <div style={{ background: '#fef3c7', borderRadius: 10, padding: '20px', border: '1px solid #fcd34d' }}>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.07em', textTransform: 'uppercase', color: AMBER, marginBottom: 8 }}>Performance vs. potential distinction</div>

      </div>
      <div style={{ background: '#fff', border: '1px solid #e5e7eb', borderRadius: 10, padding: '20px 24px' }}>

}

  useEffect(() => {
    const handler = e => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  useEffect(() => {
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) setActiveSection(e.target.id); });
    }, { threshold: 0.3 });
    document.querySelectorAll('section[id]').forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);

    const next = { ...tweaks, [key]: val };

          <SectionTitle label="Post-Review Feedback" title="How to give a quality feedback conversation" color={TEAL2} />
          <div style={{ background: '#fef3c7', border: '1px solid #fcd34d', borderRadius: 10, padding: '16px 20px', marginBottom: 24 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: AMBER, marginBottom: 6 }}>Important: do not share potential ratings</div>
          <div style={{ fontSize: 14, color: '#92400e', lineHeight: 1.7 }}>Feedback conversations are led by the line manager - the Head of People’s role is to coach managers to prepare well and follow this guide. Where appropriate, Heads of People may attend some conversations to support, but they are not the primary owner.</div>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            {FEEDBACK_STEPS.map((step, i) => (
              <div key={i} style={{ display: 'flex', gap: 16, background: LIGHT, borderRadius: 10, padding: '18px 20px', border: '1px solid #e5e7eb' }}>
                <div style={{ width: 32, height: 32, borderRadius: '50%', background: TEAL2, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                  <span style={{ fontSize: 14, fontWeight: 700, color: '#fff' }}>{i + 1}</span>
                </div>
                <div>
                  <div style={{ fontSize: 15, fontWeight: 700, color: NAVY, marginBottom: 4 }}>{step.title}</div>
                  <div style={{ fontSize: 14, lineHeight: 1.7, color: '#374151' }}>{step.body}</div>
                </div>
              </div>
            ))}
          </div>
        </Section>

        {/* FAQ */}
        <Section id="faq">
          <SectionTitle label="FAQ" title="Manager objections - and how to handle them" color={SLATE} />
          <FAQView />
        </Section>
      </div>
