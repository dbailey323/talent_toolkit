const { useState, useEffect, useMemo, useRef } = React;

// ── Holcim brand ──────────────────────────────────────────────────────────────

// ── Three doors (Self / Others / Work, Me/Us/It DNA, surface labels new) ─────
const DOORS = [
  {
    id: 'self',
    label: 'Self',
    blurb: 'Who you are, how you show up, what you want.',
    color: CYAN,
    tint: '#e6f7fd',
    prompts: [
      {
        id: 'self-1',
        title: 'When were you most yourself at work recently?',
        sub: 'Think of a moment in the last few weeks. Not your best moment, your most you moment. What were you doing? Who were you with?',
        followUp: 'What does that tell you about the work and the conditions where you do your best thinking?',
      },
      {
        id: 'self-2',
        title: 'What did this year ask of you that last year didn’t?',
        sub: 'Not just busier, harder. What was genuinely new, and how did you respond to it?',
        followUp: 'What did you learn about yourself you didn’t know twelve months ago?',
      },
      {
        id: 'self-3',
        title: 'What are you avoiding?',
        sub: 'A conversation, a decision, a piece of work, a piece of feedback. Be honest. No one sees this but you.',
        followUp: 'What is the avoidance costing you, and what would it take to stop?',
      },
      {
        id: 'self-4',
        title: 'What do you say you want, and is it true?',
        sub: 'Write down where you say you want to be in three years. Then read it back like a stranger would.',
        followUp: 'If your calendar and your choices were the only evidence, would they back it up?',
      },
      {
        id: 'self-5',
        title: 'What feedback have you heard twice?',
        sub: 'The thing more than one person has said to you, in different ways, over more than a year. Don’t pick the easy one.',
        followUp: 'What would change if you actually believed it?',
      },
      {
        id: 'self-6',
        title: 'What do you bring that no one else on your team brings?',
        sub: 'Not your job. Your particular contribution. The thing that would be missing if you left tomorrow.',
        followUp: 'Are you using it, or saving it for a role that hasn’t arrived yet?',
      },
      {
        id: 'self-7',
        title: 'When did you last change your mind about something that mattered?',
        sub: 'A position you held. A view of a person. A read on the business. What moved you?',
        followUp: 'What does that say about the kind of evidence you actually trust?',
      },
    ],
  },
  {
    id: 'others',
    label: 'Others',
    blurb: 'How you lead, follow, influence, and build with people around you.',
    color: LIME,
    tint: '#eaf6e0',
    prompts: [
      {
        id: 'others-1',
        title: 'Who do you make better, and who makes you better?',
        sub: 'Name them. Specifically. Then ask: do they know?',
        followUp: 'When did you last tell either of them, and what changed because you did?',
      },
      {
        id: 'others-2',
        title: 'Where are you the bottleneck for your team?',
        sub: 'The decision they wait on. The work that stalls in your inbox. The thing that only moves when you push it.',
        followUp: 'What’s one thing you could let go of this quarter, and who would grow if you did?',
      },
      {
        id: 'others-3',
        title: 'When did you last give feedback that was hard to give?',
        sub: 'Not a moan, not a debrief. The conversation you nearly didn’t have. What did you say, and what did it cost you to say it?',
        followUp: 'If you can’t think of one in the last six months, what does that mean?',
      },
      {
        id: 'others-4',
        title: 'How do you behave when you disagree with your manager?',
        sub: 'Pick a specific recent example. Did you challenge, defer, or go quiet?',
        followUp: 'Is that the pattern you want to be known for at the next level?',
      },
      {
        id: 'others-5',
        title: 'Who in the business doesn’t know you yet, but should?',
        sub: 'Two or three names. People whose view of you would matter, who currently have no read on you at all.',
        followUp: 'What’s your honest plan for being on their radar in the next six months?',
      },
      {
        id: 'others-6',
        title: 'When you walk into a room, what do people expect?',
        sub: 'Energy, calm, challenge, answers, questions, friction, fix-it. What’s your reputation, in one word?',
        followUp: 'Is that the reputation you’d choose, and if not, what’s the gap?',
      },
      {
        id: 'others-7',
        title: 'Who are you developing for your job?',
        sub: 'If you were promoted in six months, who steps up? If the answer is no one, that’s the answer.',
        followUp: 'What would you need to start doing now to make that succession real?',
      },
    ],
  },
  {
    id: 'work',
    label: 'Work',
    blurb: 'The craft, the commercial outcomes, the delivery. What you actually do.',
    color: NAVY2,
    tint: '#e6ecf2',
    prompts: [
      {
        id: 'work-1',
        title: 'What are you genuinely accountable for, and what are you just associated with?',
        sub: 'Two columns in your head. Be ruthless. Association is not accountability.',
        followUp: 'If you only had the accountability column on your CV, would it still be enough?',
      },
      {
        id: 'work-2',
        title: 'Which decision this quarter would you make differently?',
        sub: 'Not the one that went wrong. That’s easy. The one that worked but you got there the wrong way.',
        followUp: 'What did you learn that you’ll bring to the next decision like it?',
      },
      {
        id: 'work-3',
        title: 'Defend your commercial impact in one paragraph.',
        sub: 'No job title, no department, no team. Just the numbers and the moves. What did the business gain because you were in role this year?',
        followUp: 'If that paragraph feels thin, what needs to be true twelve months from now for it to land?',
      },
      {
        id: 'work-4',
        title: 'What is the hardest part of your job, and are you doing it?',
        sub: 'Not the busiest. The hardest. The bit you’d most easily duck if you wanted to.',
        followUp: 'How much of your week actually goes to it, honestly?',
      },
      {
        id: 'work-5',
        title: 'Where are you operating one level up already?',
        sub: 'A meeting, a decision, a stakeholder, a piece of thinking. Be specific. One example, with detail.',
        followUp: 'Where are you still operating one level down, and what would it take to stop?',
      },
      {
        id: 'work-6',
        title: 'What problem in the business is yours to solve, even if no one’s asked you to?',
        sub: 'The thing you can see that others can’t, or won’t. Owning it is what the next level looks like.',
        followUp: 'What’s the first move you could make on it inside thirty days?',
      },

        id: 'work-7',
        title: 'If you stayed in this role for two more years, what would you build?',

      {
        id: 'work-8',
        title: 'Where is your timeline unrealistic?',
        sub: 'Pick the gap between where you say you want to be and where the evidence says you are. Don’t soften it.',
        followUp: 'What’s the one experience that would close it, and how do you get into it?',
      },
    ],
  },
];

const STORAGE_KEY = 'holcim_career_reflections_v1';

// ── Persistence ───────────────────────────────────────────────────────────────
function loadEntries() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [];
  } catch (e) { return []; }
}
function saveEntries(entries) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); } catch (e) {}
}

function fmtDate(ts) {
  const d = new Date(ts);
  const opts = { day: 'numeric', month: 'short', year: 'numeric' };
  return d.toLocaleDateString('en-GB', opts);
}
function fmtRelative(ts) {
  const diff = Date.now() - ts;
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return `${m} min ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h} hr ago`;
  const d = Math.floor(h / 24);
  if (d < 7) return `${d} day${d > 1 ? 's' : ''} ago`;
  return fmtDate(ts);
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [view, setView] = useState('home'); // home | door | prompt | log
  const [activeDoor, setActiveDoor] = useState(null);
  const [activePrompt, setActivePrompt] = useState(null);
  const [entries, setEntries] = useState(loadEntries);

  useEffect(() => { saveEntries(entries); }, [entries]);

  const counts = useMemo(() => {
    const c = { self: 0, others: 0, work: 0 };
    entries.forEach(e => { if (c[e.doorId] !== undefined) c[e.doorId]++; });
    return c;
  }, [entries]);

  function openDoor(door) { setActiveDoor(door); setView('door'); }
  function openPrompt(prompt) { setActivePrompt(prompt); setView('prompt'); }
  function backHome() { setView('home'); setActiveDoor(null); setActivePrompt(null); }
  function backToDoor() { setView('door'); setActivePrompt(null); }

  function saveEntry(entry) {
    setEntries(prev => [entry, ...prev]);
  }
  function deleteEntry(id) {
    setEntries(prev => prev.filter(e => e.id !== id));
  }
  function clearAll() {
    if (confirm('Clear all your reflections? This cannot be undone.')) setEntries([]);
  }

  return (
    <div style={{ minHeight: '100vh', background: BG }}>
      <Header onLog={() => setView('log')} onHome={backHome} entryCount={entries.length} />
      <div style={{ maxWidth: 980, margin: '0 auto', padding: '32px 24px 80px' }}>
        {view === 'home' && <Home onOpenDoor={openDoor} counts={counts} totalEntries={entries.length} onLog={() => setView('log')} />}
        {view === 'door' && activeDoor && <DoorView door={activeDoor} entries={entries} onPick={openPrompt} onBack={backHome} />}
        {view === 'prompt' && activePrompt && activeDoor && (
          <PromptView
            door={activeDoor}
            prompt={activePrompt}
            onSave={(entry) => { saveEntry(entry); backToDoor(); }}
            onBack={backToDoor}
          />
        )}
        {view === 'log' && <LogView entries={entries} onDelete={deleteEntry} onClearAll={clearAll} onBack={backHome} />}
      </div>
      <Footer />
    </div>
  );
}

// ── Signature Stroke (Holcim brand gradient bar) ──────────────────────────────
function Stroke({ children, fontSize = 40, darkBg = false }) {
  // Sit just below the baseline-ish, overlapping letter bottoms.
  // Larger size = thicker, smaller size = proportionally thicker so it reads.
  const h = Math.round(fontSize * 0.26);
  const ext = Math.round(fontSize / 5);
  const bottom = Math.round(fontSize * 0.10);
  return (
    <span style={{ display: 'inline-block', position: 'relative' }}>
      <span style={{
        position: 'absolute', left: -ext, right: -ext,
        bottom, height: h,
        background: BRAND_GRADIENT, zIndex: 0,
      }}/>
      <span style={{ position: 'relative', zIndex: 1, color: darkBg ? '#fff' : 'inherit' }}>{children}</span>
    </span>
  );
}

function GoodToKnow() {

    },
    {
      q: 'What happens if I switch device or browser?',
      a: 'Your reflections won’t follow you. What you write on your laptop won’t appear on your phone, and Chrome won’t see what you wrote in Safari. Pick the device you’re most likely to come back to. If you want a copy on the move, copy and paste into your own notes app.',
    },
    {
      q: 'What if I clear my browser data?',

  const steps = [

}

// ── Door view (list of prompts) ───────────────────────────────────────────────

    <div>
      <BackLink onBack={onBack} label="All lenses" />
      <div style={{ background: PAPER, borderRadius: 12, border: `1px solid ${LINE}`, borderTop: `4px solid ${door.color}`, padding: '28px 28px 8px', marginBottom: 24 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 10 }}>
          <div style={{ width: 44, height: 44, borderRadius: '50%', background: door.tint, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <div style={{ width: 18, height: 18, borderRadius: '50%', background: door.color }}/>
          </div>
          <div>
            <div style={{ fontSize: 11, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 1.5, color: door.color, textTransform: 'uppercase' }}>The lens</div>

function PromptRow({ prompt, idx, color, tint, answered, onClick }) {

        {String(idx).padStart(2, '0')}
      </div>

      </div>
      {answered && (
        <div title="You’ve reflected on this" style={{ fontSize: 11, color: color, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 0.5, display: 'flex', alignItems: 'center', gap: 5, flexShrink: 0 }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M5 12l5 5L20 7"/></svg>

}

// ── Prompt view (write + follow-up) ───────────────────────────────────────────
function PromptView({ door, prompt, onSave, onBack }) {
  const [stage, setStage] = useState(1); // 1: first answer, 2: follow-up, 3: review
  const [answer, setAnswer] = useState('');
  const [followUpAnswer, setFollowUpAnswer] = useState('');
  const taRef = useRef(null);
  const taRef2 = useRef(null);

  useEffect(() => { if (stage === 1 && taRef.current) taRef.current.focus(); }, [stage]);
  useEffect(() => { if (stage === 2 && taRef2.current) taRef2.current.focus(); }, [stage]);

  const canContinue = answer.trim().length >= 10;
  const canSave = followUpAnswer.trim().length >= 5 || stage === 3;

  function handleSave(skipFollowUp = false) {
    onSave({
      id: `e_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`,
      doorId: door.id,
      doorLabel: door.label,
      doorColor: door.color,
      promptId: prompt.id,
      promptTitle: prompt.title,
      followUpQuestion: prompt.followUp,
      answer: answer.trim(),
      followUpAnswer: skipFollowUp ? '' : followUpAnswer.trim(),
      ts: Date.now(),
    });
  }

  return (
    <div>
      <BackLink onBack={onBack} label={`Back to ${door.label}`} />

      <div style={{ background: PAPER, borderRadius: 12, border: `1px solid ${LINE}`, borderTop: `4px solid ${door.color}`, overflow: 'hidden' }}>
        <div style={{ padding: '24px 28px 20px', borderBottom: `1px solid ${LINE}`, background: door.tint }}>
          <div style={{ fontSize: 11, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 1.5, color: door.color, textTransform: 'uppercase', marginBottom: 8 }}>
            {door.label} · Reflection
          </div>
          <h2 style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 26, lineHeight: 1.25, margin: '0 0 10px', color: NAVY }}>{prompt.title}</h2>
          <p style={{ fontSize: 15, lineHeight: 1.55, color: SLATE, margin: 0 }}>{prompt.sub}</p>
        </div>

        <div style={{ padding: '24px 28px' }}>
          {/* Stage 1: first answer */}
          <div style={{ marginBottom: 24 }}>
            <StageHeader n="1" label="Your reflection" active={stage === 1} done={stage > 1} color={door.color} />
            {stage === 1 ? (
              <textarea
                ref={taRef}
                value={answer}
                onChange={e => setAnswer(e.target.value)}
                placeholder="Write freely. A few lines is enough. No one sees this but you."
                style={{
                  width: '100%', minHeight: 160, padding: 14, fontSize: 15, lineHeight: 1.55,
                  border: `1px solid ${LINE}`, borderRadius: 8, resize: 'vertical', background: '#fafbfc',
                  fontFamily: 'Reddit Sans', color: INK,
                }}
              />
            ) : (
              <div style={{ background: '#fafbfc', border: `1px solid ${LINE}`, borderRadius: 8, padding: 14, fontSize: 14, lineHeight: 1.55, color: INK, whiteSpace: 'pre-wrap' }}>{answer}</div>
            )}
          </div>

          {/* Stage 2 / 3: follow-up */}
          {stage >= 2 && (
            <div style={{ marginBottom: 24 }}>
              <StageHeader n="2" label="One harder question" active={stage === 2} done={stage > 2} color={door.color} />
              <div style={{ background: door.tint, borderLeft: `3px solid ${door.color}`, padding: '14px 16px', borderRadius: 6, marginBottom: 12 }}>
                <div style={{ fontFamily: 'Montserrat', fontWeight: 600, fontSize: 16, color: NAVY, lineHeight: 1.4 }}>{prompt.followUp}</div>
              </div>
              {stage === 2 ? (
                <textarea
                  ref={taRef2}
                  value={followUpAnswer}
                  onChange={e => setFollowUpAnswer(e.target.value)}
                  placeholder="Stay with it for a moment longer. Then answer."
                  style={{
                    width: '100%', minHeight: 120, padding: 14, fontSize: 15, lineHeight: 1.55,
                    border: `1px solid ${LINE}`, borderRadius: 8, resize: 'vertical', background: '#fafbfc',
                    fontFamily: 'Reddit Sans', color: INK,
                  }}
                />
              ) : followUpAnswer ? (
                <div style={{ background: '#fafbfc', border: `1px solid ${LINE}`, borderRadius: 8, padding: 14, fontSize: 14, lineHeight: 1.55, color: INK, whiteSpace: 'pre-wrap' }}>{followUpAnswer}</div>
              ) : (
                <div style={{ fontSize: 13, color: MUTE, fontStyle: 'italic' }}>Skipped. Sometimes the question is the answer.</div>
              )}
            </div>
          )}

          {/* Action row */}
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', borderTop: `1px solid ${LINE}`, paddingTop: 18, marginTop: 4 }}>
            <button onClick={onBack} style={{ color: MUTE, fontSize: 14, fontFamily: 'Reddit Sans', padding: '8px 0' }}>Cancel</button>
            <div style={{ display: 'flex', gap: 10 }}>
              {stage === 1 && (
                <button
                  onClick={() => canContinue && setStage(2)}
                  disabled={!canContinue}
                  style={{
                    background: canContinue ? NAVY : '#cbd5e1', color: '#fff',
                    fontFamily: 'Montserrat', fontWeight: 700, fontSize: 14, padding: '11px 22px',
                    borderRadius: 6, letterSpacing: 0.3,
                    cursor: canContinue ? 'pointer' : 'not-allowed',
                  }}
                >Continue →</button>
              )}
              {stage === 2 && (
                <>
                  <button onClick={() => { setFollowUpAnswer(''); handleSave(true); }} style={{ color: SLATE, fontSize: 14, fontFamily: 'Reddit Sans', padding: '11px 14px', borderRadius: 6, border: `1px solid ${LINE}`, background: '#fff' }}>Skip & save</button>
                  <button
                    onClick={() => handleSave(false)}
                    disabled={followUpAnswer.trim().length < 5}
                    style={{
                      background: followUpAnswer.trim().length >= 5 ? door.color : '#cbd5e1',
                      color: '#fff',
                      fontFamily: 'Montserrat', fontWeight: 700, fontSize: 14, padding: '11px 22px',
                      borderRadius: 6, letterSpacing: 0.3,
                      cursor: followUpAnswer.trim().length >= 5 ? 'pointer' : 'not-allowed',
                    }}
                  >Save reflection</button>
                </>
              )}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function StageHeader({ n, label, active, done, color }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 12 }}>
      <div style={{
        width: 24, height: 24, borderRadius: '50%',
        background: done ? color : (active ? NAVY : '#e5e7eb'),
        color: done || active ? '#fff' : MUTE,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontFamily: 'Montserrat', fontWeight: 700, fontSize: 12,
      }}>
        {done ? <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3.5"><path d="M5 12l5 5L20 7"/></svg> : n}
      </div>
      <div style={{ fontSize: 12, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 1.2, color: active || done ? NAVY : MUTE, textTransform: 'uppercase' }}>{label}</div>
    </div>
  );
}

// ── PDF download (uses browser print-to-PDF, no external libs) ──────────────
function downloadReflectionsPdf(entries) {
  if (!entries || entries.length === 0) return;
  const esc = s => String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br/>');
  const dateStr = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });

  const sections = entries.map(e => {
    const d = new Date(e.ts).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    return `
    <article class="entry">
      <header>
        <span class="lens" style="color:${e.doorColor}">${esc(e.doorLabel)}</span>
        <span class="date">${d}</span>
      </header>
      <h2>${esc(e.promptTitle)}</h2>
      <div class="answer">${esc(e.answer)}</div>
      ${e.followUpAnswer ? `
        <div class="followup-block">
          <div class="followup-q">${esc(e.followUpQuestion)}</div>
          <div class="answer">${esc(e.followUpAnswer)}</div>
        </div>` : ''}
    </article>`;
  }).join('');

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>My Career Reflections</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Reddit+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  @page { size: A4; margin: 18mm 16mm; }
  * { box-sizing: border-box; }
  body { font-family: 'Reddit Sans', system-ui, sans-serif; color: #1f2937; margin: 0; padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .cover { background: #041739; color: #fff; padding: 44px 40px 36px; margin-bottom: 28px; position: relative; }
  .cover .gradient { height: 4px; background: linear-gradient(90deg, #65c12a 0%, #05b7ed 50%, #164375 100%); position: absolute; top: 0; left: 0; right: 0; }
  .cover .eyebrow { font-family: 'Montserrat'; font-weight: 700; font-size: 11px; letter-spacing: 2.5px; color: #05b7ed; text-transform: uppercase; margin-bottom: 14px; }
  .cover h1 { font-family: 'Montserrat'; font-weight: 800; font-size: 38px; line-height: 1.05; margin: 0 0 14px; letter-spacing: -1px; text-transform: uppercase; }
  .cover .meta { font-size: 13px; color: #cbd5e1; }
  .privacy { background: #f4f6fa; border-left: 3px solid #65c12a; padding: 14px 18px; margin: 0 40px 28px; font-size: 12.5px; line-height: 1.55; color: #3d5070; border-radius: 4px; }
  .privacy strong { color: #041739; font-family: 'Montserrat'; font-weight: 700; }
  .entries { padding: 0 40px 40px; }
  .entry { padding: 22px 0; border-top: 1px solid #e5e7eb; page-break-inside: avoid; }
  .entry:first-child { border-top: none; padding-top: 4px; }
  .entry header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; gap: 12px; }
  .entry .lens { font-family: 'Montserrat'; font-weight: 700; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; }
  .entry .date { font-size: 11.5px; color: #6b7280; }
  .entry h2 { font-family: 'Montserrat'; font-weight: 700; font-size: 17px; line-height: 1.35; color: #041739; margin: 0 0 12px; }
  .answer { font-size: 13.5px; line-height: 1.65; color: #1f2937; white-space: pre-wrap; }
  .followup-block { margin-top: 14px; padding: 14px 16px; background: #f4f6fa; border-radius: 6px; border-left: 3px solid #05b7ed; }
  .followup-q { font-family: 'Montserrat'; font-weight: 600; font-size: 13.5px; color: #041739; line-height: 1.4; margin-bottom: 8px; }
  footer.print-footer { padding: 18px 40px; border-top: 1px solid #e5e7eb; font-size: 11px; color: #6b7280; display: flex; justify-content: space-between; }
  footer.print-footer .brand { font-family: 'Montserrat'; font-weight: 700; color: #041739; letter-spacing: 0.5px; }
  @media print {
    .no-print { display: none; }
  }
  .print-bar { position: fixed; top: 16px; right: 16px; z-index: 100; display: flex; gap: 8px; }
  .print-bar button { background: #041739; color: #fff; border: none; font-family: 'Montserrat'; font-weight: 700; font-size: 13px; padding: 10px 16px; border-radius: 6px; cursor: pointer; letter-spacing: 0.3px; }
  .print-bar button.secondary { background: #fff; color: #3d5070; border: 1px solid #e5e7eb; }
</style>
</head>
<body>
  <div class="print-bar no-print">
    <button onclick="window.print()">Print / Save as PDF</button>
    <button class="secondary" onclick="window.close()">Close</button>
  </div>
  <div class="cover">
    <div class="gradient"></div>
    <div class="eyebrow">Holcim Career Reflections</div>
    <h1>My <span style="position:relative;display:inline-block"><span style="position:absolute;left:-8px;right:-8px;bottom:2px;height:9px;background:linear-gradient(90deg,#65c12a 0%,#05b7ed 50%,#164375 100%);z-index:0"></span><span style="position:relative;z-index:1">reflections</span></span></h1>
    <div class="meta">${entries.length} reflection${entries.length > 1 ? 's' : ''} · Exported ${dateStr}</div>
  </div>
  <div class="privacy"><strong>Private to you.</strong> This document was generated in your browser and never sent to Holcim. You chose to download it. Treat it as a personal note.</div>
  <div class="entries">${sections}</div>
  <footer class="print-footer">
    <span><span class="brand">HOLCIM</span> · Career Reflections · For your own thinking</span>
    <span>${dateStr}</span>
  </footer>
  <script>
    window.addEventListener('load', () => { setTimeout(() => window.print(), 600); });
  <\/script>
</body></html>`;

  const w = window.open('', '_blank');
  if (!w) {
    alert('Please allow pop-ups for this page so the PDF can open in a new tab.');
    return;
  }
  w.document.open();
  w.document.write(html);
  w.document.close();
}

          <div style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 18, color: NAVY, marginBottom: 8 }}>Nothing here yet.</div>
          <div style={{ fontSize: 14, color: SLATE }}>Pick a door and answer a question. It’ll appear here.</div>
        </div>
      ) : (
        <div style={{ display: 'grid', gap: 14 }}>
          {filtered.map(e => <EntryCard key={e.id} entry={e} onDelete={() => onDelete(e.id)} />)}
        </div>
      )}
    </div>
  );
}

function FilterChip({ active, label, onClick, color }) {
  return (
    <button onClick={onClick} style={{
      padding: '7px 14px', borderRadius: 999, fontFamily: 'Montserrat', fontWeight: 600, fontSize: 13,
      background: active ? color : '#fff',
      color: active ? '#fff' : SLATE,
      border: `1px solid ${active ? color : LINE}`,
      letterSpacing: 0.3,
    }}>{label}</button>
  );
}

function EntryCard({ entry, onDelete }) {
  const [open, setOpen] = useState(false);
  return (
    <div style={{ background: PAPER, border: `1px solid ${LINE}`, borderLeft: `4px solid ${entry.doorColor}`, borderRadius: 10, padding: 18 }}>
      <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 16, marginBottom: 8 }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6 }}>
            <span style={{ fontSize: 11, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 1.2, color: entry.doorColor, textTransform: 'uppercase' }}>{entry.doorLabel}</span>
            <span style={{ fontSize: 12, color: MUTE }}>{fmtRelative(entry.ts)}</span>
          </div>
          <div style={{ fontFamily: 'Montserrat', fontWeight: 600, fontSize: 16, color: NAVY, lineHeight: 1.35 }}>{entry.promptTitle}</div>
        </div>
        <button onClick={onDelete} title="Delete" style={{ color: MUTE, padding: 6, borderRadius: 4 }}
          onMouseEnter={e => { e.currentTarget.style.color = '#b91c1c'; }}
          onMouseLeave={e => { e.currentTarget.style.color = MUTE; }}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
        </button>
      </div>
      <div style={{ fontSize: 14, lineHeight: 1.55, color: INK, whiteSpace: 'pre-wrap', marginBottom: open ? 14 : 0, display: open ? 'block' : '-webkit-box', WebkitLineClamp: 3, WebkitBoxOrient: 'vertical', overflow: 'hidden' }}>{entry.answer}</div>
      {open && entry.followUpAnswer && (
        <div style={{ marginTop: 4, paddingTop: 14, borderTop: `1px dashed ${LINE}` }}>
          <div style={{ fontSize: 12, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 1, color: entry.doorColor, textTransform: 'uppercase', marginBottom: 6 }}>Follow-up</div>
          <div style={{ fontFamily: 'Montserrat', fontWeight: 600, fontSize: 14, color: NAVY, marginBottom: 8, lineHeight: 1.4 }}>{entry.followUpQuestion}</div>
          <div style={{ fontSize: 14, lineHeight: 1.55, color: INK, whiteSpace: 'pre-wrap' }}>{entry.followUpAnswer}</div>
        </div>
      )}
      <button onClick={() => setOpen(o => !o)} style={{ color: entry.doorColor, fontFamily: 'Montserrat', fontWeight: 700, fontSize: 12, letterSpacing: 0.5, padding: '4px 0', marginTop: 6 }}>
        {open ? '– Show less' : '+ Read full reflection'}
      </button>
    </div>
  );
}

function BackLink({ onBack, label }) {
  return (
    <button onClick={onBack} style={{ color: SLATE, fontSize: 13, fontFamily: 'Reddit Sans', fontWeight: 500, marginBottom: 18, display: 'flex', alignItems: 'center', gap: 6, padding: '6px 0' }}>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M15 18l-6-6 6-6"/></svg>
      {label}
    </button>
  );
}
