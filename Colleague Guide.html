// Holcim brand
const NAVY = '#041739';        // Holcim primary navy
const CYAN = '#05b7ed';        // Holcim cyan

const AMBER = '#b45309';
const GREEN = '#65c12a';       // Holcim Bright Green
const RED = '#b91c1c';
const LIGHT = '#f4f6fa';

const TIPS = [
  { icon: '✓', title: 'Be specific - not general', good: '"I led the quarterly planning session when my manager was on leave, aligning three functions on priorities."', bad: '"I’m a strong leader and people look to me."' },
  { icon: '✓', title: 'Name what you want - don’t hint at it', good: '"In the next 2–3 years I’d like to move into a role with broader regional scope, ideally with P&L responsibility."', bad: '"I’m open to whatever the business needs."' },
  { icon: '✓', title: 'Be realistic about mobility', good: '"I can realistically cover UK, Ireland and Benelux. I can’t relocate internationally for the next 2 years."', bad: '"I’m flexible on location."' },
  { icon: '✓', title: 'Own your development priorities', good: '"P&L exposure end to end - I’ve led operations but never owned the full P&L."', bad: '"Keep developing my leadership."' },
];

const FORM_SECTIONS = [
  { title: 'Basics and current role', body: 'Your name, employee ID, band, tenure, role, business unit and location - most of this is already pre-populated. Just check it’s right.' },
  { title: 'Mobility', body: 'Current working region, regional mobility, global mobility. Be realistic - not aspirational. If you can’t move internationally right now, say so. This isn’t a test of ambition.' },
  { title: 'Preferred future career direction', body: 'Where you’d like to head over the next few years - not just your immediate next role. Lateral, deeper or up are all valid answers.' },
  { title: 'Experience overview to date', body: 'Your career so far - companies, roles, team size, operational scale (volumes), commercial responsibility (EBIT/revenue). Gives context on the ground you’ve covered.' },
  { title: 'Standout achievements', body: '50 words max each. One specific achievement with a clear outcome beats five vague claims.' },
  { title: 'Key development priorities', body: 'Up to four priorities, 50 words each. The experiences or skills you want to build. Concrete beats abstract.' },
  { title: 'Career aspirations', body: 'Up to 200 words on what you actually want. Your words, your voice - not a career ladder template.' },
  { title: 'Qualifications & performance trajectory', body: 'Professional and academic qualifications, plus your last 3 performance ratings (pre-populated).' },
];

const EXAMPLE_GOOD = {
  label: 'Strong example',
  color: GREEN,
  items: [
    { q: 'Preferred future career direction', a: 'Over the next 3–5 years I’d like to broaden into a regional commercial role with P&L responsibility - moving from operations into a general management track. I want scope that stretches me on complexity, not just scale.' },
    { q: 'Standout achievement (50 words max)', a: 'Landed a mid-year price increase across the key accounts portfolio during a period of volatile energy and haulage costs. Held volumes with all top 10 customers, protected margin on repeat business, and rebuilt the commercial narrative with the sales team so the rationale held through tough negotiations. (46 words)' },
    { q: 'Key development priority (50 words max)', a: 'Commercial / P&L exposure end to end. I’ve led operations but never owned the full P&L. A rotation or stretch assignment with direct commercial accountability would close this gap. (30 words)' },
    { q: 'Career aspirations (200 words max)', a: 'I want to build a career that combines operations depth with commercial breadth. In the next 2–3 years, a role where I’m accountable for both how we run and how we sell - ideally in a different business unit to broaden exposure. Longer term, a general management role in the region. I’m not in a rush - doing the next role well matters more than moving fast.' },
  ],
};
const EXAMPLE_WEAK = {
  label: 'Weaker example',
  color: RED,
  items: [
    { q: 'Preferred future career direction', a: 'Open to whatever opportunities come up.' },
    { q: 'Standout achievement (50 words max)', a: 'Delivered a lot of great work across the year and built strong relationships with the team and wider stakeholders.' },
    { q: 'Key development priority (50 words max)', a: 'Keep developing my leadership and communication skills.' },
    { q: 'Career aspirations (200 words max)', a: 'I’m happy where I am and open to whatever the business needs. I’d like to keep growing.' },
  ],
};

const TIMELINE = [
  { when: 'May', what: 'Workshops, guides and the toolkit go live to help you and your manager prepare' },
  { when: '1–30 June', what: 'You share your career aspirations and development areas', you: true },
  { when: '1–24 July', what: 'Your manager reflects on your input and adds their view' },
  { when: 'End of July', what: 'You have an IDP and career conversation with your manager', you: true },
  { when: 'August', what: 'Your Head of People and manager calibrate development plans across the region' },
  { when: 'September', what: 'ExCo Talent Coordinating Committee reviews talent and development across Holcim' },
  { when: 'Ongoing', what: 'Your development actions stay live through one-to-ones, with ExCo holding the organisation accountable' },
];

const FAQS = [
  { q: 'Is this a performance review?', a: 'No. This is about your career - where you want to go, what would help you get there, and what support you’d like. Performance and pay are separate processes.', tag: 'Common' },
  { q: 'What if I want to stay in my role, or move sideways rather than up?', a: 'That’s more than okay. This process is for everyone in scope - not just people who want multi-layer promotions. Lateral moves, deepening in your current role, or wanting to stay put are all valid. The point is that we hear what you actually want.', tag: 'Common' },
  { q: 'Why are some of my peers not being asked?', a: 'Scope is defined by role, not by person - this cycle is focused on colleagues in P&L roles and in feeder roles that lead into P&L positions. Career growth into P&L is critical for this business, which is why we’re starting the conversations here. It will roll out to other roles over time. Being in scope reflects the role, not a judgement on anyone who isn’t.', tag: 'Scope' },
  { q: 'Will this affect my pay or my next promotion?', a: 'Not directly. This process is not used to make pay or promotion decisions - those run separately. What this informs is how we plan development, career moves and support over time.', tag: 'Common' },
  { q: 'What if I don’t trust this - we’ve had processes before that went nowhere.', a: 'Fair. The payback for you is a proper development conversation with your manager and a specific action that will actually happen. If that doesn’t land, the process has failed you - and you should say so. ExCo are tracking development commitments monthly so this produces a real outcome, not a form that disappears.', tag: 'Trust' },
  { q: 'What happens with what I share?', a: 'The Talent team holds your input centrally. Your line manager reads it to inform the development conversation with you. A small group - your Head of People and the Head of Talent - look across submissions regionally to help plan support and development. It is not shared more widely.', tag: 'Data' },
  { q: 'What if I disagree with something my manager says in our conversation?', a: 'Say so. The development conversation is meant to be a dialogue. If something doesn’t match your experience or what you’ve shared, raise it. Your Head of People is also available if the conversation doesn’t feel right.', tag: 'Common' },
];

// Signature Stroke - gradient bar at the baseline, overlapping the bottom of the letters
// slightly. Matches the "ONE HOLCIM EXPERIENCE" brand reference.
const Stroke = ({ children, fontSize = 28 }) => {
  const h = Math.round(fontSize * 0.22);
  const ext = Math.round(fontSize / 6);
  return (
    <span style={{ display: 'inline-block', position: 'relative' }}>
      <span style={{
        position: 'absolute', left: -ext, right: -ext,
        bottom: Math.round(fontSize * 0.04),
        height: h,
        background: 'linear-gradient(90deg, #65c12a 0%, #05b7ed 50%, #164375 100%)',
        zIndex: 0,
      }}></span>
      <span style={{ position: 'relative', zIndex: 1 }}>{children}</span>
    </span>
  );
};
