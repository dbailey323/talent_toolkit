<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For the People Team · Holcim</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; font-size: 16px; }
  body { font-family: 'DM Sans', sans-serif; background: #f4f5f7; color: #1a2038; min-height: 100vh; -webkit-font-smoothing: antialiased; }
  button { cursor: pointer; border: none; background: none; font-family: inherit; }
  a { color: inherit; text-decoration: none; }
  ::-webkit-scrollbar { width: 5px; height: 5px; } 
  ::-webkit-scrollbar-thumb { background: #c5cad8; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo, useEffect } = React;

// ── Brand Tokens ─────────────────────────────────────────────────────────────
const NAVY = '#041739';        // Holcim primary navy
const NAVY2 = '#164375';       // Deep accent navy
const CYAN = '#05b7ed';        // Holcim cyan
const LIME = '#65c12a';        // Holcim bright green
const SLATE = '#3d5070';       // Slate secondary Muted
const AMBER = '#b45309';       // Warning accent
const BRAND_GRADIENT = 'linear-gradient(90deg, #65c12a 0%, #05b7ed 50%, #164375 100%)';
const LIGHT = '#f4f5f7';       // Section gray panels
const LINE = '#e5e7eb';        // Standard divider gray

// ── Signature Stroke Component ───────────────────────────────────────────────
const Stroke = ({ children, fontSize = 28 }) => {
  const h = Math.round(fontSize * 0.22);
  const ext = Math.round(fontSize / 6);
  return (
    <span style={{ display: 'inline-block', position: 'relative' }}>
      <span style={{
        position: 'absolute', left: -ext, right: -ext,
        bottom: Math.round(fontSize * 0.04),
        height: h,
        background: BRAND_GRADIENT,
        zIndex: 0,
      }}></span>
      <span style={{ position: 'relative', zIndex: 1 }}>{children}</span>
    </span>
  );
};

// ── Audience Metadata ────────────────────────────────────────────────────────
const AUDIENCE = {
  colleague: { label: 'Colleague in scope', color: LIME },
  manager:   { label: 'Manager',            color: CYAN },
  hop:       { label: 'Head of People',     color: NAVY2 },
  talent:    { label: 'Talent team',        color: SLATE },
  exco:      { label: 'ExCo',               color: '#7c3aed' },
};

// ── The Seven Phases Core Cycle Data ─────────────────────────────────────────
const PHASES = [
  {
    id: 'brief',
    n: '01',
    label: 'Brief and prepare',
    when: 'Before forms go out',
    accent: LIME,
    promise: 'Get the why in place before the form arrives.',
    blurb: 'Most of the quality of the cycle is set here, before any form opens. Colleagues need to know why they are being asked. Managers need to know what good evidence looks like. Heads of People need to know the timeline and what they own.',
    tools: [
      {
        title: 'Colleague Guide',
        href: 'Colleague Guide.html',
        audience: ['colleague'],
        time: '8 min read',
        blurb: 'What the talent review is, what it is not, and how to use your self-assessment well. Share this with colleagues before the form lands in their inbox.',
      },
      {
        title: 'Manager Guide',
        href: 'Manager Guide.html',
        audience: ['manager'],
        time: '10 min read',
        blurb: 'Your full briefing as a line manager. The 4A framework, the difference between performance and potential, how to write evidence that holds up.',
      },
      {
        title: 'People Team Guide',
        href: 'Holcim People Team Guide.html',
        audience: ['hop', 'talent'],
        time: '15 min read',
        blurb: 'The playbook for Heads of People and the Talent team. Timeline, roles and accountabilities, how to lead in your area before forms even go out.',
      },
      {
        title: 'Talent Review Facilitation Guide',
        href: 'Talent Review Facilitation Guide.html',
        audience: ['hop', 'talent'],
        time: '20 min read',
        blurb: 'The four stages, the four roles, the calibration discipline, and the hard conversations behind them. Open this once at the start of the cycle.',
      },
    ],
  },
  {
    id: 'self',
    n: '02',
    label: 'Colleague self-assessment',
    when: 'Through July',
    accent: LIME,
    promise: "A 4A self-assessment, in the colleague's own words.",
    blurb: 'Every colleague in scope completes a self-assessment, including managers who are themselves in scope. Career Reflections is the upstream thinking tool that helps people arrive at the form with something to say.',
    tools: [
      {
        title: 'Career Reflections',
        href: 'Holcim Career Reflections.html',
        audience: ['colleague'],
        time: '6 min',
        blurb: 'Six minutes of honest thinking before the form opens. Three lenses, three doors, private to you. Download your reflections as a PDF to share with your manager in the conversation that comes next.',
      },
    ],
  },
  {
    id: 'share',
    n: '03',
    label: 'Colleague shares thinking with manager',
    when: 'Late July, before the manager assessment is written',
    accent: LIME,
    promise: "The colleague's input, before the manager writes the assessment.",
    blurb: 'The colleague brings their self-assessment to a structured conversation with their manager. The manager listens and asks, then writes the assessment with a better starting point than a blank form. Skipping this is the single biggest reason a manager assessment ends up reflecting the manager rather than the colleague.',
    tools: [
      {
        title: 'Career Reflections (downloaded PDF)',
        href: 'Holcim Career Reflections.html',
        audience: ['colleague'],
        time: 'Bring to the meeting',
        blurb: 'The colleague brings their reflections, in their own words. Use the Download as PDF option from the My Reflections screen, or email it to your manager before the meeting.',
      },
    ],
  },
  {
    id: 'assessment',
    n: '04',
    label: 'Manager assessment',
    when: 'Through July, closing 24 July',
    accent: CYAN,
    promise: 'Evidence-led 4A assessment.',
    blurb: "The manager writes a 4A assessment for each direct report in scope. What gets written here is what calibration will calibrate. A weak assessment cannot be rescued later. A strong one earns the room's time on cases that need it more.",
    tools: [
      {
        title: '4A Assessment',
        href: '4A Assessment.html',
        audience: ['manager'],
        time: '45 min per report',
        blurb: 'The form itself, with prompts and quality checks per dimension. Use this when you are ready to write the assessment.',
      },
      {
        title: 'Potential Workshop',
        href: 'Holcim Potential Workshop.html',
        audience: ['manager', 'hop'],
        time: '20 min',
        blurb: 'A facilitated walk through two case studies. Trains you to read evidence the way a calibration room will. The single most useful preparation before you write your own assessments.',
      },
      {
        title: 'Conversation Cards',
        href: 'Conversation Cards.html',
        audience: ['manager'],
        time: 'Reference',
        blurb: 'Use this before you submit. Questions to ask yourself against each of the 4As, and the patterns calibrators will look for. A short, printable reference.',
      },
    ],
  },
  {
    id: 'calibration',
    n: '05',
    label: 'Regional calibration',
    when: '1 to 31 August',
    accent: CYAN,
    promise: 'Individual assessments turned into a defensible view of the cohort.',
    blurb: "Heads of People convene regional sessions across North, Midlands and South. The room reads evidence side by side and ensures ratings are consistent. For half the cohort you will not know the colleague personally, so the form and the manager's words carry the weight, plus the question you ask about them.",
    tools: [
      {
        title: 'Evidence Challenge Trainer',
        href: 'Evidence Challenge Trainer.html',
        audience: ['hop', 'manager', 'talent'],
        time: '12 min',
        blurb: 'Pre-work for the regional session. Four short cases drawn from the patterns that come up most. Sharpens how you read the evidence and the question you ask about it.',
        starred: true,
      },
      {
        title: 'Conversation Cards',
        href: 'Conversation Cards.html',
        audience: ['hop', 'manager', 'talent'],
        time: 'Reference',
        blurb: 'Use this in the room. Questions to ask against each of the 4As, and the patterns that come up most often. Single double-sided A4 sheet when printed.',
        starred: true,
      },
      {
        title: 'Talent Review Facilitation Guide',
        href: 'Talent Review Facilitation Guide.html#calibration',
        audience: ['hop', 'talent'],
        time: 'Reference',
        blurb: 'The calibration discipline. What good looks like in the room, what to avoid, and the FAQs that come up every cycle.',
      },
    ],
  },
  {
    id: 'exco',
    n: '06',
    label: 'ExCo Talent Coordinating Committee',
    when: 'September',
    accent: NAVY2,
    promise: 'The Head of Talent leads the TCC.',
    blurb: 'The Head of Talent leads the TCC with Heads of People bringing their calibrated cohorts. The conversation moves from individual ratings to succession, mobility and development priorities. The session is only as good as the evidence behind it.',
    tools: [
      {
        title: 'People Team Guide',
        href: 'Holcim People Team Guide.html',
        audience: ['hop', 'talent', 'exco'],
        time: 'Reference',
        blurb: 'How the Head of Talent leads the TCC, and how Heads of People bring a cohort in. What ExCo will want to know, and what to keep out of the room.',
      },
    ],
  },
  {
    id: 'feedback',
    n: '07',
    label: 'Feedback and development conversation',
    when: 'September onwards',
    accent: NAVY2,
    promise: 'A development conversation, kept live in regular one-to-ones.',
    blurb: 'After calibration, every colleague in scope has a development conversation with their manager. Ratings and succession plans are not shared. Honest feedback and an agreed development action are. The colleague should leave clearer about what to work on, not labelled. It then stays live in regular one-to-ones, not parked until next cycle.',
    tools: [
      {
        title: 'Conversation Cards',
        href: 'Conversation Cards.html',
        audience: ['manager', 'hop'],
        time: 'Reference',
        blurb: 'Useful for the manager running the feedback conversation, and for the People Team supporting them. Printable single sheet.',
      },
      {
        title: 'Career Reflections',
        href: 'Holcim Career Reflections.html',
        audience: ['colleague'],
        time: '6 min',
        blurb: 'Use again before each quarterly check-in. The patterns surface the more you reflect, and re-reading what you wrote three months ago is usually more useful than starting fresh.',
      },
    ],
  },
];

// ── Shared Layout Structure Wrapper Components ────────────────────────────────
const Section = ({ id, children, bg }) => (
  <section id={id} style={{ background: bg || '#fff', borderRadius: 16, padding: '40px', marginBottom: 24, boxShadow: '0 1px 4px rgba(0,0,0,0.06)', scrollMarginTop: 80 }}>
    {children}
  </section>
);

const SectionTitle = ({ label, title, color }) => (
  <div style={{ marginBottom: 24 }}>
    <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', color: color || CYAN, marginBottom: 6 }}>{label}</div>
    <h2 style={{ fontFamily: 'Montserrat, sans-serif', fontSize: 26, fontWeight: 800, color: NAVY, letterSpacing: '-0.005em', lineHeight: 1.15, margin: 0, textTransform: 'uppercase' }}>{title}</h2>
  </div>
);

const Pill = ({ text, color }) => (
  <span style={{ display: 'inline-block', padding: '2px 10px', borderRadius: 99, fontSize: 11, fontWeight: 700, letterSpacing: '0.05em', textTransform: 'uppercase', background: `${color}18`, color, border: `1px solid ${color}44` }}>{text}</span>
);

// ── Application Base Controller ──────────────────────────────────────────────
function App() {
  const [activeSection, setActiveSection] = useState('brief');

  useEffect(() => {
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) setActiveSection(e.target.id); });
    }, { threshold: 0.15 });
    document.querySelectorAll('section[id]').forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);

  const onJump = (id) => {
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  };

  return (
    <div style={{ minHeight: '100vh', background: LIGHT }}>
      <NavBar active={activeSection} onJump={onJump} />
      
      {/* Hero Structure Container */}
      <div style={{ maxWidth: 1080, margin: '32px auto 0', padding: '0 24px' }}>
        <Hero onJump={onJump} />
        <PhaseStrip onJump={onJump} />
      </div>

      {/* Main Core Workflow Document Stream */}
      <div style={{ maxWidth: 960, margin: '0 auto', padding: '0 24px 80px' }}>
        {PHASES.map((p) => (
          <Section id={p.id} key={p.id}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', flexWrap: 'wrap', gap: 12, marginBottom: 16 }}>
              <SectionTitle label={`Phase ${p.n} · ${p.label}`} title={p.promise} color={p.accent} />
              <Pill text={p.when} color={p.accent} />
            </div>
            
            <p style={{ fontSize: 15, color: '#374151', lineHeight: 1.7, marginBottom: 28, fontWeight: 400 }}>{p.blurb}</p>
            
            <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: '0.07em', textTransform: 'uppercase', color: '#9ca3af', marginBottom: 14 }}>Available Toolkits &amp; Collateral</div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(360px, 1fr))', gap: 16 }}>
              {p.tools.map((t, idx) => <ToolCard key={idx} tool={t} accent={p.accent} />)}
            </div>
          </Section>
        ))}
        <Closer />
      </div>
      <Footer />
    </div>
  );
}

// ── Top Docking Navigation Bar Component ─────────────────────────────────────
function NavBar({ active, onJump }) {
  return (
    <nav style={{ position: 'sticky', top: 0, zIndex: 50, background: NAVY, display: 'flex', alignItems: 'center', padding: '0 32px', height: 52, gap: 4, boxShadow: '0 2px 12px rgba(0,0,0,0.2)', overflowX: 'auto' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginRight: 24, flexShrink: 0 }}>
        <div style={{ width: 16, height: 16, background: BRAND_GRADIENT, borderRadius: 3 }} />
        <span style={{ fontSize: 13, fontWeight: 600, color: 'rgba(255,255,255,0.6)', borderLeft: '1px solid rgba(255,255,255,0.18)', paddingLeft: 10, marginLeft: 4, fontFamily: 'Montserrat, sans-serif', letterSpacing: '0.05em', textTransform: 'uppercase' }}>People Toolkit</span>
      </div>
      {PHASES.map(p => (
        <button key={p.id} onClick={() => onJump(p.id)} style={{
          padding: '6px 14px', borderRadius: 6, fontSize: 12, fontWeight: 600,
          color: active === p.id ? '#fff' : 'rgba(255,255,255,0.5)',
          background: active === p.id ? 'rgba(255,255,255,0.12)' : 'transparent',
          textTransform: 'uppercase', letterSpacing: '0.03em', whiteSpace: 'nowrap', transition: 'all 0.15s',
        }}>{p.n} {p.id}</button>
      ))}
    </nav>
  );
}

// ── Hero Section Layout Block ────────────────────────────────────────────────
function Hero({ onJump }) {
  return (
    <div style={{ background: NAVY, color: '#fff', borderRadius: 20, padding: '48px 48px 44px', position: 'relative', overflow: 'hidden', marginBottom: 36 }}>
      <div aria-hidden style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 4, background: BRAND_GRADIENT }} />
      <div aria-hidden style={{ position: 'absolute', right: -120, bottom: -140, width: 360, height: 360, borderRadius: '50%', background: `radial-gradient(circle, ${CYAN}33, transparent 70%)` }} />
      <div style={{ position: 'relative', maxWidth: 760 }}>
        <div style={{ fontSize: 11, fontFamily: 'Montserrat, sans-serif', fontWeight: 700, letterSpacing: '0.16em', textTransform: 'uppercase', color: CYAN, marginBottom: 18 }}>The 2026 talent review cycle</div>
        <h1 style={{ fontFamily: 'Montserrat, sans-serif', fontSize: 48, fontWeight: 800, color: '#fff', letterSpacing: '-0.025em', margin: '0 0 22px', lineHeight: 1.06 }}>
          Facilitate the talent review in your <Stroke fontSize={48}>business area.</Stroke>
        </h1>
        <p style={{ fontSize: 16.5, color: 'rgba(255,255,255,0.85)', lineHeight: 1.6, maxWidth: 660, margin: '0 0 24px' }}>
          Every tool, organised by when in the cycle you reach for it. Seven phases, each with its own work and its own operational reference points.
        </p>
        <button onClick={() => onJump('brief')} style={{ padding: '10px 20px', borderRadius: 8, background: CYAN, color: NAVY, fontFamily: 'DM Sans, sans-serif', fontWeight: 700, fontSize: 14, display: 'inline-flex', alignItems: 'center', gap: 8, transition: 'background 0.15s' }}>
          Start execution flow <span>→</span>
        </button>
      </div>
    </div>
  );
}

// ── Linear Process Navigation Node Strip ──────────────────────────────────────
function PhaseStrip({ onJump }) {
  return (
    <div style={{ marginBottom: 40, background: '#fff', padding: '24px', borderRadius: 16, boxShadow: '0 1px 4px rgba(0,0,0,0.06)' }}>
      <div style={{ fontSize: 11, fontFamily: 'Montserrat, sans-serif', fontWeight: 700, letterSpacing: '0.1em', color: NAVY, textTransform: 'uppercase', marginBottom: 20 }}>The seven phases of the cycle</div>
      <div style={{ position: 'relative' }}>
        <div aria-hidden style={{ position: 'absolute', left: 32, right: 32, top: 22, height: 2, background: BRAND_GRADIENT, opacity: 0.25 }} />
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 12, position: 'relative' }}>
          {PHASES.map(p => (
            <button key={p.id} onClick={() => onJump(p.id)} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', textAlign: 'center' }}>
              <div style={{
                width: 44, height: 44, borderRadius: '50%', background: '#fff',
                border: `3px solid ${p.accent}`,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontFamily: 'Montserrat, sans-serif', fontWeight: 800, fontSize: 13, color: NAVY,
                boxShadow: '0 2px 6px rgba(4,23,57,0.08)',
                marginBottom: 10, transition: 'transform .15s',
              }}
              onMouseEnter={(e) => e.currentTarget.style.transform = 'translateY(-2px)'}
              onMouseLeave={(e) => e.currentTarget.style.transform = 'translateY(0)'}
              >
                {p.n}
              </div>
              <div style={{ fontFamily: 'DM Sans, sans-serif', fontWeight: 700, fontSize: 13, color: NAVY, lineHeight: 1.2, marginBottom: 2 }}>{p.label}</div>
              <div style={{ fontSize: 11, color: '#6b7280' }}>{p.when.split(',')[0]}</div>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── Asset Attachment Card Display Element ─────────────────────────────────────
function ToolCard({ tool, accent }) {
  const [hover, setHover] = useState(false);
  return (
    <a
      href={tool.href}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        display: 'flex', flexDirection: 'column',
        background: '#fff', border: `1px solid ${hover ? accent : LINE}`,
        borderLeft: `4px solid ${accent}`,
        borderRadius: 10, padding: '20px',
        cursor: 'pointer', textDecoration: 'none',
        transition: 'all 0.15s ease',
        transform: hover ? 'translateY(-2px)' : 'translateY(0)',
        boxShadow: hover ? '0 6px 16px rgba(4,23,57,0.08)' : 'none',
        position: 'relative', overflow: 'hidden',
      }}
    >
      {tool.starred && (
        <div style={{ position: 'absolute', top: 16, right: 16, fontSize: 10, fontFamily: 'Montserrat, sans-serif', fontWeight: 700, letterSpacing: '0.05em', color: AMBER, background: '#fef3c7', border: `1px solid #fcd34d`, padding: '2px 6px', borderRadius: 4, textTransform: 'uppercase' }}>
          Pre-work
        </div>
      )}
      <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap', marginBottom: 12, paddingRight: tool.starred ? 64 : 0 }}>
        {tool.audience.map(a => {
          const meta = AUDIENCE[a] || { label: a, color: SLATE };
          return (
            <span key={a} style={{
              fontSize: 10, fontFamily: 'Montserrat, sans-serif', fontWeight: 700, letterSpacing: '0.03em',
              color: meta.color, background: '#fff', border: `1px solid ${meta.color}55`,
              padding: '2px 8px', borderRadius: 999, textTransform: 'uppercase',
            }}>{meta.label}</span>
          );
        })}
        <span style={{ marginLeft: 'auto', fontSize: 12, color: '#6b7280', fontWeight: 500 }}>{tool.time}</span>
      </div>
      <h3 style={{ fontFamily: 'DM Sans, sans-serif', fontWeight: 700, fontSize: 16, color: NAVY, margin: '0 0 6px', letterSpacing: '-0.01em' }}>{tool.title}</h3>
      <p style={{ fontSize: 13.5, lineHeight: 1.6, color: '#4b5563', margin: '0 0 16px', flex: 1 }}>{tool.blurb}</p>
      <div style={{ display: 'flex', alignItems: 'center', gap: 4, color: accent, fontFamily: 'Montserrat, sans-serif', fontWeight: 700, fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.05em' }}>
        <span>Access Asset</span>
        <span style={{ transition: 'transform .15s ease', transform: hover ? 'translateX(3px)' : 'translateX(0)' }}>→</span>
      </div>
    </a>
  );
}

// ── Closer Callout Container Section ──────────────────────────────────────────
function Closer() {
  return (
    <div style={{ background: NAVY, color: '#fff', borderRadius: 16, padding: '40px', position: 'relative', overflow: 'hidden' }}>
      <div aria-hidden style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 3, background: BRAND_GRADIENT }} />
      <div style={{ position: 'relative', maxWidth: 720 }}>
        <div style={{ fontSize: 11, fontFamily: 'Montserrat, sans-serif', fontWeight: 700, letterSpacing: '0.1em', color: CYAN, textTransform: 'uppercase', marginBottom: 10 }}>The point of the cycle</div>
        <h3 style={{ fontFamily: 'Montserrat, sans-serif', fontWeight: 700, fontSize: 22, margin: '0 0 12px', letterSpacing: '-0.01em', textTransform: 'uppercase' }}>Better evidence, sharper questions, real development.</h3>
        <p style={{ fontSize: 14.5, lineHeight: 1.7, color: 'rgba(255,255,255,0.82)', margin: 0 }}>
          Not the right number on a form. Every colleague in scope having one honest career conversation, with a definitive, trackable development action behind it.
        </p>
      </div>
    </div>
  );
}

// ── Footer System Block ──────────────────────────────────────────────────────
function Footer() {
  return (
    <footer style={{ background: NAVY, color: 'rgba(255,255,255,0.5)', padding: '32px 40px', borderTop: `1px solid rgba(255,255,255,0.1)` }}>
      <div style={{ maxWidth: 1000, margin: '0 auto', display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: 16, fontSize: 12, fontFamily: 'DM Sans, sans-serif' }}>
        <span>For the People Team · Holcim UK · The talent review toolkit, organised by phase</span>
        <span style={{ textTransform: 'uppercase', fontFamily: 'Montserrat, sans-serif', fontWeight: 700, letterSpacing: '0.05em' }}>People Review 2026</span>
      </div>
    </footer>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
