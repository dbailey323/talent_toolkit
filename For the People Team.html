<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For the People Team · Holcim</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght=400;500;600;700;800&family=Reddit+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Reddit Sans', system-ui, sans-serif; background: #f4f6fa; color: #1f2937; -webkit-font-smoothing: antialiased; }
  html { scroll-behavior: smooth; }
  button { cursor: pointer; border: none; background: none; font-family: inherit; }
  a { color: inherit; text-decoration: none; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .anim-in { animation: fadeIn .3s ease-out both; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>

<script type="text/babel">
const { useState, useMemo, useEffect } = React;

// ── Brand ────────────────────────────────────────────────────────────────────
const NAVY = '#041739';
const NAVY2 = '#164375';
const CYAN = '#05b7ed';
const LIME = '#65c12a';
const SLATE = '#3d5070';
const AMBER = '#d97706';
const BRAND_GRADIENT = 'linear-gradient(90deg, #65c12a 0%, #05b7ed 50%, #164375 100%)';
const PAPER = '#ffffff';
const BG = '#f4f6fa';
const MUTE = '#6b7280';
const LINE = '#e5e7eb';
const SOFT = '#f1f5f9';

// ── Audience meta ───────────────────────────────────────────────────────────
const AUDIENCE = {
  colleague: { label: 'Colleague in scope', color: LIME },
  manager:   { label: 'Manager',            color: CYAN },
  hop:       { label: 'Head of People',     color: NAVY2 },
  talent:    { label: 'Talent team',        color: SLATE },
  exco:      { label: 'ExCo',               color: '#7c3aed' },
};

// ── The phases of the cycle ─────────────────────────────────────────────────
const PHASES = [
  {
    id: 'brief',
    n: '01',
    label: 'Brief and prepare',
    when: 'Before forms go out',
    accent: LIME,
    promise: 'Get the why in place before the form arrives.',
    blurb: 'Most of the quality of the cycle is set here, before any form opens. Colleagues need to know why they are being asked. Managers need to know what good evidence looks like. Heads of People need to know the timeline and what they own.',
    tools: [
      {
        title: 'Colleague Guide',
        href: 'Colleague Guide.html',
        audience: ['colleague'],
        time: '8 min read',
        blurb: 'What the talent review is, what it is not, and how to use your self-assessment well. Share this with colleagues before the form lands in their inbox.',
      },
      {
        title: 'Manager Guide',
        href: 'Manager Guide.html',
        audience: ['manager'],
        time: '10 min read',
        blurb: 'Your full briefing as a line manager. The 4A framework, the difference between performance and potential, how to write evidence that holds up.',
      },
      {
        title: 'People Team Guide',
        href: 'Holcim People Team Guide.html',
        audience: ['hop', 'talent'],
        time: '15 min read',
        blurb: 'The playbook for Heads of People and the Talent team. Timeline, roles and accountabilities, how to lead in your area before forms even go out.',
      },
      {
        title: 'Talent Review Facilitation Guide',
        href: 'Talent Review Facilitation Guide.html',
        audience: ['hop', 'talent'],
        time: '20 min read',
        blurb: 'The four stages, the four roles, the calibration discipline, and the hard conversations behind them. Open this once at the start of the cycle.',
      },
    ],
  },
  {
    id: 'self',
    n: '02',
    label: 'Colleague self-assessment',
    when: 'Through July',
    accent: LIME,
    promise: "A 4A self-assessment, in the colleague's own words.",
    blurb: 'Every colleague in scope completes a self-assessment, including managers who are themselves in scope. Career Reflections is the upstream thinking tool that helps people arrive at the form with something to say.',
    tools: [
      {
        title: 'Career Reflections',
        href: 'Holcim Career Reflections.html',
        audience: ['colleague'],
        time: '6 min',
        blurb: 'Six minutes of honest thinking before the form opens. Three lenses, three doors, private to you. Download your reflections as a PDF to share with your manager in the conversation that comes next.',
      },
    ],
  },
  {
    id: 'share',
    n: '03',
    label: 'Colleague shares thinking with manager',
    when: 'Late July, before the manager assessment is written',
    accent: LIME,
    promise: "The colleague's input, before the manager writes the assessment.",
    blurb: 'The colleague brings their self-assessment to a structured conversation with their manager. The manager listens and asks, then writes the assessment with a better starting point than a blank form. Skipping this is the single biggest reason a manager assessment ends up reflecting the manager rather than the colleague.',
    tools: [
      {
        title: 'Career Reflections (downloaded PDF)',
        href: 'Holcim Career Reflections.html',
        audience: ['colleague'],
        time: 'Bring to the meeting',
        blurb: 'The colleague brings their reflections, in their own words. Use the Download as PDF option from the My Reflections screen, or email it to your manager before the meeting.',
      },
    ],
  },
  {
    id: 'assessment',
    n: '04',
    label: 'Manager assessment',
    when: 'Through July, closing 24 July',
    accent: CYAN,
    promise: 'Evidence-led 4A assessment.',
    blurb: "The manager writes a 4A assessment for each direct report in scope. What gets written here is what calibration will calibrate. A weak assessment cannot be rescued later. A strong one earns the room's time on cases that need it more.",
    tools: [
      {
        title: '4A Assessment',
        href: '4A Assessment.html',
        audience: ['manager'],
        time: '45 min per report',
        blurb: 'The form itself, with prompts and quality checks per dimension. Use this when you are ready to write the assessment.',
      },
      {
        title: 'Potential Workshop',
        href: 'Holcim Potential Workshop.html',
        audience: ['manager', 'hop'],
        time: '20 min',
        blurb: 'A facilitated walk through two case studies. Trains you to read evidence the way a calibration room will. The single most useful preparation before you write your own assessments.',
      },
      {
        title: 'Conversation Cards',
        href: 'Conversation Cards.html',
        audience: ['manager'],
        time: 'Reference',
        blurb: 'Use this before you submit. Questions to ask yourself against each of the 4As, and the patterns calibrators will look for. A short, printable reference.',
      },
    ],
  },
  {
    id: 'calibration',
    n: '05',
    label: 'Regional calibration',
    when: '1 to 31 August',
    accent: CYAN,
    promise: 'Individual assessments turned into a defensible view of the cohort.',
    blurb: "Heads of People convene regional sessions across North, Midlands and South. The room reads evidence side by side and ensures ratings are consistent. For half the cohort you will not know the colleague personally, so the form and the manager's words carry the weight, plus the question you ask about them.",
    tools: [
      {
        title: 'Evidence Challenge Trainer',
        href: 'Evidence Challenge Trainer.html',
        audience: ['hop', 'manager', 'talent'],
        time: '12 min',
        blurb: 'Pre-work for the regional session. Four short cases drawn from the patterns that come up most. Sharpens how you read the evidence and the question you ask about it.',
        starred: true,
      },
      {
        title: 'Conversation Cards',
        href: 'Conversation Cards.html',
        audience: ['hop', 'manager', 'talent'],
        time: 'Reference',
        blurb: 'Use this in the room. Questions to ask against each of the 4As, and the patterns that come up most often. Single double-sided A4 sheet when printed.',
        starred: true,
      },
      {
        title: 'Talent Review Facilitation Guide',
        href: 'Talent Review Facilitation Guide.html#calibration',
        audience: ['hop', 'talent'],
        time: 'Reference',
        blurb: 'The calibration discipline. What good looks like in the room, what to avoid, and the FAQs that come up every cycle.',
      },
    ],
  },
  {
    id: 'exco',
    n: '06',
    label: 'ExCo Talent Coordinating Committee',
    when: 'September',
    accent: NAVY2,
    promise: 'The Head of Talent leads the TCC.',
    blurb: 'The Head of Talent leads the TCC with Heads of People bringing their calibrated cohorts. The conversation moves from individual ratings to succession, mobility and development priorities. The session is only as good as the evidence behind it.',
    tools: [
      {
        title: 'People Team Guide',
        href: 'Holcim People Team Guide.html',
        audience: ['hop', 'talent', 'exco'],
        time: 'Reference',
        blurb: 'How the Head of Talent leads the TCC, and how Heads of People bring a cohort in. What ExCo will want to know, and what to keep out of the room.',
      },
    ],
  },
  {
    id: 'feedback',
    n: '07',
    label: 'Feedback and development conversation',
    when: 'September onwards',
    accent: NAVY2,
    promise: 'A development conversation, kept live in regular one-to-ones.',
    blurb: 'After calibration, every colleague in scope has a development conversation with their manager. Ratings and succession plans are not shared. Honest feedback and an agreed development action are. The colleague should leave clearer about what to work on, not labelled. It then stays live in regular one-to-ones, not parked until next cycle.',
    tools: [
      {
        title: 'Conversation Cards',
        href: 'Conversation Cards.html',
        audience: ['manager', 'hop'],
        time: 'Reference',
        blurb: 'Useful for the manager running the feedback conversation, and for the People Team supporting them. Printable single sheet.',
      },
      {
        title: 'Career Reflections',
        href: 'Holcim Career Reflections.html',
        audience: ['colleague'],
        time: '6 min',
        blurb: 'Use again before each quarterly check-in. The patterns surface the more you reflect, and re-reading what you wrote three months ago is usually more useful than starting fresh.',
      },
    ],
  },
];

// ── App ──────────────────────────────────────────────────────────────────────
function App() {
  const onJump = (id) => {
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  };
  return (
    <div style={{ minHeight: '100vh', background: BG }}>
      <Header />
      <div style={{ maxWidth: 1240, margin: '0 auto', padding: '32px 24px 80px' }}>
        <Hero onJump={onJump} />
        <PhaseStrip onJump={onJump} />
        {PHASES.map((p, i) => <PhaseSection key={p.id} phase={p} idx={i} />)}
        <Closer />
      </div>
      <Footer />
    </div>
  );
}

// ── Header ───────────────────────────────────────────────────────────────────
function Header() {
  return (
    <header style={{ background: NAVY, color: '#fff', position: 'sticky', top: 0, zIndex: 10 }}>
      <div style={{ height: 3, background: BRAND_GRADIENT }} />
      <div style={{ maxWidth: 1240, margin: '0 auto', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 16, padding: '16px 24px' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
          <div style={{ width: 24, height: 24, background: BRAND_GRADIENT, borderRadius: 4 }} />
          <div>
            <div style={{ fontSize: 10, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 1.8, color: CYAN, textTransform: 'uppercase' }}>For Heads of People, Talent and ExCo</div>
            <div style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 16, lineHeight: 1.1, marginTop: 2 }}>For the People Team</div>
          </div>
        </div>
      </div>
    </header>
  );
}

function Footer() {
  return (
    <footer style={{ borderTop: `1px solid ${LINE}`, padding: '24px 32px', textAlign: 'center', fontSize: 12, color: MUTE, fontFamily: 'Reddit Sans' }}>
      For the People Team · Holcim UK · The talent review toolkit, organised by phase
    </footer>
  );
}

// ── Hero ─────────────────────────────────────────────────────────────────────
function Hero({ onJump }) {
  return (
    <div style={{ background: NAVY, color: '#fff', borderRadius: 20, padding: '56px 56px 48px', position: 'relative', overflow: 'hidden', marginBottom: 36 }}>
      <div aria-hidden style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 4, background: BRAND_GRADIENT }} />
      <div aria-hidden style={{ position: 'absolute', right: -120, bottom: -140, width: 380, height: 380, borderRadius: '50%', background: `radial-gradient(circle, ${CYAN}33, transparent 70%)` }} />
      <div aria-hidden style={{ position: 'absolute', right: 200, top: -80, width: 240, height: 240, borderRadius: '50%', background: `radial-gradient(circle, ${LIME}22, transparent 70%)` }} />
      <div style={{ position: 'relative', maxWidth: 780 }}>
        <div style={{ fontSize: 11, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 2, color: CYAN, textTransform: 'uppercase', marginBottom: 18 }}>The 2026 talent review cycle</div>
        <h1 style={{ fontFamily: 'Montserrat', fontWeight: 800, fontSize: 54, lineHeight: 1.04, margin: '0 0 22px', color: '#fff', letterSpacing: -1.4 }}>
          Facilitate the talent review in your <span style={{ color: CYAN }}>business area.</span>
        </h1>
        <p style={{ fontSize: 17, lineHeight: 1.6, color: 'rgba(255,255,255,0.85)', maxWidth: 680, margin: '0 0 28px' }}>
          Every tool, organised by when in the cycle you reach for it. Seven phases, each with its own work and its own reference.
        </p>
        <button onClick={() => onJump('brief')} style={{ padding: '14px 22px', borderRadius: 10, background: '#fff', color: NAVY, fontFamily: 'Montserrat', fontWeight: 700, fontSize: 14.5, letterSpacing: 0.3, display: 'inline-flex', alignItems: 'center', gap: 10 }}>
          Start at the beginning <span>→</span>
        </button>
      </div>
    </div>
  );
}

// ── Phase strip ──────────────────────────────────────────────────────────────
function PhaseStrip({ onJump }) {
  return (
    <div style={{ marginBottom: 48 }}>
      <div style={{ fontSize: 11, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 1.8, color: NAVY, textTransform: 'uppercase', marginBottom: 14 }}>The seven phases of the cycle</div>
      <div style={{ position: 'relative', padding: '12px 0 4px' }}>
        <div aria-hidden style={{ position: 'absolute', left: 32, right: 32, top: 44, height: 2, background: BRAND_GRADIENT, opacity: 0.35, borderRadius: 999 }} />
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 8, position: 'relative' }}>
          {PHASES.map(p => (
            <button key={p.id} onClick={() => onJump(p.id)} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', textAlign: 'center', padding: '0 4px' }}>
              <div style={{
                width: 50, height: 50, borderRadius: '50%', background: '#fff',
                border: `3px solid ${p.accent}`,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontFamily: 'Montserrat', fontWeight: 800, fontSize: 14, color: NAVY,
                boxShadow: '0 4px 12px rgba(4,23,57,0.06)',
                marginBottom: 10, transition: 'transform .15s',
              }}
              onMouseEnter={(e) => e.currentTarget.style.transform = 'translateY(-2px)'}
              onMouseLeave={(e) => e.currentTarget.style.transform = 'translateY(0)'}
              >
                {p.n}
              </div>
              <div style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 11.5, color: NAVY, letterSpacing: -0.1, lineHeight: 1.3, marginBottom: 3, maxWidth: 130 }}>{p.label}</div>
              <div style={{ fontSize: 10.5, color: MUTE, fontFamily: 'Reddit Sans', lineHeight: 1.3 }}>{p.when}</div>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── Phase section ────────────────────────────────────────────────────────────
function PhaseSection({ phase, idx }) {
  return (
    <section id={phase.id} style={{ marginBottom: 64, scrollMarginTop: 96 }}>
      <div style={{ display: 'flex', alignItems: 'flex-start', gap: 22, marginBottom: 28 }}>
        <div style={{
          flexShrink: 0,
          width: 76, height: 76, borderRadius: '50%',
          background: '#fff', border: `3px solid ${phase.accent}`,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontFamily: 'Montserrat', fontWeight: 800, fontSize: 24, color: NAVY,
          boxShadow: '0 6px 18px rgba(4,23,57,0.07)',
        }}>
          {phase.n}
        </div>
        <div style={{ flex: 1, paddingTop: 6 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 6, flexWrap: 'wrap' }}>
            <div style={{ fontSize: 11, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 1.8, color: phase.accent, textTransform: 'uppercase' }}>Phase {phase.n} · {phase.label}</div>
            <div style={{ fontSize: 11.5, color: MUTE, fontFamily: 'Reddit Sans', padding: '3px 9px', borderRadius: 999, background: SOFT, fontWeight: 500 }}>{phase.when}</div>
          </div>
          <h2 style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 26, color: NAVY, margin: '0 0 10px', letterSpacing: -0.4 }}>{phase.promise}</h2>
          <p style={{ fontSize: 15, color: SLATE, lineHeight: 1.6, margin: 0, maxWidth: 760 }}>{phase.blurb}</p>
        </div>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(360px, 1fr))', gap: 16, marginLeft: 98 }}>
        {phase.tools.map((t, i) => <ToolCard key={i} tool={t} accent={phase.accent} />)}
      </div>
    </section>
  );
}

// ── Tool card ────────────────────────────────────────────────────────────────
function ToolCard({ tool, accent }) {
  const [hover, setHover] = useState(false);
  return (
    <a
      href={tool.href}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        display: 'flex', flexDirection: 'column',
        background: '#fff', border: `1px solid ${hover ? accent : LINE}`,
        borderLeft: `3px solid ${accent}`,
        borderRadius: 12, padding: '22px 22px 20px',
        cursor: 'pointer', textDecoration: 'none',
        transition: 'transform .15s ease, box-shadow .15s ease, border-color .15s ease',
        transform: hover ? 'translateY(-2px)' : 'translateY(0)',
        boxShadow: hover ? '0 12px 28px rgba(4,23,57,0.10)' : '0 1px 0 rgba(4,23,57,0.02)',
        position: 'relative', overflow: 'hidden',
      }}
    >
      {tool.starred && (
        <div style={{ position: 'absolute', top: 14, right: 14, fontSize: 9.5, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 0.8, color: AMBER, background: '#fef8e8', border: `1px solid #fcd34d`, padding: '3px 7px', borderRadius: 4, textTransform: 'uppercase' }}>
          Pre-work
        </div>
      )}
      <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap', marginBottom: 10 }}>
        {tool.audience.map(a => {
          const meta = AUDIENCE[a];
          return (
            <span key={a} style={{
              fontSize: 10.5, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 0.5,
              color: meta.color, background: '#fff', border: `1px solid ${meta.color}`,
              padding: '3px 8px', borderRadius: 999, textTransform: 'uppercase',
            }}>{meta.label}</span>
          );
        })}
        <span style={{ marginLeft: 'auto', fontSize: 11.5, color: MUTE, fontFamily: 'Montserrat', fontWeight: 600 }}>{tool.time}</span>
      </div>
      <h3 style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 18, color: NAVY, margin: '0 0 8px', letterSpacing: -0.3 }}>{tool.title}</h3>
      <p style={{ fontSize: 14, lineHeight: 1.55, color: SLATE, margin: '0 0 16px', flex: 1 }}>{tool.blurb}</p>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, color: NAVY, fontFamily: 'Montserrat', fontWeight: 700, fontSize: 13 }}>
        <span>Open</span>
        <span style={{ transition: 'transform .15s ease', transform: hover ? 'translateX(4px)' : 'translateX(0)' }}>→</span>
      </div>
    </a>
  );
}

// ── Closer ───────────────────────────────────────────────────────────────────
function Closer() {
  return (
    <div style={{ background: NAVY, color: '#fff', borderRadius: 16, padding: '36px 40px', marginTop: 24, position: 'relative', overflow: 'hidden' }}>
      <div aria-hidden style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 3, background: BRAND_GRADIENT }} />
      <div style={{ display: 'grid', gridTemplateColumns: '1fr auto', gap: 32, alignItems: 'center' }}>
        <div>
          <div style={{ fontSize: 11, fontFamily: 'Montserrat', fontWeight: 700, letterSpacing: 2, color: CYAN, textTransform: 'uppercase', marginBottom: 10 }}>The point of the cycle</div>
          <h3 style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 24, margin: '0 0 10px', letterSpacing: -0.3 }}>Better evidence, sharper questions, real development.</h3>
          <p style={{ fontSize: 15, lineHeight: 1.65, color: 'rgba(255,255,255,0.82)', margin: 0, maxWidth: 720 }}>
            Not the right number on a form. Every colleague in scope having one honest career conversation, with a development action behind it.
          </p>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
