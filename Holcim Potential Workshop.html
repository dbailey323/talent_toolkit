window.WORKSHOP_DATA = {
  cases: [
    {
      id: 'sarah',
      name: 'Sarah Okonkwo',
      role: 'Operations Manager',
      location: 'UK - West Midlands Plant',
      tenure: '8 years in current role',
      performance: '4.8 / 5 - consistently exceeds targets',
      bio: 'Sarah runs one of the most efficient plants in the region. Her KPIs are exemplary, her team has the lowest attrition in the business, and she is universally well-liked. She is frequently cited in leadership meetings as an example of excellence.',
      photo: null,
      dimensions: {
        ability: {
          question: 'Does Sarah demonstrate the capability, judgement and scale of thinking required to operate at the next leadership level?',
          evidence: [
            { text: 'Delivered 98% on-time production for three consecutive years - the best record in the region.', tag: 'Performance', warn: 'This tells us she executes brilliantly in her current role. Does it tell us she can operate at the next level of complexity?' },

            { text: 'Team members describe her as "the best manager they\'ve ever had" - her 360 feedback is consistently top-rated.', tag: 'Performance', warn: 'A strong current-role indicator. What does it tell us about the level above?' },
            { text: 'During a restructuring that affected her site, Sarah waited for central direction rather than proposing an independent plan.', tag: 'Potential signal', warn: null },
          ],
          suggestedRating: 'Medium',
          nudge: {
            High: 'Consider whether this is a performance halo. The evidence shows exceptional delivery in her current role - but does it demonstrate the judgement and scale of thinking needed one level up? These are different things.',
            Medium: 'Good calibration. There is solid evidence of current-role capability, but limited demonstration of next-level thinking or independent judgement at scale.',
            Low: 'Be careful not to underrate. Sarah has real strengths - the question is whether evidence of next-level capability exists, not whether she is capable today.',
          }
        },
        aspiration: {
          question: 'Does Sarah actively seek broader leadership responsibility? Is her ambition evidenced - or assumed?',
          evidence: [
            { text: 'In her last performance review, Sarah said she "loves what she does and wants to keep doing it well."', tag: 'Potential signal', warn: null },
            { text: 'She has turned down two development secondments in the past 18 months, citing the importance of operational continuity.', tag: 'Potential signal', warn: null },
            { text: 'Sarah always volunteers first for site improvement projects and goes beyond her remit to make them successful.', tag: 'Performance', warn: 'This shows commitment to her current role - not necessarily ambition for the next one.' },
            { text: 'No formal career conversation has been recorded in the last 12 months.', tag: 'Process gap', warn: null },
          ],
          suggestedRating: 'Low',
          nudge: {
            High: 'What evidence supports high aspiration? She has turned down two development opportunities and expressed satisfaction with her current role. Are you projecting aspiration onto her because she performs well?',
            Medium: 'There is limited evidence of aspiration for the next level. Declining two secondments and stating she wants to stay in her current role are meaningful signals. Be careful not to assume aspiration from performance.',

        agility: {

          evidence: [
            { text: 'Introduced a new shift scheduling system that reduced overtime costs by 14% across her site.', tag: 'Performance', warn: 'A strong initiative - but within a highly familiar context.' },

            Medium: 'Being excellent at optimising within a known environment is different from demonstrating agility in unfamiliar, complex or changing situations. Review the evidence again.',
            Low: 'A fair read. Limited cross-context exposure, resistance to challenge, and slow adaptation to change are meaningful signals when assessing potential at the next level.',

        },
        alignment: {
          question: 'Does Sarah consistently demonstrate the values and behaviours needed - and is she aligned to where the organisation is going?',
          evidence: [
            { text: 'Consistently scores 5/5 on values behaviours in her annual review for six consecutive years.', tag: 'Performance', warn: 'Strong current alignment signal. But alignment to future direction is a different question.' },

            { text: 'Her team has the highest engagement scores in the business for four years running.', tag: 'Performance', warn: null },

      overallCoach: 'Sarah is an outstanding performer - and that is precisely what makes this assessment difficult. The evidence consistently shows excellence in her current role, but limited indicators of potential beyond it. This is the most common error in talent reviews: mistaking performance for potential. A potential rating is not a reward for delivery. Sarah may be exactly where she adds the most value to the organisation.',

            { text: 'Has asked his manager three times in the past year for a stretch project or a broader commercial remit.', tag: 'Potential signal', warn: null },
            { text: 'Sometimes appears disengaged in team meetings - contributes less than his peers in group discussions.', tag: 'Behavioural note', warn: 'Visible engagement in meetings is not the same as aspiration. Check the direct evidence.' },
          ],
          suggestedRating: 'High',
          nudge: {
            High: 'The evidence is unusually clear. Documented career goals, self-funded development, and proactive requests for stretch. This is what evidenced aspiration looks like - as opposed to assumed aspiration.',

            Low: 'Review the evidence carefully. He has explicitly stated his ambition, funded his own development, and requested stretch assignments. It is difficult to build a case for Low aspiration here.',

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const NAVY = '#041739';        // Holcim primary navy
const CYAN = '#05b7ed';        // Holcim cyan
const LIME = '#65c12a';        // Holcim bright green
const TEAL = '#05b7ed';        // alias
const TEAL2 = '#65c12a';       // alias
const SLATE = '#3d5070';
const GREEN = '#65c12a';
const AMBER = '#d97706';
const RED = '#dc2626';
const WHITE = '#ffffff';

const DIMS = ['ability','aspiration','agility','alignment'];
const DIM_COLORS = { ability: NAVY, aspiration: TEAL, agility: TEAL2, alignment: SLATE };

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{"facilitatorFontScale": 1.15, "showTagBadges": true}/*EDITMODE-END*/;

// ── helpers ──────────────────────────────────────────────────────────────────
function computeOverall(ratings) {
  const vals = DIMS.map(d => ratings[d]);
  if (vals.some(v => !v)) return null;
  const scores = { Low: 1, Medium: 2, High: 3 };
  const sum = vals.reduce((a, v) => a + scores[v], 0);
  const lows = vals.filter(v => v === 'Low').length;
  const highs = vals.filter(v => v === 'High').length;
  if (lows >= 2 || sum <= 5) return 'Emerging Potential';
  if (highs >= 3 && sum >= 10) return 'High Potential';
  if (sum >= 9) return 'High Potential';
  if (sum >= 7) return 'Medium Potential';
  return 'Emerging Potential';
}

const OVERALL_META = {
  'High Potential':    { color: GREEN,  label: 'High Potential' },
  'Medium Potential':  { color: AMBER,  label: 'Medium Potential' },
  'Emerging Potential':{ color: '#e05c3a', label: 'Emerging Potential' },
};

// ── shared UI ────────────────────────────────────────────────────────────────

// Signature stroke - gradient bar at the baseline.
const Stroke = ({ children, fontSize = 28 }) => {
  const h = Math.round(fontSize * 0.22);
  const ext = Math.round(fontSize / 6);
  return (
    <span style={{ display: 'inline-block', position: 'relative' }}>
      <span style={{
        position: 'absolute', left: -ext, right: -ext,
        bottom: Math.round(fontSize * 0.04),
        height: h,
        background: 'linear-gradient(90deg, #65c12a 0%, #05b7ed 50%, #164375 100%)',
        zIndex: 0,
      }}></span>
      <span style={{ position: 'relative', zIndex: 1 }}>{children}</span>
    </span>
  );
};

const Btn = ({ children, onClick, variant = 'primary', disabled }) => (
  <button onClick={onClick} disabled={disabled} style={{
    padding: variant === 'ghost' ? '10px 20px' : '12px 28px',
    borderRadius: 8, border: variant === 'ghost' ? '1px solid rgba(255,255,255,0.25)' : 'none',
    background: variant === 'primary' ? TEAL : variant === 'secondary' ? 'rgba(255,255,255,0.1)' : 'transparent',
    color: '#fff', fontFamily: 'DM Sans, sans-serif', fontWeight: 600, fontSize: 15,
    cursor: disabled ? 'not-allowed' : 'pointer', opacity: disabled ? 0.4 : 1,
    transition: 'all 0.15s', letterSpacing: '0.02em',
  }}>{children}</button>
);

const Tag = ({ text, color }) => (
  <span style={{
    display: 'inline-block', padding: '2px 8px', borderRadius: 4,
    fontSize: 11, fontWeight: 700, letterSpacing: '0.05em', textTransform: 'uppercase',
    background: color === 'warn' ? 'rgba(220,38,38,0.15)' : color === 'green' ? 'rgba(45,157,107,0.2)' : 'rgba(255,255,255,0.12)',
    color: color === 'warn' ? '#fca5a5' : color === 'green' ? '#6ee7b7' : 'rgba(255,255,255,0.7)',
    border: `1px solid ${color === 'warn' ? 'rgba(220,38,38,0.3)' : color === 'green' ? 'rgba(45,157,107,0.3)' : 'rgba(255,255,255,0.15)'}`,
  }}>{text}</span>
);

const ProgressBar = ({ step, total, labels, facilitator }) => (
  <div style={{ background: 'rgba(0,0,0,0.3)', padding: facilitator ? '12px 40px' : '10px 32px', display: 'flex', alignItems: 'center', gap: 16 }}>
    <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.4)', minWidth: 60 }}>
      {step + 1} / {total}
    </div>
    <div style={{ flex: 1, height: 3, background: 'rgba(255,255,255,0.1)', borderRadius: 99 }}>
      <div style={{ height: '100%', width: `${((step + 1) / total) * 100}%`, background: TEAL, borderRadius: 99, transition: 'width 0.4s ease' }} />
    </div>
    <div style={{ fontSize: 12, fontWeight: 600, color: 'rgba(255,255,255,0.5)', textAlign: 'right', minWidth: 120 }}>
      {labels[step] || ''}
    </div>
  </div>
);

// ── RatingPicker ─────────────────────────────────────────────────────────────
const RatingPicker = ({ value, onChange, color, size = 'normal' }) => (
  <div style={{ display: 'flex', gap: 0, borderRadius: 10, overflow: 'hidden', border: '1px solid rgba(255,255,255,0.15)', width: 'fit-content' }}>
    {['Low','Medium','High'].map((lvl, i) => {
      const active = value === lvl;
      return (
        <button key={lvl} onClick={() => onChange(lvl)} style={{
          padding: size === 'large' ? '14px 36px' : '10px 24px',
          border: 'none', borderRight: i < 2 ? '1px solid rgba(255,255,255,0.12)' : 'none',
          cursor: 'pointer', fontFamily: 'DM Sans, sans-serif', fontWeight: active ? 700 : 500,
          fontSize: size === 'large' ? 17 : 14, letterSpacing: '0.03em', transition: 'all 0.15s',
          background: active ? color : 'rgba(255,255,255,0.06)',
          color: active ? '#fff' : 'rgba(255,255,255,0.5)',
        }}>{lvl}</button>
      );
    })}
  </div>
);

// ── SCREEN 0: Welcome ────────────────────────────────────────────────────────
const WelcomeScreen = ({ onNext, facilitator }) => {
  const fs = facilitator ? 1.15 : 1;
  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center', padding: facilitator ? '60px 80px' : '48px 40px', maxWidth: 900, margin: '0 auto', width: '100%' }}>
      <div style={{ fontSize: 11 * fs, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase', color: CYAN, marginBottom: 16 }}>Holcim Potential Workshop</div>
      <h1 style={{ fontFamily: 'Montserrat, sans-serif', fontSize: 56 * fs, fontWeight: 800, lineHeight: 1.0, marginBottom: 24, letterSpacing: '-0.02em', textTransform: 'uppercase' }}>
        What is<br/>
        <Stroke fontSize={56 * fs}>potential</Stroke>,<br/>
        really?
      </h1>
      <p style={{ fontSize: 18 * fs, lineHeight: 1.7, color: 'rgba(255,255,255,0.7)', maxWidth: 680, marginBottom: 48 }}>
        Before we start: potential is not the same as performance. This is the single most common mistake made in talent reviews - and it is why the 4A framework exists.
      </p>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20, marginBottom: 48, maxWidth: 720 }}>
        {[
          { label: 'Performance', color: 'rgba(255,255,255,0.05)', border: 'rgba(255,255,255,0.15)', text: 'How well someone delivers results in their current role, against current expectations, today.', icon: '✗' },
          { label: 'Potential', color: 'rgba(5,183,237,0.12)', border: 'rgba(5,183,237,0.4)', text: 'The capacity to perform effectively at the next level of leadership - in new, more complex situations.', icon: '✓' },
        ].map(c => (
          <div key={c.label} style={{ background: c.color, border: `1px solid ${c.border}`, borderRadius: 12, padding: '24px' }}>
            <div style={{ fontSize: 13 * fs, fontWeight: 700, letterSpacing: '0.07em', textTransform: 'uppercase', marginBottom: 8, color: c.label === 'Performance' ? 'rgba(255,255,255,0.5)' : CYAN }}>
              {c.label}
            </div>
            <div style={{ fontSize: 15 * fs, lineHeight: 1.6, color: 'rgba(255,255,255,0.8)' }}>{c.text}</div>
          </div>
        ))}
      </div>
      <div style={{ background: 'rgba(255,255,255,0.06)', borderRadius: 12, padding: '20px 24px', maxWidth: 680, marginBottom: 40, borderLeft: `3px solid ${TEAL}` }}>
        <div style={{ fontSize: 15 * fs, lineHeight: 1.65, color: 'rgba(255,255,255,0.75)' }}>
          <strong style={{ color: '#fff' }}>Today's exercise:</strong> You will assess two fictional managers using the 4As - step by step. The tool will give you coaching feedback on your ratings. The goal is not to get it right first time, but to learn to separate what someone <em>has done</em> from what they <em>could do</em>.
        </div>
      </div>
      <Btn onClick={onNext}>Start with Case Study 1 →</Btn>
    </div>
  );
};

// ── SCREEN 1: Case Intro ─────────────────────────────────────────────────────
const CaseIntroScreen = ({ caseData, caseIndex, onNext, onSelectCase, facilitator }) => {
  const fs = facilitator ? 1.1 : 1;
  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center', padding: facilitator ? '60px 80px' : '48px 40px', maxWidth: 900, margin: '0 auto', width: '100%' }}>
      <div style={{ fontSize: 11 * fs, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.4)', marginBottom: 12 }}>Case Study {caseIndex + 1} of 2</div>
      <h2 style={{ fontSize: 40 * fs, fontWeight: 700, marginBottom: 6, letterSpacing: '-0.01em' }}>Meet {caseData.name}</h2>
      <div style={{ fontSize: 18 * fs, color: TEAL, fontWeight: 500, marginBottom: 32 }}>{caseData.role} · {caseData.location}</div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr auto', gap: 32, alignItems: 'start', marginBottom: 40 }}>
        <p style={{ fontSize: 17 * fs, lineHeight: 1.7, color: 'rgba(255,255,255,0.75)' }}>{caseData.bio}</p>
        <div style={{ background: 'rgba(255,255,255,0.06)', borderRadius: 12, padding: '20px 28px', minWidth: 220 }}>
          {[['Tenure', caseData.tenure], ['Performance', caseData.performance]].map(([k, v]) => (
            <div key={k} style={{ marginBottom: 16 }}>
              <div style={{ fontSize: 11 * fs, fontWeight: 700, letterSpacing: '0.07em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.4)', marginBottom: 4 }}>{k}</div>
              <div style={{ fontSize: 14 * fs, color: '#fff', fontWeight: 500 }}>{v}</div>
            </div>
          ))}
        </div>
      </div>
      <div style={{ background: `rgba(217,119,6,0.12)`, border: '1px solid rgba(217,119,6,0.3)', borderRadius: 10, padding: '16px 20px', maxWidth: 680, marginBottom: 40 }}>
        <div style={{ fontSize: 13 * fs, color: '#fcd34d', fontWeight: 600, marginBottom: 4 }}>Remember as you assess</div>
        <div style={{ fontSize: 14 * fs, color: 'rgba(255,255,255,0.7)', lineHeight: 1.6 }}>You are not rating how good {caseData.name.split(' ')[0]} is at her current job. You are asking: does the evidence suggest she has the capacity to perform effectively one level up?</div>
      </div>
      <Btn onClick={onNext}>Begin Assessment →</Btn>
    </div>
  );
};

// ── SCREEN 2–5: Dimension ────────────────────────────────────────────────────
const DimensionScreen = ({ dim, caseData, rating, onRate, submitted, onSubmit, facilitator, showTags }) => {
  const dimData = caseData.dimensions[dim];
  const color = DIM_COLORS[dim];
  const fs = facilitator ? 1.1 : 1;
  const nudge = submitted && rating ? dimData.nudge[rating] : null;
  const isCorrect = rating === dimData.suggestedRating;
  const nudgeColor = isCorrect ? 'rgba(45,157,107,0.15)' : 'rgba(220,38,38,0.1)';
  const nudgeBorder = isCorrect ? 'rgba(45,157,107,0.4)' : 'rgba(220,38,38,0.35)';
  const nudgeIcon = isCorrect ? '✓' : '⚠';

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', padding: facilitator ? '40px 80px' : '32px 40px', maxWidth: 960, margin: '0 auto', width: '100%' }}>
      {/* Header */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 16, marginBottom: 28 }}>
        <div style={{ background: color, borderRadius: 10, padding: '14px 24px' }}>
          <div style={{ fontSize: 13, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.6)' }}>Dimension</div>
          <div style={{ fontSize: 26 * fs, fontWeight: 700, letterSpacing: '0.04em', textTransform: 'uppercase' }}>{dim}</div>
        </div>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.07em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.4)', marginBottom: 6 }}>Assessment question</div>
          <div style={{ fontSize: 16 * fs, lineHeight: 1.5, color: 'rgba(255,255,255,0.85)', fontStyle: 'italic' }}>"{dimData.question}"</div>
        </div>
      </div>

      {/* Evidence */}
      <div style={{ marginBottom: 28 }}>
        <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.4)', marginBottom: 14 }}>Evidence on record</div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
          {dimData.evidence.map((ev, i) => (
            <div key={i} style={{
              background: 'rgba(255,255,255,0.06)', borderRadius: 10, padding: '16px 18px',
              border: '1px solid rgba(255,255,255,0.08)',
            }}>
              <div style={{ fontSize: 14 * fs, lineHeight: 1.6, color: 'rgba(255,255,255,0.85)', marginBottom: showTags ? 10 : 0 }}>
                "{ev.text}"
              </div>
              {showTags && (
                <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                  <Tag text={ev.tag} color={ev.tag.includes('Performance') ? 'warn' : 'green'} />
                  {submitted && ev.warn && (
                    <div style={{ fontSize: 12, color: '#fca5a5', lineHeight: 1.5, marginTop: 2 }}>↳ {ev.warn}</div>
                  )}
                </div>
              )}
            </div>
          ))}
        </div>
      </div>

      {/* Rating */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 20, marginBottom: 20, flexWrap: 'wrap' }}>
        <div>
          <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.4)', marginBottom: 10 }}>Your rating for {dim}</div>
          <RatingPicker value={rating} onChange={onRate} color={color} size={facilitator ? 'large' : 'normal'} />
        </div>
        {rating && !submitted && (
          <Btn onClick={onSubmit} variant="secondary">Get coaching feedback →</Btn>
        )}
      </div>

      {/* Nudge */}
      {nudge && (
        <div style={{
          background: nudgeColor, border: `1px solid ${nudgeBorder}`,
          borderRadius: 12, padding: '18px 22px', maxWidth: 760,
          animation: 'fadeIn 0.3s ease',
        }}>
          <div style={{ fontSize: 13, fontWeight: 700, letterSpacing: '0.05em', marginBottom: 8, color: isCorrect ? '#6ee7b7' : '#fca5a5' }}>
            {nudgeIcon} Coaching feedback
          </div>
          <div style={{ fontSize: 15 * fs, lineHeight: 1.65, color: 'rgba(255,255,255,0.85)' }}>{nudge}</div>
          {!isCorrect && (
            <div style={{ marginTop: 12, fontSize: 13, color: 'rgba(255,255,255,0.5)' }}>
              Suggested rating: <strong style={{ color: '#fff' }}>{dimData.suggestedRating}</strong>
            </div>
          )}
        </div>
      )}
    </div>
  );
};

// ── SCREEN 6: Judgement ──────────────────────────────────────────────────────
const JudgementScreen = ({ caseData, ratings, onNext, facilitator }) => {
  const overall = computeOverall(ratings);
  const meta = overall ? OVERALL_META[overall] : null;
  const correct = overall === caseData.overallSuggested;
  const fs = facilitator ? 1.1 : 1;
  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', padding: facilitator ? '48px 80px' : '40px 40px', maxWidth: 900, margin: '0 auto', width: '100%' }}>
      <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.4)', marginBottom: 16 }}>Overall Judgement - {caseData.name}</div>
      
      {/* Dimension summary */}
      <div style={{ display: 'flex', gap: 12, marginBottom: 32, flexWrap: 'wrap' }}>
        {DIMS.map(d => (
          <div key={d} style={{ background: DIM_COLORS[d], borderRadius: 8, padding: '10px 18px', display: 'flex', gap: 8, alignItems: 'center' }}>
            <span style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'rgba(255,255,255,0.7)' }}>{d}</span>
            <span style={{ fontSize: 15, fontWeight: 700 }}>{ratings[d] || '-'}</span>
          </div>
        ))}
      </div>

      {/* Overall badge */}
      {overall && (
        <div style={{ display: 'flex', alignItems: 'center', gap: 16, marginBottom: 28 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, background: `${meta.color}22`, border: `2px solid ${meta.color}`, borderRadius: 12, padding: '16px 28px' }}>
            <div style={{ width: 14, height: 14, borderRadius: '50%', background: meta.color }} />
            <span style={{ fontSize: 24 * fs, fontWeight: 700 }}>{meta.label}</span>
          </div>
          {correct ? (
            <Tag text="Matches suggested rating" color="green" />
          ) : (
            <Tag text={`Suggested: ${caseData.overallSuggested}`} color="warn" />
          )}
        </div>
      )}

      {/* Coach reveal */}
      <div style={{
        background: 'rgba(255,255,255,0.06)', borderRadius: 12, padding: '24px 28px', maxWidth: 760,
        borderLeft: `4px solid ${TEAL}`, marginBottom: 36,
      }}>
        <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: '0.07em', textTransform: 'uppercase', color: TEAL, marginBottom: 12 }}>Facilitator debrief</div>
        <div style={{ fontSize: 16 * fs, lineHeight: 1.7, color: 'rgba(255,255,255,0.85)' }}>{caseData.overallCoach}</div>
      </div>

      <Btn onClick={onNext}>Continue →</Btn>
    </div>
  );
};

// ── SCREEN 7: Calibration ────────────────────────────────────────────────────
const CalibrationScreen = ({ cases, allRatings, facilitator }) => {
  const [selected, setSelected] = useState([]);
  const toggle = id => setSelected(s => s.includes(id) ? s.filter(x => x !== id) : [...s, id]);
  const fs = facilitator ? 1.05 : 1;

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', padding: facilitator ? '48px 80px' : '40px 40px', maxWidth: 1100, margin: '0 auto', width: '100%' }}>
      <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.4)', marginBottom: 8 }}>Calibration</div>
      <h2 style={{ fontSize: 32 * fs, fontWeight: 700, marginBottom: 8, letterSpacing: '-0.01em' }}>Comparing your two assessments</h2>
      <p style={{ fontSize: 15 * fs, color: 'rgba(255,255,255,0.6)', marginBottom: 32, lineHeight: 1.6 }}>Calibration asks: are our ratings consistent and defensible when we compare people side by side? Look at the profiles together - do your ratings hold up?</p>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 24, marginBottom: 36 }}>
        {cases.map((c, ci) => {
          const ratings = allRatings[c.id] || {};
          const overall = computeOverall(ratings);
          const meta = overall ? OVERALL_META[overall] : null;
          return (
            <div key={c.id} style={{ background: 'rgba(255,255,255,0.06)', borderRadius: 14, padding: '24px', border: '1px solid rgba(255,255,255,0.1)' }}>
              <div style={{ fontSize: 20 * fs, fontWeight: 700, marginBottom: 4 }}>{c.name}</div>
              <div style={{ fontSize: 13 * fs, color: TEAL, marginBottom: 4 }}>{c.role}</div>
              <div style={{ fontSize: 12 * fs, color: 'rgba(255,255,255,0.4)', marginBottom: 20 }}>Performance: {c.performance}</div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 20 }}>
                {DIMS.map(d => (
                  <div key={d} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <span style={{ fontSize: 13 * fs, textTransform: 'capitalize', color: 'rgba(255,255,255,0.6)' }}>{d}</span>
                    <div style={{ display: 'flex', gap: 4 }}>
                      {['Low','Medium','High'].map(l => (
                        <div key={l} style={{
                          width: 56, height: 22, borderRadius: 4, display: 'flex', alignItems: 'center', justifyContent: 'center',
                          fontSize: 11, fontWeight: 700, letterSpacing: '0.04em',
                          background: ratings[d] === l ? DIM_COLORS[d] : 'rgba(255,255,255,0.06)',
                          color: ratings[d] === l ? '#fff' : 'rgba(255,255,255,0.25)',
                        }}>{l}</div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
              {meta && (
                <div style={{ display: 'inline-flex', alignItems: 'center', gap: 8, background: `${meta.color}22`, border: `1px solid ${meta.color}66`, borderRadius: 8, padding: '8px 16px' }}>
                  <div style={{ width: 8, height: 8, borderRadius: '50%', background: meta.color }} />
                  <span style={{ fontSize: 14 * fs, fontWeight: 700 }}>{meta.label}</span>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Calibration questions */}
      <div style={{ background: 'rgba(255,255,255,0.05)', borderRadius: 12, padding: '22px 26px', borderLeft: `4px solid ${AMBER}` }}>
        <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: '0.07em', textTransform: 'uppercase', color: '#fcd34d', marginBottom: 14 }}>Discussion questions for the room</div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
          {[
            'If both were rated High Potential - what would that say about how you separated potential from performance?',
            'Marcus has lower performance scores than Sarah. Does your rating reflect that - and should it?',
            'If you were presenting these two people to an ExCo, could you defend each rating with specific evidence?',
            'What development action follows from each rating? If you can\'t name one, the rating may not be right.',
          ].map((q, i) => (
            <div key={i} style={{ display: 'flex', gap: 10, alignItems: 'flex-start' }}>
              <span style={{ color: AMBER, fontWeight: 700, fontSize: 16, lineHeight: 1.3 }}>›</span>
              <span style={{ fontSize: 14 * fs, color: 'rgba(255,255,255,0.75)', lineHeight: 1.6 }}>{q}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

// ── App ──────────────────────────────────────────────────────────────────────
const STEP_LABELS = ['Introduction','Case Study 1','Ability','Aspiration','Agility','Alignment','Judgement','Case Study 2','Ability','Aspiration','Agility','Alignment','Judgement','Calibration','Checklist'];

function App() {
  const [step, setStep] = useState(() => parseInt(localStorage.getItem('ws_step') || '0'));
  const [facilitator, setFacilitator] = useState(false);
  const [showTags, setShowTags] = useState(true);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksVisible, setTweaksVisible] = useState(false);

  // Per-case ratings and submission state
  const [ratings, setRatings] = useState(() => {
    try { return JSON.parse(localStorage.getItem('ws_ratings')) || { sarah: {}, marcus: {} }; }
    catch { return { sarah: {}, marcus: {} }; }
  });
  const [submitted, setSubmitted] = useState(() => {
    try { return JSON.parse(localStorage.getItem('ws_submitted')) || { sarah: {}, marcus: {} }; }
    catch { return { sarah: {}, marcus: {} }; }
  });

  useEffect(() => { localStorage.setItem('ws_step', step); }, [step]);
  useEffect(() => { localStorage.setItem('ws_ratings', JSON.stringify(ratings)); }, [ratings]);
  useEffect(() => { localStorage.setItem('ws_submitted', JSON.stringify(submitted)); }, [submitted]);

  useEffect(() => {
    const handler = e => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const cases = window.WORKSHOP_DATA.cases;
  // Step mapping: 0=welcome, 1=case1intro, 2-5=case1dims, 6=case1judge, 7=case2intro, 8-11=case2dims, 12=case2judge, 13=calibration, 14=checklist
  const TOTAL = 15;
  const getCaseAndDim = (s) => {
    if (s >= 2 && s <= 5) return { caseId: 'sarah', dim: DIMS[s - 2] };
    if (s >= 8 && s <= 11) return { caseId: 'marcus', dim: DIMS[s - 8] };
    return {};
  };

  const next = () => setStep(s => Math.min(s + 1, TOTAL - 1));

  const renderStep = () => {
    if (step === 0) return <WelcomeScreen onNext={next} facilitator={facilitator} />;
    if (step === 1) return <CaseIntroScreen caseData={cases[0]} caseIndex={0} onNext={next} facilitator={facilitator} />;
    if (step >= 2 && step <= 5) {
      const { caseId, dim } = getCaseAndDim(step);
      return <DimensionScreen
        dim={dim} caseData={cases[0]}
        rating={ratings[caseId]?.[dim] || null}
        onRate={v => setRatings(r => ({ ...r, [caseId]: { ...r[caseId], [dim]: v } }))}
        submitted={!!submitted[caseId]?.[dim]}
        onSubmit={() => setSubmitted(s => ({ ...s, [caseId]: { ...s[caseId], [dim]: true } }))}
        facilitator={facilitator} showTags={showTags}
      />;
    }
    if (step === 6) return <JudgementScreen caseData={cases[0]} ratings={ratings.sarah} onNext={next} facilitator={facilitator} />;
    if (step === 7) return <CaseIntroScreen caseData={cases[1]} caseIndex={1} onNext={next} facilitator={facilitator} />;
    if (step >= 8 && step <= 11) {
      const { caseId, dim } = getCaseAndDim(step);
      return <DimensionScreen
        dim={dim} caseData={cases[1]}
        rating={ratings[caseId]?.[dim] || null}
        onRate={v => setRatings(r => ({ ...r, [caseId]: { ...r[caseId], [dim]: v } }))}
        submitted={!!submitted[caseId]?.[dim]}
        onSubmit={() => setSubmitted(s => ({ ...s, [caseId]: { ...s[caseId], [dim]: true } }))}
        facilitator={facilitator} showTags={showTags}
      />;
    }
    if (step === 12) return <JudgementScreen caseData={cases[1]} ratings={ratings.marcus} onNext={next} facilitator={facilitator} />;
    if (step === 13) return <CalibrationScreen cases={cases} allRatings={ratings} facilitator={facilitator} />;
    if (step === 14) return <ChecklistScreen facilitator={facilitator} />;
  };

  const canGoNext = () => {
    const { caseId, dim } = getCaseAndDim(step);
    if (dim && caseId) return !!submitted[caseId]?.[dim];
    return true;
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', minHeight: '100vh' }}>
      {/* Hub Bar removed for now */}
    <div className="slide" style={{ background: `linear-gradient(145deg, #041739 0%, #0a2150 60%, #041739 100%)`, flex: 1 }}>
      {/* Top bar */}
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '12px 32px', borderBottom: '1px solid rgba(255,255,255,0.08)', background: 'rgba(0,0,0,0.2)' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>

              <div style={{ width: 14, height: 14, borderRadius: '50%', background: '#fff', position: 'absolute', top: 3, left: facilitator ? 21 : 3, transition: 'left 0.2s' }} />
            </button>
          </div>
        </div>
